<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>MOSS · Centro Comercial</title>
<style>
:root{
  --verde:#1E3A28; --verde2:#3D7A52; --verde3:#5E9E73;
  --crema:#F3EFE4; --papel:#FDFCF9; --linea:#DDD6C4;
  --ocre:#B07D2B; --ladrillo:#A63F2B; --tinta:#1A1F1B; --gris:#6E7A70;
  --ok:#2E7D4F; --alerta:#B07D2B; --mal:#A63F2B;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--crema); color:var(--tinta); font-size:14px; line-height:1.45;
  font-variant-numeric:tabular-nums;
}
button,input,select,textarea{font-family:inherit;font-size:16px}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--linea);border-radius:7px;
  background:var(--papel);color:var(--tinta);outline:none;-webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--verde2);box-shadow:0 0 0 3px rgba(61,122,82,.13)}
:focus-visible{outline:2px solid var(--verde2);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ── Login ── */
#login{
  position:fixed;inset:0;background:var(--verde);
  display:flex;align-items:center;justify-content:center;padding:20px;z-index:900;
}
.lbox{background:var(--papel);border-radius:14px;padding:34px 30px;width:min(360px,92vw);
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lmark{width:46px;height:46px;background:var(--verde);border-radius:11px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;margin:0 auto 16px}
.lbox h1{font-size:19px;text-align:center;color:var(--verde);letter-spacing:-.2px}
.lbox p{text-align:center;color:var(--gris);font-size:12.5px;margin:4px 0 20px}
.lbox input{margin-bottom:10px;padding:12px}
.lbtn{width:100%;background:var(--verde);color:#fff;border:none;border-radius:8px;
  padding:13px;font-weight:700;font-size:15px;min-height:48px}
.lbtn:hover{background:var(--verde2)}
.lerr{color:var(--mal);font-size:12.5px;text-align:center;margin-top:10px;display:none}

/* ── Marco ── */
#app{display:none;min-height:100vh;flex-direction:column}
.top{background:var(--papel);border-bottom:1px solid var(--linea);
  padding:9px 16px;padding-top:calc(9px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.mark{width:30px;height:30px;background:var(--verde);border-radius:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.tnom{font-weight:700;font-size:14px;color:var(--verde);letter-spacing:-.2px}
.tsub{font-size:9.5px;color:var(--gris);text-transform:uppercase;letter-spacing:1.1px}
.tder{margin-left:auto;display:flex;align-items:center;gap:9px}
.chip{background:var(--crema);border:1px solid var(--linea);border-radius:20px;
  padding:5px 11px;font-size:12px;font-weight:600}
.estado{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gris);
  padding:5px 10px;border-radius:20px;background:var(--crema)}
.punto{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.punto.carga{background:var(--alerta);animation:late 1s infinite}
.punto.err{background:var(--mal)}
@keyframes late{0%,100%{opacity:1}50%{opacity:.3}}

.nav{background:var(--papel);border-bottom:1px solid var(--linea);
  display:flex;gap:2px;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav button{background:none;border:none;padding:11px 13px;font-size:13px;font-weight:600;
  color:var(--gris);border-bottom:2.5px solid transparent;white-space:nowrap}
.nav button.on{color:var(--verde);border-bottom-color:var(--verde2)}
.main{flex:1;padding:16px 14px calc(30px + env(safe-area-inset-bottom));max-width:1500px;width:100%;margin:0 auto}

/* ── Piezas ── */
.tarj{background:var(--papel);border:1px solid var(--linea);border-radius:11px}
.tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;
  color:var(--gris);margin:22px 0 10px}
.tit:first-child{margin-top:0}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:11px}
.kpi{background:var(--papel);border:1px solid var(--linea);border-radius:11px;padding:14px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--verde2)}
.kpi.w::before{background:var(--alerta)} .kpi.d::before{background:var(--mal)}
.kpi .k{font-size:10.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.kpi .v{font-size:27px;font-weight:750;letter-spacing:-1px;margin-top:3px;line-height:1.05}
.kpi .s{font-size:11.5px;color:var(--gris);margin-top:3px}

/* Embudo: la conversión vive entre las etapas */
.emb{display:flex;align-items:stretch;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px}
.eta{flex:1;min-width:112px;background:var(--papel);border:1px solid var(--linea);
  padding:13px 12px;position:relative}
.eta:first-child{border-radius:11px 0 0 11px}
.eta:last-child{border-radius:0 11px 11px 0}
.eta+.eta{border-left:none}
.eta .n{font-size:24px;font-weight:750;letter-spacing:-.8px;line-height:1}
.eta .l{font-size:10.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.7px;
  font-weight:600;margin-top:4px}
.eta .m{font-size:11px;color:var(--verde2);font-weight:600;margin-top:5px}
.conv{position:absolute;right:-17px;top:50%;transform:translateY(-50%);z-index:5;
  background:var(--verde);color:#fff;font-size:9.5px;font-weight:700;padding:2px 6px;
  border-radius:10px;white-space:nowrap}
.conv.baja{background:var(--mal)}

/* Lista de leads */
.fila{display:flex;align-items:center;gap:11px;padding:11px 14px;
  border-bottom:1px solid var(--linea);cursor:pointer;background:var(--papel)}
.fila:hover{background:var(--crema)}
.fila:last-child{border-bottom:none}
.fila.urg{box-shadow:inset 3px 0 0 var(--mal)}
.fila.hoy{box-shadow:inset 3px 0 0 var(--alerta)}
.fnom{font-weight:650;font-size:13.5px}
.fdet{font-size:11.5px;color:var(--gris);margin-top:2px}
.fder{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.eti{font-size:10px;font-weight:700;padding:3px 8px;border-radius:11px;white-space:nowrap;
  background:var(--crema);color:var(--gris);border:1px solid var(--linea)}
.eti.v{background:#E8F2EB;color:var(--ok);border-color:#BCDCC6}
.eti.a{background:#FBF3E2;color:var(--alerta);border-color:#EAD9AE}
.eti.r{background:#F9E9E5;color:var(--mal);border-color:#EFC9C0}
.eti.cal{background:var(--mal);color:#fff;border-color:var(--mal)}
.eti.frio{background:#EDEFEE;color:#8A938C;border-color:#DDE1DE}
.fila.frio{opacity:.62}

.vacio{padding:40px 20px;text-align:center;color:var(--gris);font-size:13px}
.vacio b{display:block;color:var(--tinta);font-size:14px;margin-bottom:5px}

/* Botones */
.bp{background:var(--verde);color:#fff;border:none;border-radius:8px;padding:11px 16px;
  font-weight:650;font-size:14px;min-height:44px}
.bp:hover{background:var(--verde2)}
.bs{background:var(--papel);color:var(--tinta);border:1px solid var(--linea);
  border-radius:8px;padding:11px 15px;font-weight:600;font-size:14px;min-height:44px}
.bs:hover{background:var(--crema)}
.bmini{padding:5px 10px;font-size:11.5px;min-height:0;border-radius:6px;font-weight:650}

/* Panel lateral */
.velo{position:fixed;inset:0;background:rgba(26,31,27,.45);z-index:500;display:none}
.velo.on{display:block}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(470px,100%);background:var(--papel);
  z-index:501;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);
  transition:transform .2s ease;display:flex;flex-direction:column}
.panel.on{transform:translateX(0)}
.phead{background:var(--verde);color:#fff;padding:16px 18px;
  padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:2}
.phead h2{font-size:17px;letter-spacing:-.3px}
.phead p{font-size:12px;opacity:.72;margin-top:2px}
.pcerrar{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.16);border:none;
  color:#fff;width:30px;height:30px;border-radius:8px;font-size:17px;line-height:1}
.pbody{padding:16px 18px;flex:1}
.ppie{padding:13px 18px calc(13px + env(safe-area-inset-bottom));border-top:1px solid var(--linea);
  display:flex;gap:9px;background:var(--papel);position:sticky;bottom:0}
.campo{margin-bottom:13px}
.campo label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--gris);margin-bottom:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.guia{border-radius:9px;padding:11px 13px;font-size:12px;line-height:1.5;margin-top:9px;display:none}
.guia b{display:block;margin-bottom:3px}
.guia .r{margin-top:6px}

.crono{border-left:2px solid var(--linea);margin-left:5px;padding-left:14px}
.cev{position:relative;padding-bottom:13px;font-size:12.5px}
.cev::before{content:'';position:absolute;left:-20px;top:5px;width:8px;height:8px;
  border-radius:50%;background:var(--verde2);border:2px solid var(--papel)}
.cev .f{font-size:10.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.6px}

.aviso{background:var(--papel);border:1px solid var(--linea);border-left:3px solid var(--alerta);
  border-radius:9px;padding:12px 15px;margin-bottom:14px;font-size:13px}
.aviso.mal{border-left-color:var(--mal)}
.aviso b{display:block;margin-bottom:3px}

#toast{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(80px);background:var(--verde);color:#fff;
  padding:11px 20px;border-radius:9px;font-size:13.5px;font-weight:600;z-index:800;
  transition:transform .22s ease;box-shadow:0 8px 24px rgba(0,0,0,.22);max-width:90vw;text-align:center}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.mal{background:var(--mal)}

.tabla{width:100%;border-collapse:collapse;font-size:13px}
.tabla th{background:var(--verde);color:#fff;padding:9px 11px;text-align:left;
  font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.tabla td{padding:9px 11px;border-bottom:1px solid var(--linea)}
.tabla tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums}

.barra{height:7px;background:var(--crema);border-radius:4px;overflow:hidden;margin-top:6px}
.barra i{display:block;height:100%;background:var(--verde2);border-radius:4px}
.barra i.w{background:var(--alerta)} .barra i.d{background:var(--mal)}

.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px;align-items:center}
.filtros select,.filtros input{width:auto;min-width:135px;font-size:14px;padding:7px 10px}
@media(max-width:640px){
  .g2{grid-template-columns:1fr}
  .main{padding:13px 11px calc(30px + env(safe-area-inset-bottom))}
  .fdet{display:none}
}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="lmark">M</div>
    <h1>Centro Comercial MOSS</h1>
    <p>Ingresa para ver tu tablero</p>
    <input type="text" id="u" placeholder="Usuario" autocomplete="username">
    <input type="password" id="p" placeholder="Contraseña" autocomplete="current-password">
    <button class="lbtn" onclick="entrar()">Entrar</button>
    <div class="lerr" id="lerr">Usuario o contraseña incorrectos</div>
  </div>
</div>

<div id="app">
  <div class="top">
    <div class="mark">M</div>
    <div>
      <div class="tnom">Centro Comercial</div>
      <div class="tsub">MOSS Remodelaciones · v1.4</div>
    </div>
    <div class="tder">
      <span class="chip" id="quien">—</span>
      <div class="estado" id="estado"><div class="punto carga"></div><span id="estadotxt">Cargando</span></div>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="main" id="main"></div>
</div>

<div class="velo" id="velo" onclick="cerrarPanel()"></div>
<div class="panel" id="panel"></div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURACIÓN — pega aquí la URL /exec de tu Apps Script
   ═══════════════════════════════════════════════════════════════ */
var API_URL = 'https://script.google.com/macros/s/AKfycbyT_8kOkj2YNvJkRqseCYuvIh-VxlUu7fC1-ZKn0Q6M6vbTs0fCfvp7AXIiy6vTZ5fNGA/exec';

var USUARIOS = {
  juanma: { clave:'moss2026CEO', nombre:'Juan Ma',          rol:'director', key:null   },
  liz:    { clave:'liz2026',     nombre:'Lizeth Figueroa',  rol:'asesor',   key:'com1' },
  sofia:  { clave:'sofia2026',   nombre:'Sofía Estupiñán',  rol:'asesor',   key:'com2' }
};

var ETAPAS = [
  { k:'nuevo',       n:'Nuevo'       },
  { k:'contactado',  n:'Contactado'  },
  { k:'visita',      n:'Visita'      },
  { k:'cotizado',    n:'Cotizado'    },
  { k:'negociacion', n:'Negociación' },
  { k:'firmado',     n:'Firmado'     }
];
var ETAPA_N = {}; ETAPAS.forEach(function(e){ ETAPA_N[e.k]=e.n; });

var PERFILES = {
  decidido:{ n:'Decidido', ico:'⚡', bg:'#E9F1F8', bd:'#2B6CA3',
    rec:'Habla rápido, va directo a precio y plazo.',
    si:'Resultado, plazo exacto, próximo paso concreto.',
    no:'No lo satures con historia de marca ni detalle técnico sin pedirlo.' },
  analitico:{ n:'Analítico', ico:'📐', bg:'#F0EDF7', bd:'#5B4A96',
    rec:'Pregunta especificaciones, pide comparar, quiere todo por escrito.',
    si:'Datos concretos: garantías, tiempos por etapa, materiales, referencias.',
    no:'No improvises cifras. Si no sabes, confírmalo y vuelve con el dato.' },
  emocional:{ n:'Emocional', ico:'✷', bg:'#FBEDF1', bd:'#A63F5E',
    rec:'Habla de cómo se va a sentir el espacio, muestra referencias.',
    si:'Proyectos similares, testimonios, la transformación del espacio.',
    no:'No abras con especificaciones técnicas. Eso viene después.' },
  cauteloso:{ n:'Cauteloso', ico:'⏳', bg:'#FBF3E2', bd:'#B07D2B',
    rec:'Pide tiempo, consulta con su pareja o familia, teme comprometerse.',
    si:'Garantías, casos reales, el proceso explicado paso a paso.',
    no:'No presiones el cierre en la primera reunión. Lo aleja.' }
};

var S = { user:null, leads:[], eventos:[], cfg:{}, vista:'tablero', filtros:{}, leadAbierto:null };

/* ── Utilidades ── */
function $(id){ return document.getElementById(id); }
function cop(n){ n=Number(n)||0; return '$' + n.toLocaleString('es-CO',{maximumFractionDigits:0}); }
function corto(n){ n=Number(n)||0;
  if(n>=1e9) return '$'+(n/1e9).toFixed(1).replace('.0','')+'B';
  if(n>=1e6) return '$'+Math.round(n/1e6)+'M';
  if(n>=1e3) return '$'+Math.round(n/1e3)+'K';
  return '$'+n; }
function hoy(){ return new Date().toISOString().slice(0,10); }
function dias(a,b){ if(!a) return null;
  return Math.round((new Date((b||hoy())+'T12:00:00') - new Date(a+'T12:00:00'))/86400000); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function prom(a){ return a.length ? Math.round(a.reduce(function(s,v){return s+v;},0)/a.length) : null; }

function toast(msg, mal){
  var t=$('toast'); t.textContent=msg; t.className = mal?'on mal':'on';
  clearTimeout(t._t); t._t=setTimeout(function(){ t.className=''; },2800);
}
function estado(tipo, txt){
  $('estado').querySelector('.punto').className = 'punto' + (tipo==='carga'?' carga':tipo==='err'?' err':'');
  $('estadotxt').textContent = txt;
}

/* ── Puente con el Apps Script (JSONP) ── */
function api(accion, params, cb){
  if(API_URL.indexOf('PEGA_AQUI') === 0){
    toast('Falta configurar API_URL en el código', true);
    if(cb) cb({ ok:false, error:'API_URL sin configurar' });
    return;
  }
  var nom = 'moss_' + Date.now() + Math.floor(Math.random()*1000);
  var sc = document.createElement('script');
  var listo = false;
  var tm = setTimeout(function(){
    if(listo) return;
    limpiar(); if(cb) cb({ ok:false, error:'El servidor no respondió a tiempo' });
  }, 25000);

  function limpiar(){ listo=true; clearTimeout(tm);
    try{ delete window[nom]; }catch(e){ window[nom]=undefined; }
    try{ document.body.removeChild(sc); }catch(e){} }

  window[nom] = function(d){ limpiar(); if(cb) cb(d); };
  sc.onerror = function(){ limpiar(); if(cb) cb({ ok:false, error:'Sin conexión con el servidor' }); };

  var q = ['action='+encodeURIComponent(accion), 'callback='+nom];
  Object.keys(params||{}).forEach(function(k){
    var v = params[k]; if(v===undefined||v===null) return;
    q.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
  });
  sc.src = API_URL + '?' + q.join('&');
  document.body.appendChild(sc);
}

/* ── El fix: se guarda UN lead, no los 1.605 ── */
function guardarLead(id, campos, cb){
  var p = Object.assign({ id:id, usuario:S.user.nombre }, campos);
  estado('carga','Guardando');
  api('lead.guardar', p, function(d){
    if(d && d.ok){
      var L = S.leads.find(function(x){ return x.id===id; });
      if(L) Object.assign(L, campos);
      estado('ok','Guardado');
      toast('Cambios guardados');
      if(cb) cb(true);
    } else {
      estado('err','No se guardó');
      toast(d && d.error ? d.error : 'No se pudo guardar', true);
      if(cb) cb(false);
    }
  });
}

/* ── Sesión ── */
function entrar(){
  var u=$('u').value.trim().toLowerCase(), p=$('p').value;
  var us=USUARIOS[u];
  if(!us || us.clave!==p){ $('lerr').style.display='block'; return; }
  S.user = { id:u, nombre:us.nombre, rol:us.rol, key:us.key };
  $('login').style.display='none';
  $('app').style.display='flex';
  $('quien').textContent = us.nombre + (us.rol==='director' ? ' · Dirección' : '');
  pintarNav();
  cargar();
}
$('p').addEventListener('keydown', function(e){ if(e.key==='Enter') entrar(); });

function cargar(){
  estado('carga','Cargando');
  api('config.leer', {}, function(c){
    S.cfg = (c && c.ok) ? c.config : {};
    api('leads.listar', {}, function(d){
      if(d && d.ok){
        S.leads = d.leads;
        estado('ok', d.total + ' leads');
        api('eventos.listar', {}, function(e){
          S.eventos = (e && e.ok) ? e.eventos : [];
          pintar();
        });
      } else {
        estado('err','Error al cargar');
        toast(d && d.error ? d.error : 'No se pudieron cargar los leads', true);
        pintar();
      }
    });
  });
}

/* ── Navegación ── */
function pintarNav(){
  var tabs = S.user.rol==='director'
    ? [['tablero','Tablero'],['pipeline','Pipeline'],['leads','Leads'],
       ['equipo','Equipo'],['comisiones','Comisiones'],['ajustes','Ajustes']]
    : [['tablero','Mi día'],['pipeline','Pipeline'],['leads','Mis leads'],['comisiones','Mi comisión']];
  $('nav').innerHTML = tabs.map(function(t){
    return '<button class="'+(S.vista===t[0]?'on':'')+'" onclick="ir(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join('');
}
function ir(v){ S.vista=v; pintarNav(); pintar(); window.scrollTo(0,0); }

/* ── Alcance por rol: el asesor solo ve lo suyo ── */
function mios(){
  if(S.user.rol==='director') return S.leads;
  return S.leads.filter(function(l){ return l.responsable===S.user.key; });
}

/* ── Métricas ── */
/* ── Plantillas de seguimiento (las del CRM anterior) ── */
var PLANTILLAS = [

/* ── Calificación: mismos criterios que el servidor ── */
var PISO_CALIENTE = 20000000;   // valor mínimo para considerarlo prioritario
var MIN_POR_M2    = 800000;     // descarta cotizaciones incoherentes

function esCaliente(l){
  if(l.clasificacion === 'Caliente') return true;   // marcado a mano manda

  var v = Number(l.valor) || 0;
  var m = Number(l.m2) || 0;
  if(v < PISO_CALIENTE) return false;
  if(m > 0 && (v / m) < MIN_POR_M2) return false;

  var cp = String(l.cumplePresupuesto||'').toLowerCase();
  var tp = String(l.tiempoInicio||'').toLowerCase();
  if(/si|sí/.test(cp) && /menor a un mes|un mes|1 mes|1-3|1 a 3/.test(tp)) return true;
  if(v >= 80000000) return true;
  if(/si|sí/.test(cp) && tp) return true;
  return false;
}

/* ── Semáforo de tiempo ── */
function semaforo(l){
  if(l.etapa==='firmado' || l.etapa==='perdido') return '';
  var ref = l.ultimoContacto || l.fechaContacto;

  if(Number(l.intentos) > 0 && ref){
    var d = dias(ref);
    if(d === null) return '';
    if(d === 0)  return '<span class="eti v">Contactado hoy</span>';
    if(d <= 3)   return '<span class="eti v">'+d+' d</span>';
    if(d <= 7)   return '<span class="eti a">'+d+' d sin contacto</span>';
    if(d <= 21)  return '<span class="eti a">'+d+' d sin contacto</span>';
    return '<span class="eti r">'+d+' d inactivo</span>';
  }

  var di = dias(l.fechaIngreso);
  if(di === null) return '<span class="eti">Nuevo</span>';
  if(di === 0) return '<span class="eti r">Entró hoy · atender</span>';
  if(di === 1) return '<span class="eti r">1 d sin contactar</span>';
  return '<span class="eti r">'+di+' d sin contactar</span>';
}

/* ── Siguiente etapa ── */
function siguienteEtapa(k){
  var i = ETAPAS.map(function(e){ return e.k; }).indexOf(k);
  return (i >= 0 && i < ETAPAS.length-1) ? ETAPAS[i+1].k : null;
}

function avanzar(id, ev){
  if(ev) ev.stopPropagation();
  var l = S.leads.find(function(x){ return x.id===id; });
  if(!l) return;
  var sig = siguienteEtapa(l.etapa);
  if(!sig){ toast('Ya está en la última etapa'); return; }
  guardarLead(id, { etapa:sig }, function(ok){
    if(ok){ toast(primerNombre(l) + ' → ' + ETAPA_N[sig]); pintar(); }
  });
}

/** El nombre puede llegar como número desde la hoja: siempre a texto. */
function primerNombre(l){
  var n = String((l && l.nombre) || '').trim();
  return n ? n.split(' ')[0] : 'Lead';
}

function metricas(base){
  var L = base || mios();
  var m = { total:L.length, porEtapa:{}, valorPipeline:0, valorCerrado:0,
            sinContactar:0, vencidos:0, hoyAgenda:0, cerrados:0 };
  ETAPAS.forEach(function(e){ m.porEtapa[e.k]=0; });

  var tPrimer=[], tCierre=[];
  var slaDias = Number(S.cfg.slaSeguimiento||3);

  L.forEach(function(l){
    m.porEtapa[l.etapa] = (m.porEtapa[l.etapa]||0) + 1;
    var v = Number(l.valor)||0;
    if(l.etapa==='firmado'){ m.valorCerrado += v; m.cerrados++; }
    else m.valorPipeline += v;

    if(l.etapa==='nuevo' && !l.fechaContacto) m.sinContactar++;
    if(l.proxContacto && l.proxContacto < hoy() && l.etapa!=='firmado') m.vencidos++;
    if(l.proxContacto === hoy()) m.hoyAgenda++;

    if(l.fechaIngreso && l.fechaContacto){
      var d1 = dias(l.fechaIngreso, l.fechaContacto); if(d1!==null && d1>=0) tPrimer.push(d1);
    }
    if(l.fechaIngreso && l.fechaCierre){
      var d2 = dias(l.fechaIngreso, l.fechaCierre); if(d2!==null && d2>=0) tCierre.push(d2);
    }
  });

  m.promPrimerContacto = prom(tPrimer);
  m.promCierre = prom(tCierre);
  m.meta = Number(S.cfg.metaMensual||150000000);
  m.cumplimiento = m.meta>0 ? Math.round(m.valorCerrado/m.meta*100) : 0;
  m.conversion = m.total>0 ? Math.round(m.cerrados/m.total*100) : 0;
  m.slaDias = slaDias;
  return m;
}

/* ── Router de vistas ── */
function pintar(){
  var v = S.vista;
  if(v==='tablero')    vTablero();
  else if(v==='pipeline')  vPipeline();
  else if(v==='leads')     vLeads();
  else if(v==='equipo')    vEquipo();
  else if(v==='comisiones')vComisiones();
  else if(v==='ajustes')   vAjustes();
}

/* ── Tablero ── */
function vTablero(){
  var L = mios(), m = metricas(L);
  var h = '';

  if(m.vencidos > 0){
    h += '<div class="aviso mal"><b>'+m.vencidos+' seguimiento'+(m.vencidos>1?'s':'')+' vencido'+(m.vencidos>1?'s':'')+'</b>'
      +  'Estos clientes tenían fecha de contacto anterior a hoy. '
      +  '<a href="#" onclick="S.filtros={vencidos:1};ir(\'leads\');return false" style="color:var(--verde2);font-weight:650">Verlos ahora</a></div>';
  }
  if(m.sinContactar > 0){
    h += '<div class="aviso"><b>'+m.sinContactar+' lead'+(m.sinContactar>1?'s':'')+' sin primer contacto</b>'
      +  'Mientras más rápido el primer contacto, más alta la conversión. '
      +  '<a href="#" onclick="S.filtros={etapa:\'nuevo\'};ir(\'leads\');return false" style="color:var(--verde2);font-weight:650">Atenderlos</a></div>';
  }

  var calientes = L.filter(function(l){ return esCaliente(l) && l.etapa!=='firmado' && l.etapa!=='perdido'; });
  var calSinTocar = calientes.filter(function(l){ return !Number(l.intentos); });

  if(calSinTocar.length > 0){
    h += '<div class="aviso mal"><b>'+calSinTocar.length+' lead'+(calSinTocar.length>1?'s':'')+' caliente'+(calSinTocar.length>1?'s':'')+' sin contactar</b>'
      +  'Cumplen presupuesto y tienen urgencia de tiempo. Son los que más rápido cierran. '
      +  '<a href="#" onclick="S.filtros={calientes:1,sinContacto:1};ir(\'leads\');return false" style="color:var(--verde2);font-weight:650">Atenderlos ahora</a></div>';
  }

  h += '<div class="kpis">'
    + kpi('Calientes', calientes.length, calSinTocar.length+' sin contactar',
        calSinTocar.length>0?'d':'')
    + kpi('Sin contactar', m.sinContactar, 'Leads nuevos', m.sinContactar>0?'w':'')
    + kpi('Agenda de hoy', m.hoyAgenda, 'Contactos programados')
    + kpi('Vencidos', m.vencidos, 'Fuera de plazo', m.vencidos>0?'d':'')
    + kpi('En pipeline', corto(m.valorPipeline), (m.total-m.cerrados)+' oportunidades')
    + kpi('Cerrado del mes', corto(m.valorCerrado), m.cerrados+' contratos')
    + kpi('Cumplimiento', m.cumplimiento+'%', 'Meta ' + corto(m.meta),
        m.cumplimiento>=100?'':m.cumplimiento>=60?'w':'d')
    + '</div>';

  h += '<div class="tit">Embudo</div>' + embudo(m);

  h += '<div class="tit">Velocidad del proceso</div><div class="kpis">'
    + kpi('Primer contacto', m.promPrimerContacto!==null ? m.promPrimerContacto+' d' : '—',
        'Desde que entra el lead')
    + kpi('Ciclo de cierre', m.promCierre!==null ? m.promCierre+' d' : '—',
        'Del primer contacto a la firma')
    + kpi('Conversión', m.conversion+'%', 'Leads que terminan en contrato')
    + '</div>';

  var prio = L.filter(function(l){ return l.etapa!=='firmado' && l.etapa!=='perdido'; })
    .sort(function(a,b){ return puntaje(b)-puntaje(a); }).slice(0,12);

  h += '<div class="tit">Atender primero</div><div class="tarj">'
    + (prio.length ? prio.map(filaLead).join('')
      : '<div class="vacio"><b>Todo al día</b>No hay leads pendientes de atención.</div>')
    + '</div>';

  $('main').innerHTML = h;
}

function kpi(k,v,s,cls){
  return '<div class="kpi '+(cls||'')+'"><div class="k">'+k+'</div>'
    + '<div class="v">'+v+'</div><div class="s">'+(s||'')+'</div></div>';
}

function embudo(m){
  var h = '<div class="emb">';
  ETAPAS.forEach(function(e,i){
    var n = m.porEtapa[e.k]||0;
    var val = mios().filter(function(l){ return l.etapa===e.k; })
      .reduce(function(s,l){ return s+(Number(l.valor)||0); },0);
    h += '<div class="eta"><div class="n">'+n+'</div><div class="l">'+e.n+'</div>'
      +  (val>0 ? '<div class="m">'+corto(val)+'</div>' : '<div class="m">&nbsp;</div>');
    if(i < ETAPAS.length-1){
      var sig = m.porEtapa[ETAPAS[i+1].k]||0;
      if(n>0){
        var pct = Math.round(sig/n*100);
        h += '<span class="conv'+(pct<25?' baja':'')+'">'+pct+'%</span>';
      }
    }
    h += '</div>';
  });
  return h + '</div>';
}

/* ── Prioridad: manda la frescura ──────────────────────────────────────────
   Un lead recién llegado vale mucho más que uno de hace meses. Pasados
   ~100 días la probabilidad de cierre es marginal, así que el puntaje
   por frescura se agota ahí y esos leads caen al fondo de la lista. */
var VENTANA_UTIL = 100;   // días de vida útil de un lead

function frescura(l){
  var d = dias(l.fechaIngreso);
  if(d === null) return 0;
  if(d < 0) d = 0;
  return Math.max(0, VENTANA_UTIL - d);   // hoy = 100, a los 100 días = 0
}

function puntaje(l){
  var p = frescura(l) * 2;                     // hasta 200 puntos por recencia
  if(esCaliente(l)) p += 70;
  if(!Number(l.intentos) && l.etapa!=='firmado') p += 40;
  if(l.proxContacto && l.proxContacto < hoy()) p += 90;   // compromiso incumplido
  if(l.proxContacto === hoy()) p += 60;
  if(l.etapa==='negociacion') p += 50;
  if(l.etapa==='cotizado') p += 35;
  if(l.etapa==='visita') p += 25;
  p += Math.min((Number(l.valor)||0)/1e7, 20);
  return p;
}

function esFrio(l){
  var d = dias(l.fechaIngreso);
  return d !== null && d > VENTANA_UTIL && !Number(l.intentos);
}

function filaLead(l){
  var cls='', etis='';

  if(esCaliente(l)) etis += '<span class="eti cal">Caliente</span>';
  if(esFrio(l)) etis += '<span class="eti frio">Fuera de ventana</span>';
  etis += semaforo(l);

  if(l.proxContacto && l.proxContacto < hoy() && l.etapa!=='firmado'){
    cls='urg'; etis += '<span class="eti r">Vencido</span>';
  } else if(l.proxContacto === hoy()){
    cls='hoy'; etis += '<span class="eti a">Agendado hoy</span>';
  }
  if(l.perfil && PERFILES[l.perfil]) etis += '<span class="eti">'+PERFILES[l.perfil].ico+'</span>';

  if(esFrio(l)) cls += ' frio';

  var det = [];
  var diasVida = dias(l.fechaIngreso);
  if(diasVida !== null) det.push(diasVida + ' d en el sistema');
  if(l.proyecto) det.push(esc(l.proyecto));
  if(l.m2) det.push(l.m2+' m²');
  if(l.ciudad) det.push(esc(l.ciudad));
  if(l.valor) det.push(cop(l.valor));
  if(l.intentos > 0) det.push(l.intentos+' contacto'+(l.intentos>1?'s':''));
  if(l.responsable) det.push(nombreAsesor(l.responsable));

  var acciones = '';
  var tel = String(l.telefono||'').replace(/[^0-9]/g,'');
  if(tel && l.etapa!=='firmado'){
    acciones += '<button class="bs bmini" data-act="contactar">Contactar</button>';
  }
  var sig = siguienteEtapa(l.etapa);
  if(sig){
    acciones += '<button class="bp bmini" data-act="avanzar">→ '+ETAPA_N[sig]+'</button>';
  }

  return '<div class="fila '+cls+'" data-id="'+esc(l.id)+'">'
    + '<div style="flex:1;min-width:0">'
    + '<div class="fnom">'+esc(l.nombre||'Sin nombre')+'</div>'
    + '<div class="fdet">'+det.join(' · ')+'</div></div>'
    + '<div class="fder">'+etis+'<span class="eti">'+(ETAPA_N[l.etapa]||l.etapa)+'</span>'
    + acciones+'</div></div>';
}

/* Un solo escuchador para todas las filas: el id viaja como atributo,
   no incrustado en código. Así ningún carácter raro rompe el clic. */
document.addEventListener('click', function(ev){
  var fila = ev.target.closest ? ev.target.closest('.fila') : null;
  if(!fila) return;
  var id = fila.getAttribute('data-id');
  if(!id) return;

  var btn = ev.target.closest('[data-act]');
  if(btn){
    ev.stopPropagation();
    var act = btn.getAttribute('data-act');
    if(act === 'contactar') abrirSeguimiento(id);
    else if(act === 'avanzar') avanzar(id);
    return;
  }
  abrirLead(id);
});

/* ── Panel de seguimiento: plantillas por día ── */
function abrirSeguimiento(id, ev){
  if(ev) ev.stopPropagation();
  var l = S.leads.find(function(x){ return x.id===id; });
  if(!l) return;
  var tel = String(l.telefono||'').replace(/[^0-9]/g,'');
  var d = dias(l.ultimoContacto || l.fechaContacto || l.fechaIngreso);

  var h = '<div class="phead"><button class="pcerrar" onclick="cerrarPanel()">×</button>'
    + '<h2>Contactar a '+esc(primerNombre(l))+'</h2>'
    + '<p>'+(l.intentos>0
        ? l.intentos+' contacto'+(l.intentos>1?'s':'')+' · último hace '+(d===null?'—':d+' d')
        : 'Sin contacto previo')+'</p></div><div class="pbody">';

  h += '<p style="font-size:12.5px;color:var(--gris);margin-bottom:12px">'
    + 'Al elegir una plantilla se abre WhatsApp con el mensaje listo y queda registrado el contacto.</p>';

  PLANTILLAS.forEach(function(p,i){
    h += '<button class="bs" style="width:100%;text-align:left;margin-bottom:8px;padding:12px 14px"'
      + ' data-plantilla="'+i+'">'
      + '<b style="display:block;font-size:13px">'+p[0]+'</b>'
      + '<span style="font-size:11.5px;color:var(--gris);display:block;margin-top:3px">'
      + esc(p[1].slice(0,85))+'…</span></button>';
  });

  h += '<div class="tit">Otras acciones</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="bs" style="flex:1" data-acc="libre">WhatsApp en blanco</button>'
    + '<button class="bs" style="flex:1" data-acc="llamada">Registrar llamada</button></div>';

  h += '</div><div class="ppie">'
    + '<button class="bs" style="flex:1" data-acc="ficha">Ver ficha completa</button>'
    + '<button class="bs" onclick="cerrarPanel()">Cerrar</button></div>';

  $('panel').innerHTML = h;
  $('panel').classList.add('on');
  $('velo').classList.add('on');
  S.leadAbierto = id;

  $('panel').querySelectorAll('[data-plantilla]').forEach(function(b){
    b.addEventListener('click', function(){
      enviarPlantilla(id, Number(b.getAttribute('data-plantilla')));
    });
  });
  $('panel').querySelectorAll('[data-acc]').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.getAttribute('data-acc');
      if(a === 'libre')   contactoLibre(id);
      if(a === 'llamada') marcarLlamada(id);
      if(a === 'ficha')   abrirLead(id);
    });
  });
}

function textoPlantilla(l, i){
  return PLANTILLAS[i][1]
    .replace(/\{n\}/g, primerNombre(l))
    .replace(/\{x\}/g, String(S.user.nombre||'').split(' ')[0]);
}

function enviarPlantilla(id, i){
  var l = S.leads.find(function(x){ return x.id===id; });
  if(!l) return;
  var tel = String(l.telefono||'').replace(/[^0-9]/g,'');
  if(!tel){ toast('Este lead no tiene teléfono', true); return; }

  window.open('https://wa.me/57'+tel+'?text='+encodeURIComponent(textoPlantilla(l,i)),'_blank');
  registrarToque(id, PLANTILLAS[i][0]);
}

function contactoLibre(id){
  var l = S.leads.find(function(x){ return x.id===id; });
  var tel = String((l||{}).telefono||'').replace(/[^0-9]/g,'');
  if(!tel){ toast('Este lead no tiene teléfono', true); return; }
  window.open('https://wa.me/57'+tel,'_blank');
  registrarToque(id, 'WhatsApp directo');
}

function marcarLlamada(id){ registrarToque(id, 'Llamada telefónica'); }

function registrarToque(id, detalle){
  var l = S.leads.find(function(x){ return x.id===id; });
  api('evento.crear', { id:id, tipo:'contacto', detalle:detalle, usuario:S.user.nombre },
    function(d){
      if(d && d.ok){
        if(l){
          l.intentos = Number(l.intentos||0) + 1;
          l.ultimoContacto = hoy();
          if(!l.fechaContacto) l.fechaContacto = hoy();
        }
        toast('Contacto registrado · ' + detalle);
        if(l && l.etapa==='nuevo'){
          guardarLead(id, { etapa:'contactado' }, function(){ cerrarPanel(); pintar(); });
        } else { cerrarPanel(); pintar(); }
      } else {
        toast('No se pudo registrar el contacto', true);
      }
    });
}

function nombreAsesor(k){
  var a = (S.cfg.asesores||[]).find(function(x){ return x.key===k; });
  return a ? a.nombre : k;
}

/* ── Pipeline ── */
function vPipeline(){
  var L = mios(), m = metricas(L);
  var h = '<div class="tit">Embudo comercial</div>' + embudo(m);
  h += '<div class="tit">Oportunidades por etapa</div>';

  ETAPAS.forEach(function(e){
    var enEtapa = L.filter(function(l){ return l.etapa===e.k; })
      .sort(function(a,b){ return (Number(b.valor)||0)-(Number(a.valor)||0); });
    if(!enEtapa.length) return;
    var val = enEtapa.reduce(function(s,l){ return s+(Number(l.valor)||0); },0);
    h += '<div style="margin-bottom:16px">'
      + '<div style="display:flex;align-items:baseline;gap:9px;margin-bottom:7px">'
      + '<span style="font-weight:700;font-size:14px">'+e.n+'</span>'
      + '<span style="color:var(--gris);font-size:12.5px">'+enEtapa.length+' · '+corto(val)+'</span></div>'
      + '<div class="tarj">'+enEtapa.slice(0,25).map(filaLead).join('')+'</div></div>';
  });
  $('main').innerHTML = h;
}

/* ── Leads ── */
function vLeads(){
  var L = mios(), f = S.filtros||{};
  if(f.etapa)    L = L.filter(function(l){ return l.etapa===f.etapa; });
  if(f.vencidos) L = L.filter(function(l){ return l.proxContacto && l.proxContacto<hoy() && l.etapa!=='firmado'; });
  if(f.calientes) L = L.filter(esCaliente);
  if(f.sinContacto) L = L.filter(function(l){ return !Number(l.intentos) && l.etapa!=='firmado'; });
  if(f.enVentana) L = L.filter(function(l){ return !esFrio(l); });
  if(f.resp)     L = L.filter(function(l){ return l.responsable===f.resp; });
  if(f.q){
    var q=f.q.toLowerCase();
    L = L.filter(function(l){
      return (l.nombre+' '+l.telefono+' '+l.email+' '+l.proyecto).toLowerCase().indexOf(q)>-1;
    });
  }
  L.sort(function(a,b){ return puntaje(b)-puntaje(a); });

  var h = '<div class="filtros">'
    + '<input type="search" placeholder="Buscar nombre, teléfono, proyecto…" value="'+esc(f.q||'')+'" oninput="S.filtros.q=this.value;vLeads()">'
    + '<select onchange="S.filtros.etapa=this.value;vLeads()"><option value="">Todas las etapas</option>'
    + ETAPAS.map(function(e){ return '<option value="'+e.k+'"'+(f.etapa===e.k?' selected':'')+'>'+e.n+'</option>'; }).join('')
    + '</select>';
  if(S.user.rol==='director'){
    h += '<select onchange="S.filtros.resp=this.value;vLeads()"><option value="">Todo el equipo</option>'
      + (S.cfg.asesores||[]).map(function(a){
          return '<option value="'+a.key+'"'+(f.resp===a.key?' selected':'')+'>'+esc(a.nombre)+'</option>'; }).join('')
      + '</select>';
  }
  h += '<button class="'+(f.enVentana?'bp':'bs')+' bmini" onclick="S.filtros.enVentana=!S.filtros.enVentana;vLeads()">Dentro de 100 días</button>'
    + '<button class="'+(f.calientes?'bp':'bs')+' bmini" onclick="S.filtros.calientes=!S.filtros.calientes;vLeads()">Calientes</button>'
    + '<button class="'+(f.sinContacto?'bp':'bs')+' bmini" onclick="S.filtros.sinContacto=!S.filtros.sinContacto;vLeads()">Sin contactar</button>'
    + '<button class="bs bmini" onclick="S.filtros={};vLeads()">Limpiar</button>'
    + '<button class="bp bmini" onclick="nuevoLead()">Nuevo lead</button>'
    + '<span style="margin-left:auto;color:var(--gris);font-size:12.5px">'+L.length+' leads</span></div>';

  h += '<div class="tarj">'
    + (L.length ? L.slice(0,300).map(filaLead).join('')
      : '<div class="vacio"><b>Ningún lead coincide</b>Ajusta los filtros o crea uno nuevo.</div>')
    + '</div>';
  if(L.length>300) h += '<p style="text-align:center;color:var(--gris);font-size:12px;margin-top:11px">Mostrando 300 de '+L.length+'. Afina la búsqueda para ver el resto.</p>';

  $('main').innerHTML = h;
}

/* ── Panel del lead ── */
function abrirLead(id){
  var l = S.leads.find(function(x){ return x.id===id; });
  if(!l) return;
  S.leadAbierto = id;

  var evs = S.eventos.filter(function(e){ return String(e.leadId)===String(id); }).reverse().slice(0,20);
  var edad = dias(l.fechaIngreso);

  var h = '<div class="phead"><button class="pcerrar" onclick="cerrarPanel()">×</button>'
    + '<h2>'+esc(l.nombre||'Sin nombre')+'</h2>'
    + '<p>'+[l.proyecto, l.ciudad, edad!==null?('hace '+edad+' d'):''].filter(Boolean).map(esc).join(' · ')+'</p></div>';

  h += '<div class="pbody">';

  h += '<div class="g2">'
    + campo('Teléfono','<input id="c-tel" type="tel" value="'+esc(l.telefono)+'">')
    + campo('Email','<input id="c-mail" type="email" value="'+esc(l.email)+'">')
    + '</div>';

  h += '<div class="g2">'
    + campo('Etapa','<select id="c-etapa">'+ETAPAS.map(function(e){
        return '<option value="'+e.k+'"'+(l.etapa===e.k?' selected':'')+'>'+e.n+'</option>'; }).join('')+'</select>')
    + campo('Próximo contacto','<input id="c-prox" type="date" value="'+esc(l.proxContacto)+'">')
    + '</div>';

  h += '<div class="g2">'
    + campo('Valor del proyecto','<input id="c-valor" type="number" value="'+esc(l.valor)+'" placeholder="0">')
    + campo('Área (m²)','<input id="c-m2" type="number" value="'+esc(l.m2)+'" placeholder="0">')
    + '</div>';

  if(S.user.rol==='director'){
    h += campo('Responsable','<select id="c-resp">'
      + (S.cfg.asesores||[]).map(function(a){
          return '<option value="'+a.key+'"'+(l.responsable===a.key?' selected':'')+'>'+esc(a.nombre)+'</option>'; }).join('')
      + '</select>');
  }

  h += campo('Perfil del cliente',
      '<select id="c-perfil" onchange="verGuia(this.value)"><option value="">Sin definir</option>'
    + Object.keys(PERFILES).map(function(k){
        return '<option value="'+k+'"'+(l.perfil===k?' selected':'')+'>'+PERFILES[k].ico+' '+PERFILES[k].n+'</option>'; }).join('')
    + '</select><div class="guia" id="guia"></div>');

  h += campo('Notas','<textarea id="c-nota" rows="3" placeholder="Qué se habló, qué sigue…">'+esc(l.nota)+'</textarea>');

  if(l.telefono){
    var tel = String(l.telefono).replace(/[^0-9]/g,'');
    h += '<div style="display:flex;gap:8px;margin:14px 0">'
      + '<button class="bs" style="flex:1" data-acc="ficha-wa">WhatsApp</button>'
      + '<button class="bs" style="flex:1" data-acc="ficha-tel">Llamada</button></div>';
  }

  h += '<div class="tit">Recorrido</div>';
  var hitos = [
    ['Ingresó',   l.fechaIngreso],
    ['Contactado',l.fechaContacto],
    ['Visita',    l.fechaVisita],
    ['Cotizado',  l.fechaCotizacion],
    ['Firmado',   l.fechaCierre]
  ].filter(function(x){ return x[1]; });

  if(hitos.length || evs.length){
    h += '<div class="crono">';
    hitos.forEach(function(x){
      h += '<div class="cev"><div class="f">'+x[1]+'</div><div>'+x[0]+'</div></div>';
    });
    evs.slice(0,8).forEach(function(e){
      h += '<div class="cev"><div class="f">'+String(e.ts).slice(0,10)+' · '+esc(e.usuario)+'</div>'
        +  '<div>'+esc(e.detalle||e.tipo)+'</div></div>';
    });
    h += '</div>';
  } else {
    h += '<p style="color:var(--gris);font-size:12.5px">Todavía no hay actividad registrada.</p>';
  }

  h += '</div>';
  h += '<div class="ppie"><button class="bp" style="flex:1" data-guardar="1">Guardar cambios</button>'
    + '<button class="bs" onclick="cerrarPanel()">Cerrar</button></div>';

  $('panel').innerHTML = h;
  $('panel').classList.add('on');
  $('velo').classList.add('on');
  var bg = $('panel').querySelector('[data-guardar]');
  if(bg) bg.addEventListener('click', function(){ guardarPanel(id); });
  $('panel').querySelectorAll('[data-acc]').forEach(function(b){
    b.addEventListener('click', function(){
      var a = b.getAttribute('data-acc');
      if(a === 'ficha-wa')  registrarContacto(id, 'whatsapp');
      if(a === 'ficha-tel') registrarContacto(id, 'llamada');
    });
  });
  if(l.perfil) verGuia(l.perfil);
}

function campo(lbl, html){
  return '<div class="campo"><label>'+lbl+'</label>'+html+'</div>';
}

function verGuia(k){
  var g = $('guia'); if(!g) return;
  if(!k || !PERFILES[k]){ g.style.display='none'; return; }
  var p = PERFILES[k];
  g.style.display='block';
  g.style.background = p.bg;
  g.style.border = '1px solid ' + p.bd;
  g.innerHTML = '<b style="color:'+p.bd+'">'+p.ico+' '+p.n+'</b>'
    + '<div>'+p.rec+'</div>'
    + '<div class="r"><b style="display:inline;color:var(--ok)">Funciona:</b> '+p.si+'</div>'
    + '<div class="r"><b style="display:inline;color:var(--mal)">Evita:</b> '+p.no+'</div>';
}

function guardarPanel(id){
  var g = function(x){ var e=$(x); return e ? e.value : undefined; };
  var campos = {
    telefono: g('c-tel'), email: g('c-mail'), etapa: g('c-etapa'),
    proxContacto: g('c-prox'), valor: g('c-valor'), m2: g('c-m2'),
    perfil: g('c-perfil'), nota: g('c-nota')
  };
  if($('c-resp')) campos.responsable = g('c-resp');

  guardarLead(id, campos, function(ok){
    if(ok){ cerrarPanel(); pintar(); }
  });
}

function registrarContacto(id, via){
  var l = S.leads.find(function(x){ return x.id===id; });
  if(!l) return;
  var tel = String(l.telefono||'').replace(/[^0-9]/g,'');
  if(via==='whatsapp' && tel){
    var txt = 'Hola '+primerNombre(l)+', te saluda '+S.user.nombre+' de MOSS Remodelaciones.';
    window.open('https://wa.me/57'+tel+'?text='+encodeURIComponent(txt),'_blank');
  } else if(tel){
    window.location.href = 'tel:+57'+tel;
  }
  api('evento.crear', { id:id, tipo:'contacto',
    detalle:'Contacto por '+via, usuario:S.user.nombre }, function(){});
  if(l.etapa==='nuevo'){
    guardarLead(id, { etapa:'contactado' }, function(){ pintar(); });
  }
}

function cerrarPanel(){
  $('panel').classList.remove('on');
  $('velo').classList.remove('on');
  S.leadAbierto = null;
}

/* ── Nuevo lead ── */
function nuevoLead(){
  var h = '<div class="phead"><button class="pcerrar" onclick="cerrarPanel()">×</button>'
    + '<h2>Nuevo lead</h2><p>Se asigna solo al siguiente asesor en turno</p></div><div class="pbody">'
    + campo('Nombre','<input id="n-nom" placeholder="Nombre del cliente">')
    + '<div class="g2">'
    + campo('Teléfono','<input id="n-tel" type="tel" placeholder="300 000 0000">')
    + campo('Email','<input id="n-mail" type="email" placeholder="correo@ejemplo.com">')
    + '</div><div class="g2">'
    + campo('Ciudad','<input id="n-ciu" placeholder="Bogotá">')
    + campo('Proyecto','<input id="n-proy" placeholder="Conjunto o dirección">')
    + '</div><div class="g2">'
    + campo('Área (m²)','<input id="n-m2" type="number" placeholder="0">')
    + campo('Valor estimado','<input id="n-val" type="number" placeholder="0">')
    + '</div><div class="g2">'
    + campo('Fuente','<select id="n-fuente"><option>Meta Ads</option><option>Google Ads</option>'
      + '<option>Referido</option><option>Instagram</option><option>WhatsApp</option><option>Otro</option></select>')
    + campo('Campaña','<input id="n-camp" placeholder="Opcional">')
    + '</div>'
    + campo('Notas','<textarea id="n-nota" rows="2" placeholder="Qué pidió, cómo llegó…"></textarea>')
    + '</div><div class="ppie"><button class="bp" style="flex:1" onclick="crearLead()">Crear lead</button>'
    + '<button class="bs" onclick="cerrarPanel()">Cancelar</button></div>';

  $('panel').innerHTML = h;
  $('panel').classList.add('on');
  $('velo').classList.add('on');
}

function crearLead(){
  var v = function(x){ return ($(x)||{}).value || ''; };
  if(!v('n-nom').trim() && !v('n-tel').trim()){
    toast('Escribe al menos el nombre o el teléfono', true); return;
  }
  estado('carga','Creando');
  api('lead.crear', {
    nombre:v('n-nom'), telefono:v('n-tel'), email:v('n-mail'), ciudad:v('n-ciu'),
    proyecto:v('n-proy'), m2:v('n-m2'), valor:v('n-val'), fuente:v('n-fuente'),
    campana:v('n-camp'), nota:v('n-nota'), usuario:S.user.nombre
  }, function(d){
    if(d && d.ok){
      toast('Lead creado y asignado a ' + nombreAsesor(d.responsable));
      cerrarPanel(); cargar();
    } else {
      estado('err','Error');
      toast(d && d.error ? d.error : 'No se pudo crear', true);
    }
  });
}

/* ── Equipo ── */
function vEquipo(){
  var ases = S.cfg.asesores || [];
  var h = '<div class="tit">Desempeño por asesor</div><div class="tarj" style="overflow-x:auto">'
    + '<table class="tabla"><thead><tr><th>Asesor</th><th class="num">Leads</th>'
    + '<th class="num">Cotizados</th><th class="num">Cerrados</th><th class="num">Conversión</th>'
    + '<th class="num">Valor cerrado</th><th class="num">Ciclo</th></tr></thead><tbody>';

  ases.forEach(function(a){
    var L = S.leads.filter(function(l){ return l.responsable===a.key; });
    var cot = L.filter(function(l){ return ['cotizado','negociacion','firmado'].indexOf(l.etapa)>-1; }).length;
    var cer = L.filter(function(l){ return l.etapa==='firmado'; });
    var val = cer.reduce(function(s,l){ return s+(Number(l.valor)||0); },0);
    var conv = L.length ? Math.round(cer.length/L.length*100) : 0;
    var ciclos = cer.map(function(l){ return dias(l.fechaIngreso, l.fechaCierre); })
      .filter(function(d){ return d!==null && d>=0; });

    h += '<tr><td><b>'+esc(a.nombre)+'</b>'
      + (a.activo ? '' : ' <span class="eti a">Inactivo</span>') + '</td>'
      + '<td class="num">'+L.length+'</td><td class="num">'+cot+'</td>'
      + '<td class="num">'+cer.length+'</td><td class="num">'+conv+'%</td>'
      + '<td class="num">'+corto(val)+'</td>'
      + '<td class="num">'+(prom(ciclos)!==null ? prom(ciclos)+' d' : '—')+'</td></tr>';
  });
  h += '</tbody></table></div>';

  var fuentes = {};
  S.leads.forEach(function(l){
    var f = l.fuente || 'Sin fuente';
    if(!fuentes[f]) fuentes[f] = { n:0, cerr:0, val:0 };
    fuentes[f].n++;
    if(l.etapa==='firmado'){ fuentes[f].cerr++; fuentes[f].val += Number(l.valor)||0; }
  });

  h += '<div class="tit">Rendimiento por fuente</div><div class="tarj" style="overflow-x:auto">'
    + '<table class="tabla"><thead><tr><th>Fuente</th><th class="num">Leads</th>'
    + '<th class="num">Cerrados</th><th class="num">Conversión</th><th class="num">Valor</th></tr></thead><tbody>';
  Object.keys(fuentes).sort(function(a,b){ return fuentes[b].val-fuentes[a].val; }).forEach(function(f){
    var d = fuentes[f];
    h += '<tr><td>'+esc(f)+'</td><td class="num">'+d.n+'</td><td class="num">'+d.cerr+'</td>'
      + '<td class="num">'+(d.n?Math.round(d.cerr/d.n*100):0)+'%</td>'
      + '<td class="num">'+corto(d.val)+'</td></tr>';
  });
  h += '</tbody></table></div>';

  $('main').innerHTML = h;
}

/* ── Comisiones ── */
function vComisiones(){
  var esc_ = S.cfg.comisionEscala || [{hasta:249999999,pct:1},{hasta:349999999,pct:2},{hasta:null,pct:3.5}];
  var metaProy = Number(S.cfg.metaProyectosMes||10);
  var ases = S.user.rol==='director' ? (S.cfg.asesores||[])
    : (S.cfg.asesores||[]).filter(function(a){ return a.key===S.user.key; });

  var h = '<div class="tit">Comisiones del periodo</div>';

  ases.forEach(function(a){
    var cerr = S.leads.filter(function(l){ return l.responsable===a.key && l.etapa==='firmado'; });
    var ventas = cerr.reduce(function(s,l){ return s+(Number(l.valor)||0); },0);
    var pct = 1;
    for(var i=0;i<esc_.length;i++){
      if(esc_[i].hasta===null || ventas<=esc_[i].hasta){ pct=esc_[i].pct; break; }
    }
    var bruta = ventas*pct/100;
    var cumpleMeta = cerr.length >= metaProy;
    var pagoAhora = cumpleMeta ? bruta*0.5 : bruta;
    var pendiente = cumpleMeta ? bruta*0.5 : 0;

    h += '<div class="tarj" style="padding:16px;margin-bottom:13px">'
      + '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px">'
      + '<span style="font-weight:700;font-size:15px">'+esc(a.nombre)+'</span>'
      + '<span class="eti '+(cumpleMeta?'v':'a')+'">'+cerr.length+' de '+metaProy+' proyectos</span></div>'
      + '<table class="tabla"><tbody>'
      + '<tr><td>Ventas cerradas</td><td class="num"><b>'+cop(ventas)+'</b></td></tr>'
      + '<tr><td>Porcentaje aplicado</td><td class="num">'+pct+'%</td></tr>'
      + '<tr><td>Comisión bruta</td><td class="num"><b>'+cop(bruta)+'</b></td></tr>'
      + (cumpleMeta
        ? '<tr><td>Pago ahora (50%)</td><td class="num" style="color:var(--ok)"><b>'+cop(pagoAhora)+'</b></td></tr>'
        + '<tr><td>Al entregar obra (50%)</td><td class="num" style="color:var(--alerta)"><b>'+cop(pendiente)+'</b></td></tr>'
        : '<tr><td>A pagar según recaudo</td><td class="num"><b>'+cop(pagoAhora)+'</b></td></tr>')
      + '</tbody></table>'
      + '<p style="font-size:11.5px;color:var(--gris);margin-top:9px">'
      + (cumpleMeta
        ? 'Cumple la meta de '+metaProy+' proyectos: aplica el esquema 50/50.'
        : 'Sin la meta de '+metaProy+' proyectos, la comisión se paga conforme a los pagos del cliente.')
      + '</p></div>';
  });

  h += '<div class="tit">Escala vigente</div><div class="tarj" style="overflow-x:auto">'
    + '<table class="tabla"><thead><tr><th>Ventas del periodo</th><th class="num">Comisión</th></tr></thead><tbody>';
  var prev = 0;
  esc_.forEach(function(e){
    var rango = e.hasta===null ? 'Más de '+cop(prev) : cop(prev)+' a '+cop(e.hasta);
    h += '<tr><td>'+rango+'</td><td class="num">'+e.pct+'%</td></tr>';
    prev = (e.hasta||0)+1;
  });
  h += '</tbody></table></div>';

  $('main').innerHTML = h;
}

/* ── Ajustes ── */
function vAjustes(){
  var ases = S.cfg.asesores || [];
  var h = '<div class="tit">Equipo comercial</div><div class="tarj" style="padding:15px">';
  ases.forEach(function(a,i){
    h += '<div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--linea)">'
      + '<div style="flex:1">'
      + '<input id="ase-'+i+'" value="'+esc(a.nombre)+'" onchange="renombrarAsesor('+i+',this.value)">'
      + '<div style="font-size:11.5px;color:var(--gris);margin-top:3px">'+a.key+'</div></div>'
      + '<button class="'+(a.activo?'bs':'bp')+' bmini" onclick="alternarAsesor('+i+')">'
      + (a.activo ? 'Activo' : 'Inactivo') + '</button></div>';
  });
  h += '<p style="font-size:12px;color:var(--gris);margin-top:11px">'
    + 'Los asesores inactivos no reciben leads nuevos. La asignación sigue rotando entre los activos.</p></div>';

  h += '<div class="tit">Metas y plazos</div><div class="tarj" style="padding:15px">'
    + '<div class="g2">'
    + campo('Meta mensual (COP)','<input id="a-meta" type="number" value="'+(S.cfg.metaMensual||150000000)+'">')
    + campo('Proyectos para el 50/50','<input id="a-proy" type="number" value="'+(S.cfg.metaProyectosMes||10)+'">')
    + '</div><div class="g2">'
    + campo('Margen mínimo (%)','<input id="a-margen" type="number" value="'+(S.cfg.margenMinimo||30)+'">')
    + campo('Días entre seguimientos','<input id="a-sla" type="number" value="'+(S.cfg.slaSeguimiento||3)+'">')
    + '</div>'
    + '<button class="bp" onclick="guardarAjustes()">Guardar ajustes</button></div>';

  h += '<div class="tit">Conexión</div><div class="tarj" style="padding:15px">'
    + '<p style="font-size:12.5px;color:var(--gris);margin-bottom:9px">'
    + 'Los datos viven en tu hoja de Google. Cada guardado escribe una sola fila.</p>'
    + '<button class="bs" onclick="probar()">Probar conexión</button></div>';

  $('main').innerHTML = h;
}

function renombrarAsesor(i, nombre){
  nombre = String(nombre||'').trim();
  if(!nombre){ toast('El nombre no puede quedar vacío', true); vAjustes(); return; }
  var ases = (S.cfg.asesores||[]).slice();
  ases[i].nombre = nombre;
  api('config.guardar', { clave:'asesores', valor:JSON.stringify(ases) }, function(d){
    if(d && d.ok){ S.cfg.asesores = ases; toast('Nombre actualizado'); pintar(); }
    else toast('No se pudo guardar el nombre', true);
  });
}

function alternarAsesor(i){
  var ases = (S.cfg.asesores||[]).slice();
  ases[i].activo = !ases[i].activo;
  api('config.guardar', { clave:'asesores', valor:JSON.stringify(ases) }, function(d){
    if(d && d.ok){ S.cfg.asesores = ases; toast('Equipo actualizado'); vAjustes(); }
    else toast('No se pudo actualizar', true);
  });
}

function guardarAjustes(){
  var pares = [
    ['metaMensual',      ($('a-meta')||{}).value],
    ['metaProyectosMes', ($('a-proy')||{}).value],
    ['margenMinimo',     ($('a-margen')||{}).value],
    ['slaSeguimiento',   ($('a-sla')||{}).value]
  ];
  var pend = pares.length, fallo = false;
  pares.forEach(function(p){
    api('config.guardar', { clave:p[0], valor:p[1] }, function(d){
      if(!(d&&d.ok)) fallo = true;
      S.cfg[p[0]] = p[1];
      if(--pend === 0) toast(fallo ? 'Algunos ajustes no se guardaron' : 'Ajustes guardados', fallo);
    });
  });
}

function probar(){
  estado('carga','Probando');
  api('ping', {}, function(d){
    if(d && d.ok){ estado('ok','Conectado'); toast('Conexión correcta · v'+d.version); }
    else { estado('err','Sin conexión'); toast('No hay respuesta del servidor', true); }
  });
}
</script>
</body>
</html>
