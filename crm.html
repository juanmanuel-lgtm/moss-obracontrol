<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSS CRM Comercial v32</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--v:#2D4A35;--vc:#E8F0EB;--bv:#C2D1C5;--d:#A67C52;--cr:#F2EBE0;--bc:#FAF7F3;--ba:#EEEAE3;--g:#6B6560;--gc:#B5AFA8;--b:#DDD5C8;--ok:#3A6B45;--ob:#E8F0EB;--am:#C17B2A;--ab:#FDF0E0;--ro:#B5362A;--rb:#FAEBE9;--az:#2D5A8A;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cr);color:#1C1C1A;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bc);border-bottom:1px solid var(--b);padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(44,64,50,.08);}
.tlogo{width:32px;height:32px;background:var(--v);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--d);flex-shrink:0;}
.ttitle{font-weight:700;font-size:13px;color:var(--v);}
.tsub{font-size:9px;color:var(--gc);text-transform:uppercase;letter-spacing:1px;}
.topright{margin-left:auto;display:flex;gap:8px;align-items:center;}
.dbadge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:10px;cursor:pointer;border:1px solid;}
.dok{background:var(--vc);border-color:var(--bv);color:var(--ok);}
.dno{background:var(--ab);border-color:#C17B2A40;color:var(--am);}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.src-badge{font-size:9px;padding:3px 7px;border-radius:6px;font-weight:700;border:1px solid;}
.src-odoo{background:#714B67;color:#fff;border-color:#714B67;}
.src-bot{background:var(--ab);color:var(--am);border-color:var(--am);}
.navbar{background:var(--v);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;box-shadow:inset 0 -1px 0 rgba(0,0,0,.18);}
.navbar::-webkit-scrollbar{display:none;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:64px;transition:background .18s;}
.nitem:hover{background:rgba(255,255,255,.06);}
.nitem.on{border-bottom-color:var(--d);background:rgba(255,255,255,.1);}
.nic{font-size:16px;}.nlb{font-size:9px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.7px;}
.nitem.on .nlb{color:#fff;}
.content{flex:1;padding:13px 13px 80px;}
.card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;}
.cp{padding:14px;}
.chd{padding:10px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.chd span{font-size:11px;color:#fff;font-weight:600;}
.chd small{font-size:9px;color:rgba(255,255,255,.6);}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:480px){.kgrid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:10px 12px;}
.kl{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.kv{font-size:20px;font-weight:700;line-height:1;}
.ks{font-size:9px;color:var(--gc);margin-top:3px;}
.kv.ok{color:var(--ok);}.kv.am{color:var(--am);}.kv.ro{color:var(--ro);}.kv.d{color:var(--d);}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.bok{background:#E8F0EB;color:#3A6B45;}.bam{background:#FDF0E0;color:#C17B2A;}.bro{background:#FAEBE9;color:#B5362A;}.bd{background:#F0EDE8;color:#A67C52;}.bgr{background:var(--ba);color:var(--g);}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--b);cursor:pointer;background:var(--bc);transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--vc);}
.lrow.venc{border-left:4px solid var(--ro);background:var(--rb);}
.lrow.hoy{border-left:4px solid var(--am);background:var(--ab);}
.lrow.oro{border-left:4px solid var(--d);}
.lnm{font-size:13px;font-weight:700;}
.ldt{font-size:10.5px;color:var(--g);margin-top:2px;line-height:1.4;}
.lright{margin-left:auto;display:flex;gap:5px;align-items:center;flex-shrink:0;}
.wa-btn{background:#2F7D4F;color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
.kan{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.kcol{min-width:210px;background:var(--ba);border:1px solid var(--b);border-radius:11px;padding:9px;flex-shrink:0;}
.kctit{font-size:10px;color:var(--v);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.kcard{background:var(--bc);border:1px solid var(--b);border-radius:9px;padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;}
.kcard:hover{box-shadow:0 2px 8px rgba(44,64,50,.12);}
.kcard b{display:block;font-size:12.5px;color:#1C1C1A;}
.kcard .ks2{color:var(--g);font-size:10px;margin-top:3px;}
.kcard .odoo-tag{font-size:9px;background:#714B67;color:#fff;padding:2px 5px;border-radius:5px;display:inline-block;margin-top:3px;}
.kcard .bot-tag{font-size:9px;background:var(--ab);color:var(--am);padding:2px 5px;border-radius:5px;display:inline-block;margin-top:3px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--v);color:#fff;text-align:left;padding:8px 10px;font-size:10.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--b);}
tr:last-child td{border-bottom:none;}
.flabel{font-size:9px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.pbar-wrap{background:var(--ba);border-radius:8px;height:10px;overflow:hidden;margin:6px 0 4px;}
.pbar{height:100%;border-radius:8px;background:var(--v);transition:.4s;}
.alert-m2{font-size:11px;color:var(--ro);font-weight:700;padding:6px 10px;background:var(--rb);border-radius:7px;margin-top:6px;display:none;}
.modalbg{position:fixed;inset:0;background:rgba(28,28,26,.5);display:none;z-index:200;align-items:flex-end;justify-content:center;}
.modalbg.open{display:flex;}
.modal{background:var(--bc);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 18px 32px;}
.modal .mh{font-size:15px;font-weight:700;color:var(--v);margin-bottom:2px;}
.modal .ms{font-size:11px;color:var(--g);margin-bottom:14px;}
.tpl-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tpl-btn{background:var(--ba);border:1px solid var(--b);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--v);cursor:pointer;font-family:inherit;}
.tpl-btn:hover{background:var(--vc);}
.btm-bar{display:flex;gap:8px;margin-top:14px;}
.btn-p{background:var(--v);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;}
.btn-s{background:var(--ba);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--g);}
.btn-d{background:var(--d);color:#fff;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--v);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;box-shadow:0 -2px 12px rgba(44,64,50,.2);}
.save-bar span{color:rgba(255,255,255,.8);font-size:12px;}
.save-btn{background:#fff;border:none;border-radius:8px;color:var(--v);padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.carta-wrap{background:var(--bc);border:1px solid var(--b);border-radius:12px;padding:32px;font-size:13px;line-height:1.7;display:none;margin-top:14px;}
.carta-wrap h3{color:var(--v);}
@media print{body *{visibility:hidden;}.carta-wrap,.carta-wrap *{visibility:visible;}.carta-wrap{display:block!important;position:absolute;left:0;top:0;width:100%;border:none;padding:40px;}}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--v);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:32px 16px;color:var(--gc);font-size:13px;}
.nota-tip{font-size:10px;color:var(--ok);background:var(--vc);border:1px solid var(--bv);border-radius:7px;padding:5px 9px;margin-bottom:10px;}
.sec-tit{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin:14px 0 8px;}
.info-box{background:var(--ab);border:1px solid var(--am);border-radius:9px;padding:11px 14px;margin-bottom:12px;font-size:12px;color:#7a4e16;line-height:1.5;}
.odoo-banner{background:#F3EDF7;border:1px solid #C9B8D5;border-radius:9px;padding:11px 14px;margin-bottom:12px;font-size:12px;color:#714B67;line-height:1.5;}
.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.fchip{background:var(--ba);border:1px solid var(--b);border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);}
.fchip.on{background:var(--v);color:#fff;border-color:var(--v);}
.stars{color:var(--d);font-size:12px;}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="tlogo">M</div>
  <div><div class="ttitle">CRM Comercial MOSS</div><div class="tsub">v32 · Odoo + Bot integrado</div></div>
  <div class="topright">
    <span class="src-badge src-odoo">Odoo</span>
    <span class="src-badge src-bot">Bot</span>
    <div class="dbadge dno" id="badge" onclick="sync()">
      <div class="dot" style="background:var(--am)"></div>
      <span id="badge-txt">Cargando…</span>
    </div>
  </div>
</div>

<div class="navbar">
  <div class="nitem on" onclick="nav('seg',this)"><div class="nic">📋</div><div class="nlb">Seguimiento</div></div>
  <div class="nitem" onclick="nav('pipe',this)"><div class="nic">🔀</div><div class="nlb">Pipeline</div></div>
  <div class="nitem" onclick="nav('bot',this)"><div class="nic">🤖</div><div class="nlb">Leads Bot</div></div>
  <div class="nitem" onclick="nav('com',this)"><div class="nic">💰</div><div class="nlb">Comisiones</div></div>
  <div class="nitem" onclick="nav('met',this)"><div class="nic">📊</div><div class="nlb">Métricas</div></div>
</div>

<div class="content" id="content"></div>
</div>

<div class="modalbg" id="mbg" onclick="if(event.target===this)cModal()"><div class="modal" id="modal"></div></div>
<div class="save-bar" id="savebar" style="display:none">
  <span id="savemsg">Cambios sin sincronizar</span>
  <button class="save-btn" onclick="sync()">☁ Guardar</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
var CFG={
  scriptUrl:'https://script.google.com/macros/s/AKfycbyg653sAcOCSmU-pVDF5wEPo8M8to0-Gj3lbTUGdMpLS9GRZlKsdII-sZ4Pt0oukTDB9w/exec',
  odooUrl:'',        // ← pegar URL Odoo: https://tuempresa.odoo.com
  odooKey:'',        // ← API Key de Odoo (Ajustes → Usuarios → API Keys)
  igUrl:'https://www.instagram.com/moss.arquitectura',
  vendedor:'Lizeth Figueroa',
  empresa:'MOSS Arquitectura y Mobiliario S.A.S. — NIT 901.159.078-6',
  metaMes:300000000,
  umbral:150000000,
  pisoM2:1200000,
  minCto:18000000
};

function tasa(v){if(v<=150e6)return 0;if(v<=250e6)return 0.01;if(v<=350e6)return 0.02;return 0.035;}

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
var LEADS=[], BOT_LEADS=[], SEG={}, ODOO_OPS=[], _dirty=false, _vista='seg', _filtro='todos';
var _mesCom=hoyStr().slice(0,7);

// Etapas internas del CRM (mapea también las columnas de Odoo)
var ETAPAS=[
  ['prospecto','Prospecto','📥'],
  ['contactado','Contactado','📞'],
  ['fase0','Fase 0 · Visita','🏠'],
  ['cotizado','Cotización enviada','📄'],
  ['fase1','Fase 1 · Negociación','🤝'],
  ['vendido','Vendido ✅','✅'],
  ['perdido','Dormido / Perdido','💤']
];

// Mapa columnas Odoo → etapas internas
var ODOO_MAP={
  'Cliente que cierra en meses fu':'contactado',
  'Pendiente Reunión Fase 0':'fase0',
  'Cotización enviada':'cotizado',
  'Alta probabilidad de cierre':'fase1',
  'Contrato Firmado':'vendido'
};

// Plantillas protocolo 1·3·7·14·21
var TPL=[
  ['Día 1 — Cotización','Hola {n}! Soy {x} de MOSS 🌿 Te comparto la cotización de tu proyecto. Incluye plazo fijo de 2 meses, póliza de cumplimiento y 1 año de garantía ✅ ¿Qué día te queda bien para revisarla juntos?'],
  ['Día 3 — Video obra','Hola {n}! Mira cómo quedó una remodelación similar a la tuya que acabamos de entregar 🏡 {ig} ¿Te imaginas tu apartamento así? Cualquier duda de la cotización me avisas.'],
  ['Día 7 — Reservar cupo','Hola {n} 👋 Esta semana iniciamos 2 obras y quiero reservarte cupo de inicio. Si firmamos esta semana congelamos los precios de materiales 🔒 ¿Agendamos para definir?'],
  ['Día 14 — Visita obra','Hola {n}, ¿te gustaría visitar una de nuestras obras en curso? 👷 Es la mejor forma de ver la calidad MOSS antes de decidir. ¡Con gusto te coordino la visita!'],
  ['Día 21 — Último contacto','Hola {n} 😊 No quiero ser insistente — si este no es el momento para tu remodelación, lo dejamos para más adelante y te sigo compartiendo proyectos por redes. ¿Lo retomamos pronto?']
];

// ══════════════════════════════════════════════
// CARGA DE DATOS
// ══════════════════════════════════════════════
function cargar(){
  setBadge(false,'Cargando leads…');
  var cbName='mosscrm_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    setBadge(false,'Sin conexión — revisa el Apps Script');
    delete window[cbName]; try{document.body.removeChild(sc);}catch(e){}
    render();
  },12000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(!d||!d.ok){setBadge(false,'Error del servidor');render();return;}
    LEADS=d.leads||[]; SEG=d.seguimiento||{};
    LEADS.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    setBadge(true,'✓ Conectado · '+LEADS.length+' leads');
    if(CFG.odooUrl&&CFG.odooKey)cargarOdoo();
    else render();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(false,'Error');render();};
  sc.src=CFG.scriptUrl+'?action=crm&callback='+cbName;
  document.body.appendChild(sc);
}

function cargarOdoo(){
  // Llamada a la API JSON-RPC de Odoo para obtener oportunidades CRM
  var body=JSON.stringify({jsonrpc:'2.0',method:'call',id:1,
    params:{model:'crm.lead',method:'search_read',
      args:[[['type','=','opportunity']]],
      kwargs:{fields:['name','partner_name','planned_revenue','stage_id','user_id','activity_date_deadline','probability','phone','email_from'],
              limit:200,order:'planned_revenue desc'}}});
  fetch(CFG.odooUrl+'/web/dataset/call_kw',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-API-Key':CFG.odooKey},
    body:body
  }).then(function(r){return r.json();})
    .then(function(d){
      var ops=(d.result&&d.result.records)||d.result||[];
      ODOO_OPS=ops.map(function(o){
        var etapa=o.stage_id?o.stage_id[1]:'';
        var etapaInterna=Object.keys(ODOO_MAP).find(function(k){return etapa.startsWith(k.slice(0,10));});
        return {
          id:'odoo_'+o.id,
          nombre:o.partner_name||o.name||'',
          proyecto:o.name||'',
          valor:o.planned_revenue||0,
          etapaOdoo:etapa,
          stage:etapaInterna?ODOO_MAP[etapaInterna]:'contactado',
          responsable:o.user_id?o.user_id[1]:'',
          contacto:o.phone||o.email_from||'',
          proxContacto:o.activity_date_deadline||'',
          fuente:'odoo'
        };
      });
      // Fusionar: leads Odoo van al SEG si no existen
      ODOO_OPS.forEach(function(o){
        if(!SEG[o.id]) SEG[o.id]={stage:o.stage,nota:'',proxContacto:o.proxContacto,intentos:0,
          presupuestoCliente:'',valorCotizado:String(o.valor),valorCerrado:'',m2:'',
          responsable:o.responsable,fase1Agendada:'',fechaCierre:'',anticipoOK:'',clasificacion:'',historial:[],fuente:'odoo'};
      });
      setBadge(true,'Odoo + Bot ✓');
      render();
    })
    .catch(function(){
      setBadge(true,'Solo Bot (Odoo: config pendiente)');
      render();
    });
}

function nuevoSeg(l){
  var oro=/si/i.test(l.cumplePresupuesto||'')&&/menor a un mes/i.test(l.tiempoInicio||'');
  return{stage:l.campana&&/vendido/i.test(l.campana||'')?'vendido':'prospecto',
    nota:'',proxContacto:'',intentos:0,presupuestoCliente:'',valorCotizado:'',
    valorCerrado:'',m2:l.m2||'',responsable:CFG.vendedor,fase1Agendada:'',
    fechaCierre:'',anticipoOK:'',clasificacion:oro?'Caliente':'',historial:[],fuente:'bot'};
}
function esOro(l){
  var s=SEG[l.id]||{};
  return s.clasificacion==='Caliente'||(/si/i.test(l.cumplePresupuesto||'')&&/menor a un mes/i.test(l.tiempoInicio||''));
}
function todosLosLeads(){return LEADS.concat(ODOO_OPS);}

// ══════════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════════
function nav(v,el){
  _vista=v;
  document.querySelectorAll('.nitem').forEach(function(n){n.classList.remove('on');});
  if(el)el.classList.add('on');
  render();
}
function render(){
  var c=document.getElementById('content');
  if(_vista==='seg') c.innerHTML=rSeg();
  else if(_vista==='pipe') c.innerHTML=rPipe();
  else if(_vista==='bot') c.innerHTML=rBot();
  else if(_vista==='com') c.innerHTML=rCom();
  else c.innerHTML=rMet();
}

// ══════════════════════════════════════════════
// VISTA: SEGUIMIENTO (todos los leads priorizados)
// ══════════════════════════════════════════════
function rSeg(){
  var hoy=hoyStr();
  var todos=todosLosLeads();
  var venc=[],hoyL=[],oro=[],resto=[];
  todos.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var pc=s.proxContacto||'';
    if(pc&&pc<hoy) venc.push(l);
    else if(pc===hoy) hoyL.push(l);
    else if(esOro(l)&&!s.intentos) oro.push(l);
    else resto.push(l);
  });
  var act=todos.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='vendido'&&s.stage!=='perdido';});

  var h='<div class="kgrid">'
    +K(venc.length,'Vencidos ⚠',venc.length?'ro':'ok',venc.length?'Atención inmediata':'Al día')
    +K(hoyL.length,'Para hoy',hoyL.length?'am':'','Programados')
    +K(oro.length,'Leads oro sin contactar','d','< 1 hora (Política)')
    +K(act.length,'Total en pipeline','','activos')
    +'</div>';

  // Banner Odoo
  if(CFG.odooUrl&&CFG.odooKey&&ODOO_OPS.length){
    h+='<div class="odoo-banner">🟣 <b>Odoo conectado</b> — '+ODOO_OPS.length+' oportunidades del pipeline. Los leads del bot y de Odoo se muestran unificados. Editar desde aquí sincroniza el seguimiento; para cambiar etapas en Odoo, usar Odoo directamente.</div>';
  } else {

// MÉTRICAS
// ══════════════════════════════════════════════
function rMet(){
  var todos=todosLosLeads();
  var act=todos.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='perdido';});
  var cot=todos.filter(function(l){return Number((SEG[l.id]||{}).valorCotizado)>0;});
  var ven=todos.filter(function(l){return (SEG[l.id]||{}).stage==='vendido';});
  var oro=LEADS.filter(function(l){return esOro(l)&&(SEG[l.id]||{}).stage!=='vendido'&&(SEG[l.id]||{}).stage!=='perdido';});
  var conPres=act.filter(function(l){return Number((SEG[l.id]||{}).presupuestoCliente)>0;});
  var tC=cot.length?Math.round(ven.length/cot.length*100):0;
  var descs=ven.map(function(l){var s=SEG[l.id];return(Number(s.valorCotizado)>0&&Number(s.valorCerrado)>0)?(1-s.valorCerrado/s.valorCotizado)*100:null;}).filter(function(x){return x!==null;});
  var dP=descs.length?Math.round(descs.reduce(function(a,b){return a+b;},0)/descs.length):0;
  var pms=ven.map(function(l){var s=SEG[l.id];return(Number(s.m2)>0&&Number(s.valorCerrado)>0)?s.valorCerrado/s.m2:null;}).filter(function(x){return x;});
  var pmP=pms.length?Math.round(pms.reduce(function(a,b){return a+b;},0)/pms.length):0;
  var pP=act.length?Math.round(conPres.length/act.length*100):0;

  var h='<div class="card"><div class="chd"><span>Métricas viernes — Playbook MOSS</span><small>Odoo + Bot</small></div><div class="cp">'
    +'<div class="kgrid">'
    +K(oro.length,'Leads oro sin contactar',oro.length?'ro':'ok',oro.length?'Meta: 0':'✅ OK')
    +K(pP+'%','Con presupuesto Fase 0',pP<100?'am':'ok','Meta: 100%')
    +K(tC+'%','Tasa de cierre',tC<30?'am':'ok','Meta: 30%')
    +K(dP+'%','Descuento promedio',dP>0?'am':'ok','Meta: 0%')
    +'</div><div class="kgrid">'
    +K(pmP?fmtCOP(pmP):'—','$/m² promedio cerrado',pmP&&pmP<CFG.pisoM2?'ro':'ok','Piso: $1.200.000')
    +K(ven.length,'Vendidos total','','')
    +K(ODOO_OPS.length,'Oportunidades Odoo','','pipeline activo')
    +K(LEADS.length,'Leads bot activos','','de '+118+' válidos')
    +'</div>'
    +'<div class="nota-tip">SLA: contacto &lt;1h · cotización &lt;48h · seguimiento &lt;24h · mín 5 contactos antes de marcar perdido · contrato mín $18M</div>'
    +'</div></div>';

  // Desglose pipeline Odoo (del screenshot)
  h+='<div class="card"><div class="chd"><span>Pipeline Odoo — resumen</span><small>Datos del snapshot</small></div><div class="cp">'
    +'<table><tr><th>Etapa Odoo</th><th>Valor pipeline</th></tr>'
    +'<tr><td>Cliente que cierra en meses futuros</td><td>$294M</td></tr>'
    +'<tr><td>Pendiente Reunión Fase 0</td><td>$0</td></tr>'
    +'<tr><td>Cotización enviada</td><td>$909M</td></tr>'
    +'<tr><td>Alta probabilidad de cierre</td><td>$175M</td></tr>'
    +'<tr><td>Contrato Firmado</td><td>—</td></tr>'
    +'<tr style="background:var(--vc)"><td><b>TOTAL PIPELINE</b></td><td><b>$1.378M</b></td></tr>'
    +'</table>'
    +'<div style="font-size:11px;color:var(--am);margin-top:10px">⚠ La mayor parte del pipeline ($909M) está en cotización enviada sin seguimiento activo — es la palanca más importante para cumplir la meta anual.</div>'
    +'</div></div>';

  // Funnel bot
  h+='<div class="card"><div class="chd"><span>Embudo chatbot</span></div><div class="cp">';
  var steps=[['Total filas bot',1986],['Leads válidos (nombre+contacto)',118],['Cumplen presupuesto',60],['Oro (presupuesto + inicio <1 mes)',31],['Marcados vendidos',9]];
  steps.forEach(function(f,i){
    var pct=Math.round(f[1]/steps[0][1]*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>'+f[0]+'</span><span><b>'+f[1]+'</b> ('+pct+'%)</span></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+Math.max(pct,2)+'%"></div></div></div>';
  });
  h+='</div></div>';
  return h;
}

// ══════════════════════════════════════════════
// SYNC
// ══════════════════════════════════════════════
function sync(){
  if(!_dirty){toast('Sin cambios pendientes');return;}
  setBadge(false,'Guardando…');
  var cbName='mosssave_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    delete window[cbName];try{document.body.removeChild(sc);}catch(e){}
    toast('⚠ Timeout guardando');
  },15000);
  window[cbName]=function(d){
    clearTimeout(tm);delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(d&&d.ok){_dirty=false;document.getElementById('savebar').style.display='none';
      setBadge(true,'Guardado ✓');toast('✅ Guardado · '+d.guardados+' leads');}
    else{toast('⚠ Error al guardar');}
  };
  sc.onerror=function(){clearTimeout(tm);toast('⚠ Sin conexión');};
  var pl=encodeURIComponent(JSON.stringify(SEG));
  sc.src=CFG.scriptUrl+'?action=crm.guardar&callback='+cbName+'&payload='+pl;
  document.body.appendChild(sc);
}
function setBadge(ok,txt){
  var b=document.getElementById('badge'),t=document.getElementById('badge-txt');
  b.className='dbadge '+(ok?'dok':'dno');
  b.querySelector('.dot').style.background=ok?'var(--ok)':'var(--am)';
  t.textContent=txt;
}
