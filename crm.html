<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSS CRM Comercial v33</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--v:#2D4A35;--vc:#E8F0EB;--bv:#C2D1C5;--d:#A67C52;--cr:#F2EBE0;--bc:#FAF7F3;--ba:#EEEAE3;--g:#6B6560;--gc:#B5AFA8;--b:#DDD5C8;--ok:#3A6B45;--am:#C17B2A;--ab:#FDF0E0;--ro:#B5362A;--rb:#FAEBE9;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cr);color:#1C1C1A;min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v);}
.login-box{background:var(--bc);border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{width:48px;height:48px;background:var(--v);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:var(--d);margin:0 auto 16px;}
.login-box h2{text-align:center;color:var(--v);font-size:18px;margin-bottom:6px;}
.login-box p{text-align:center;color:var(--g);font-size:12px;margin-bottom:20px;}
.login-box input{width:100%;padding:11px 13px;border:1px solid var(--b);border-radius:9px;font-size:14px;margin-bottom:10px;font-family:inherit;}
.login-box input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-err{color:var(--ro);font-size:12px;text-align:center;margin-top:8px;display:none;}
.login-role{font-size:10px;color:var(--gc);text-align:center;margin-top:10px;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bc);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(44,64,50,.08);}
.tlogo{width:30px;height:30px;background:var(--v);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--d);}
.ttitle{font-weight:700;font-size:13px;color:var(--v);}
.tsub{font-size:9px;color:var(--gc);text-transform:uppercase;letter-spacing:1px;}
.topright{margin-left:auto;display:flex;gap:8px;align-items:center;}
.user-chip{font-size:10px;padding:4px 9px;border-radius:7px;background:var(--vc);color:var(--v);font-weight:700;border:1px solid var(--bv);}
.dbadge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:10px;cursor:pointer;border:1px solid;}
.dok{background:var(--vc);border-color:var(--bv);color:var(--ok);}
.dno{background:var(--ab);border-color:#C17B2A40;color:var(--am);}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navbar{background:var(--v);display:flex;overflow-x:auto;scrollbar-width:none;}
.navbar::-webkit-scrollbar{display:none;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:58px;transition:background .15s;}
.nitem.on{border-bottom-color:var(--d);background:rgba(255,255,255,.1);}
.nic{font-size:15px;}.nlb{font-size:8.5px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;}
.nitem.on .nlb{color:#fff;}
.content{flex:1;padding:12px 12px 80px;}

/* CARDS + KPIs */
.card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;}
.chd{padding:9px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.chd span{font-size:11px;color:#fff;font-weight:600;}.chd small{font-size:9px;color:rgba(255,255,255,.6);}
.cp{padding:13px;}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:460px){.kgrid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:10px 11px;}
.kl{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px;}
.kv{font-size:19px;font-weight:700;}.ks{font-size:9px;color:var(--gc);margin-top:3px;}
.kv.ok{color:var(--ok);}.kv.am{color:var(--am);}.kv.ro{color:var(--ro);}.kv.d{color:var(--d);}

/* ROWS */
.lrow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--b);cursor:pointer;background:var(--bc);transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--vc);}
.lrow.venc{border-left:4px solid var(--ro);background:var(--rb);}
.lrow.hoy{border-left:4px solid var(--am);background:var(--ab);}
.lrow.oro{border-left:4px solid var(--d);}
.lnm{font-size:13px;font-weight:700;}
.ldt{font-size:10.5px;color:var(--g);margin-top:2px;line-height:1.4;}
.lright{margin-left:auto;display:flex;gap:5px;align-items:center;flex-shrink:0;}
.wa-btn{background:#2F7D4F;color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.bok{background:#E8F0EB;color:#3A6B45;}.bam{background:#FDF0E0;color:#C17B2A;}.bro{background:#FAEBE9;color:#B5362A;}.bd{background:#F0EDE8;color:#A67C52;}.bgr{background:var(--ba);color:var(--g);}

/* KANBAN */
.kan{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.kcol{min-width:200px;background:var(--ba);border:1px solid var(--b);border-radius:11px;padding:9px;flex-shrink:0;}
.kctit{font-size:10px;color:var(--v);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;}
.kcard{background:var(--bc);border:1px solid var(--b);border-radius:9px;padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;}
.kcard:hover{box-shadow:0 2px 8px rgba(44,64,50,.12);}
.kcard b{display:block;font-size:12.5px;}.kcard .ks2{color:var(--g);font-size:10px;margin-top:3px;}

/* TABLA */
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--v);color:#fff;text-align:left;padding:8px 10px;font-size:10.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--b);}

/* FORM */
.flabel{font-size:9px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.pbar-wrap{background:var(--ba);border-radius:8px;height:10px;overflow:hidden;margin:6px 0 4px;}
.pbar{height:100%;border-radius:8px;background:var(--v);transition:.4s;}
.alert-m2{font-size:11px;color:var(--ro);font-weight:700;padding:6px 10px;background:var(--rb);border-radius:7px;margin-top:6px;display:none;}

/* MODAL */
.modalbg{position:fixed;inset:0;background:rgba(28,28,26,.5);display:none;z-index:200;align-items:flex-end;justify-content:center;}
.modalbg.open{display:flex;}
.modal{background:var(--bc);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 18px 32px;}
.mh{font-size:15px;font-weight:700;color:var(--v);margin-bottom:2px;}
.ms{font-size:11px;color:var(--g);margin-bottom:14px;}
.tpl-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tpl-btn{background:var(--ba);border:1px solid var(--b);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--v);cursor:pointer;font-family:inherit;}
.tpl-btn:hover{background:var(--vc);}
.btm-bar{display:flex;gap:8px;margin-top:14px;}
.btn-p{background:var(--v);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;}
.btn-s{background:var(--ba);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--g);}
.btn-d{background:var(--d);color:#fff;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--v);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
.save-bar span{color:rgba(255,255,255,.8);font-size:12px;}
.save-btn{background:#fff;border:none;border-radius:8px;color:var(--v);padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.carta-wrap{background:var(--bc);border:1px solid var(--b);border-radius:12px;padding:32px;font-size:13px;line-height:1.7;display:none;margin-top:14px;}
@media print{body *{visibility:hidden;}.carta-wrap,.carta-wrap *{visibility:visible;}.carta-wrap{display:block!important;position:absolute;left:0;top:0;width:100%;border:none;padding:40px;}}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--v);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:28px 16px;color:var(--gc);font-size:13px;}
.nota-tip{font-size:10px;color:var(--ok);background:var(--vc);border:1px solid var(--bv);border-radius:7px;padding:5px 9px;margin-bottom:10px;}
.sec-tit{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin:14px 0 8px;}
.info-box{border-radius:9px;padding:10px 13px;margin-bottom:10px;font-size:12px;line-height:1.5;}
.info-am{background:var(--ab);border:1px solid var(--am);color:#7a4e16;}
.info-ro{background:var(--rb);border:1px solid var(--ro);color:#7a1a10;}
.info-ok{background:var(--vc);border:1px solid var(--bv);color:var(--ok);}
.fchip{background:var(--ba);border:1px solid var(--b);border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);}
.fchip.on{background:var(--v);color:#fff;border-color:var(--v);}
.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* POLITICAS */
.pol-sec{margin-bottom:16px;}
.pol-sec h3{color:var(--v);font-size:13px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--d);}
.pol-sec p,.pol-sec li{font-size:12px;color:#2A2C24;line-height:1.65;margin-bottom:4px;}
.pol-sec ul{padding-left:16px;}
.pol-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.pol-kpi-item{background:var(--ba);border-radius:8px;padding:9px 11px;font-size:11.5px;}
.pol-kpi-item b{display:block;color:var(--v);font-size:12px;margin-bottom:3px;}
.escalera-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.escalera-table th{background:var(--v);color:#fff;padding:7px 10px;text-align:left;}
.escalera-table td{padding:7px 10px;border-bottom:1px solid var(--b);}
.escalera-table tr:last-child td{border-bottom:none;}
.alerta-3m{background:var(--rb);border:1px solid var(--ro);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.alerta-3m h4{color:var(--ro);font-size:13px;font-weight:700;margin-bottom:4px;}
.alerta-3m p{font-size:11.5px;color:#7a1a10;line-height:1.5;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">M</div>
    <h2>MOSS CRM</h2>
    <p>Ingresa tus credenciales para continuar</p>
    <input type="text" id="usr" placeholder="Usuario" autocomplete="username">
    <input type="password" id="pwd" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err">Usuario o contraseña incorrectos</div>
    <div class="login-role" id="login-hint"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
<div class="topbar">
  <div class="tlogo">M</div>
  <div><div class="ttitle">CRM Comercial MOSS</div><div class="tsub">v33 · Playbook 2026</div></div>
  <div class="topright">
    <span class="user-chip" id="user-chip">—</span>
    <div class="dbadge dno" id="badge" onclick="sync()">
      <div class="dot" style="background:var(--am)"></div>
      <span id="badge-txt">Cargando…</span>
    </div>
  </div>
</div>
<div class="navbar" id="navbar"></div>
<div class="content" id="content"></div>
</div>

<div class="modalbg" id="mbg" onclick="if(event.target===this)cModal()"><div class="modal" id="modal"></div></div>
<div class="save-bar" id="savebar" style="display:none">
  <span>Cambios sin sincronizar</span>
  <button class="save-btn" onclick="sync()">☁ Guardar</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// USUARIOS Y ROLES
// ═══════════════════════════════════════════════
var USERS = {
  'juanma':  { pwd:'moss2026CEO', rol:'ceo',      nombre:'Juan Ma · CEO' },
  'liz':     { pwd:'liz2026',     rol:'comercial', nombre:'Lizeth Figueroa' },
  'care':    { pwd:'moss2026',    rol:'comercial', nombre:'Equipo Comercial' }
};
// CEO ve todo. Comercial ve seguimiento, pipeline, sus comisiones y políticas.
// Comisiones: CEO puede ver cualquier mes. Comercial solo ve el suyo.

var SESSION = null; // { usuario, rol, nombre }

function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value;
  var user=USERS[u];
  if(!user||user.pwd!==p){
    document.getElementById('login-err').style.display='block';
    return;
  }
  SESSION={usuario:u, rol:user.rol, nombre:user.nombre};
  document.getElementById('login-screen').style.display='none';
  var app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('user-chip').textContent=user.nombre;
  buildNavbar();
  cargar();
}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

function buildNavbar(){
  var isCeo=SESSION.rol==='ceo';
  var tabs=[
    ['seg','📋','Seguimiento'],
    ['pipe','🔀','Pipeline'],
    isCeo?['bot','🤖','Leads Bot']:null,
    ['com','💰','Comisiones'],
    isCeo?['met','📊','Métricas']:null,
    ['pol','📜','Políticas']
  ].filter(Boolean);
  var nb=document.getElementById('navbar');
  nb.innerHTML=tabs.map(function(t,i){
    return '<div class="nitem'+(i===0?' on':'')+'" onclick="nav(\''+t[0]+'\',this)"><div class="nic">'+t[1]+'</div><div class="nlb">'+t[2]+'</div></div>';
  }).join('');
  _vista=tabs[0][0];
}

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
var CFG={
  scriptUrl:'https://script.google.com/macros/s/AKfycbyg653sAcOCSmU-pVDF5wEPo8M8to0-Gj3lbTUGdMpLS9GRZlKsdII-sZ4Pt0oukTDB9w/exec',
  igUrl:'https://www.instagram.com/moss.arquitectura',
  empresa:'MOSS Arquitectura y Mobiliario S.A.S. — NIT 901.159.078-6',
  metaMes:300000000, umbral:150000000, pisoM2:1200000, minCto:18000000
};
function tasa(v){if(v<=150e6)return 0;if(v<=250e6)return 0.01;if(v<=350e6)return 0.02;return 0.035;}

var LEADS=[], LEADS_HIST=[], SEG={}, _dirty=false, _vista='seg', _mesCom=hoyStr().slice(0,7), _filtroBot='todos', _verHistoricos=false;
function esLead2026(l){
  // El lead se considera activo 2026 si su fecha de interacción es >= 2026-01-01
  var f = String(l.fecha||'').trim();
  if(!f) return false;
  var anio = parseInt(f.slice(0,4),10);
  if(!isNaN(anio)) return anio>=2026;
  // fallback: intentar parsear formatos tipo "Tue Nov 04 2025"
  var d = new Date(f);
  if(!isNaN(d.getTime())) return d.getFullYear()>=2026;
  return false;
}

var ETAPAS=[
  ['prospecto','Prospecto','📥'],['contactado','Contactado','📞'],
  ['fase0','Fase 0 · Visita','🏠'],['cotizado','Cotización enviada','📄'],
  ['fase1','Fase 1 · Negociación','🤝'],['vendido','Vendido ✅','✅'],
  ['perdido','Dormido / Perdido','💤']
];
var TPL=[
  ['Día 1 — Cotización','Hola {n}! Soy {x} de MOSS 🌿 Te comparto la cotización de tu proyecto. Incluye plazo fijo de 2 meses, póliza de cumplimiento y 1 año de garantía ✅ ¿Qué día te queda bien para revisarla juntos?'],
  ['Día 3 — Video obra','Hola {n}! Mira cómo quedó una remodelación similar a la tuya que acabamos de entregar 🏡 {ig} ¿Te imaginas tu apartamento así? Cualquier duda me avisas.'],
  ['Día 7 — Reservar cupo','Hola {n} 👋 Esta semana iniciamos 2 obras y quiero reservarte cupo de inicio. Si firmamos esta semana congelamos precios 🔒 ¿Agendamos?'],
  ['Día 14 — Visita obra','Hola {n}, ¿te gustaría visitar una de nuestras obras en curso? 👷 Es la mejor forma de ver la calidad MOSS. ¡Con gusto te coordino la visita!'],
  ['Día 21 — Último contacto','Hola {n} 😊 Si este no es el momento, lo dejamos para más adelante y te sigo compartiendo proyectos por redes. ¿Lo retomamos pronto?']
];

// ═══════════════════════════════════════════════
// CARGA
// ═══════════════════════════════════════════════
function cargar(){
  setBadge(false,'Cargando…');
  var cbName='mosscrm_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    setBadge(false,'Sin conexión'); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){} render();
  },12000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(!d||!d.ok){setBadge(false,'Error del servidor');render();return;}
    var todos=d.leads||[];
    LEADS_HIST=todos.filter(function(l){return !esLead2026(l);});
    LEADS=todos.filter(function(l){return esLead2026(l);});
    SEG=d.seguimiento||{};
    LEADS.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    LEADS_HIST.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    setBadge(true,'✓ Conectado · '+LEADS.length+' activos 2026');
    render();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(false,'Error');render();};
  sc.src=CFG.scriptUrl+'?action=crm&callback='+cbName;
  document.body.appendChild(sc);
}
function nuevoSeg(l){
  var oro=esOro(l);
  return{stage:l.campana&&/vendido/i.test(l.campana||'')?'vendido':'prospecto',
    nota:'',proxContacto:'',intentos:0,presupuestoCliente:'',valorCotizado:'',
    valorCerrado:'',m2:l.m2||'',responsable:'Lizeth Figueroa',fase1Agendada:'',
    fechaCierre:'',anticipoOK:'',clasificacion:oro?'Caliente':'',historial:[],
    vinculadaAlCierre:''};
}
function esOro(l){
  var s=SEG[l.id]||{};
  return s.clasificacion==='Caliente'||(/si/i.test(l.cumplePresupuesto||'')&&/menor a un mes/i.test(l.tiempoInicio||''));
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function nav(v,el){
  _vista=v;
  document.querySelectorAll('.nitem').forEach(function(n){n.classList.remove('on');});
  if(el)el.classList.add('on');
  render();
}
function render(){
  var c=document.getElementById('content');
  if(_vista==='seg') c.innerHTML=rSeg();
  else if(_vista==='pipe') c.innerHTML=rPipe();
  else if(_vista==='bot') c.innerHTML=rBot();
  else if(_vista==='com') c.innerHTML=rCom();
  else if(_vista==='met') c.innerHTML=rMet();
  else c.innerHTML=rPol();
}

// ═══════════════════════════════════════════════
// SEGUIMIENTO
// ═══════════════════════════════════════════════
function rSeg(){
  var hoy=hoyStr(), venc=[],hoyL=[],oro=[],resto=[];
  LEADS.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var pc=s.proxContacto||'';

// MÉTRICAS (solo CEO)
// ═══════════════════════════════════════════════
function rMet(){
  var act=LEADS.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='perdido';});
  var cot=LEADS.filter(function(l){return Number((SEG[l.id]||{}).valorCotizado)>0;});
  var ven=LEADS.filter(function(l){return (SEG[l.id]||{}).stage==='vendido';});
  var oro=LEADS.filter(function(l){return esOro(l)&&(SEG[l.id]||{}).stage!=='vendido'&&(SEG[l.id]||{}).stage!=='perdido';});
  var tC=cot.length?Math.round(ven.length/cot.length*100):0;
  var descs=ven.map(function(l){var s=SEG[l.id];return(Number(s.valorCotizado)>0&&Number(s.valorCerrado)>0)?(1-s.valorCerrado/s.valorCotizado)*100:null;}).filter(function(x){return x!==null;});
  var dP=descs.length?Math.round(descs.reduce(function(a,b){return a+b;},0)/descs.length):0;
  var pms=ven.map(function(l){var s=SEG[l.id];return(Number(s.m2)>0&&Number(s.valorCerrado)>0)?s.valorCerrado/s.m2:null;}).filter(function(x){return x;});
  var pmP=pms.length?Math.round(pms.reduce(function(a,b){return a+b;},0)/pms.length):0;
  var meses=calcMesesSinMeta();
  var h='';
  if(meses>0) h+='<div class="alerta-3m"><h4>⚠ Alerta rendimiento — '+meses+' mes(es) consecutivo(s) sin meta mínima ($150M)</h4>'
    +'<p>Política: 3 meses consecutivos sin meta = causal de terminación con justa causa (Otrosí No.1, Cláusula Sexta). '
    +(meses>=3?'<b>UMBRAL ALCANZADO. Revisar decisión con Dirección.</b>':'Mes '+(meses+1)+' en curso.')+'</p></div>';
  h+='<div class="card"><div class="chd"><span>Métricas viernes — Playbook MOSS</span></div><div class="cp">'
    +'<div class="kgrid">'
    +K(oro.length,'Leads oro sin contactar',oro.length?'ro':'ok',oro.length?'Meta: 0':'✅')
    +K(tC+'%','Tasa de cierre',tC<30?'am':'ok','Meta: 30%')
    +K(dP+'%','Descuento promedio',dP>0?'am':'ok','Meta: 0%')
    +K(pmP?fmtCOP(pmP):'—','$/m² promedio',pmP&&pmP<CFG.pisoM2?'ro':'ok','Piso: $1.2M')
    +'</div>'
    +'<div class="nota-tip">SLA: contacto &lt;10min · cotización &lt;48h · seguimiento &lt;24h · mín 5 contactos antes de marcar perdido · contrato mín $18M</div>'
    +'</div></div>';
  // Funnel
  h+='<div class="card"><div class="chd"><span>Embudo de conversión</span></div><div class="cp">';
  var steps=[['Leads totales',LEADS.length],['Contactados',LEADS.filter(function(l){return (SEG[l.id]||{}).intentos>0;}).length],['Cotizados',cot.length],['Vendidos',ven.length]];
  steps.forEach(function(f,i){
    var pct=Math.round(f[1]/steps[0][1]*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>'+f[0]+'</span><span><b>'+f[1]+'</b> ('+pct+'%)</span></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+Math.max(pct,2)+'%"></div></div></div>';
  });
  h+='</div></div>';
  return h;
}

// HELPERS
// ═══════════════════════════════════════════════
function calcMesesSinMeta(){
  // Revisar últimos 3 meses en el SEG para ver cuántos consecutivos sin $150M
  var hoy=new Date(), meses=0;
  for(var i=1;i<=3;i++){
    var d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    var mes=d.toISOString().slice(0,7);
    var total=LEADS.map(function(l){return SEG[l.id]||{};})
      .filter(function(s){return s.stage==='vendido'&&s.anticipoOK==='SI'&&(s.fechaCierre||'').slice(0,7)===mes;})
      .reduce(function(a,s){return a+Number(s.valorCerrado||0);},0);
    if(total<CFG.umbral) meses++; else break;
  }
  return meses;
}
function sync(){
  if(!_dirty){toast('Sin cambios pendientes');return;}
  setBadge(false,'Guardando…');
  var cbName='mosssave_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){delete window[cbName];try{document.body.removeChild(sc);}catch(e){}toast('⚠ Timeout');},15000);
  window[cbName]=function(d){
    clearTimeout(tm);delete window[cbName];try{document.body.removeChild(sc);}catch(e){}
    if(d&&d.ok){_dirty=false;document.getElementById('savebar').style.display='none';setBadge(true,'Guardado ✓');toast('✅ Guardado · '+d.guardados+' leads');}
    else toast('⚠ Error al guardar');
  };
  sc.onerror=function(){clearTimeout(tm);toast('⚠ Sin conexión');};
  var pl=encodeURIComponent(JSON.stringify(SEG));
  sc.src=CFG.scriptUrl+'?action=crm.guardar&callback='+cbName+'&payload='+pl;
  document.body.appendChild(sc);
}
function setBadge(ok,txt){
  var b=document.getElementById('badge'),t=document.getElementById('badge-txt');
  b.className='dbadge '+(ok?'dok':'dno');
  b.querySelector('.dot').style.background=ok?'var(--ok)':'var(--am)';
  t.textContent=txt;
}
function hoyStr(){return new Date().toISOString().slice(0,10);}
function fmtCOP(n){return '$'+(Number(n)||0).toLocaleString('es-CO');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
