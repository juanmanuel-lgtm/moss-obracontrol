<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSS CRM Comercial v33</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--v:#2D4A35;--vc:#E8F0EB;--bv:#C2D1C5;--d:#A67C52;--cr:#F2EBE0;--bc:#FAF7F3;--ba:#EEEAE3;--g:#6B6560;--gc:#B5AFA8;--b:#DDD5C8;--ok:#3A6B45;--am:#C17B2A;--ab:#FDF0E0;--ro:#B5362A;--rb:#FAEBE9;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cr);color:#1C1C1A;min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v);}
.login-box{background:var(--bc);border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{width:48px;height:48px;background:var(--v);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:var(--d);margin:0 auto 16px;}
.login-box h2{text-align:center;color:var(--v);font-size:18px;margin-bottom:6px;}
.login-box p{text-align:center;color:var(--g);font-size:12px;margin-bottom:20px;}
.login-box input{width:100%;padding:11px 13px;border:1px solid var(--b);border-radius:9px;font-size:14px;margin-bottom:10px;font-family:inherit;}
.login-box input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-err{color:var(--ro);font-size:12px;text-align:center;margin-top:8px;display:none;}
.login-role{font-size:10px;color:var(--gc);text-align:center;margin-top:10px;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bc);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(44,64,50,.08);}
.tlogo{width:30px;height:30px;background:var(--v);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--d);}
.ttitle{font-weight:700;font-size:13px;color:var(--v);}
.tsub{font-size:9px;color:var(--gc);text-transform:uppercase;letter-spacing:1px;}
.topright{margin-left:auto;display:flex;gap:8px;align-items:center;}
.user-chip{font-size:10px;padding:4px 9px;border-radius:7px;background:var(--vc);color:var(--v);font-weight:700;border:1px solid var(--bv);}
.dbadge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:10px;cursor:pointer;border:1px solid;}
.dok{background:var(--vc);border-color:var(--bv);color:var(--ok);}
.dno{background:var(--ab);border-color:#C17B2A40;color:var(--am);}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navbar{background:var(--v);display:flex;overflow-x:auto;scrollbar-width:none;}
.navbar::-webkit-scrollbar{display:none;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:58px;transition:background .15s;}
.nitem.on{border-bottom-color:var(--d);background:rgba(255,255,255,.1);}
.nic{font-size:15px;}.nlb{font-size:8.5px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;}
.nitem.on .nlb{color:#fff;}
.content{flex:1;padding:12px 12px 80px;}

/* CARDS + KPIs */
.card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;}
.chd{padding:9px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.chd span{font-size:11px;color:#fff;font-weight:600;}.chd small{font-size:9px;color:rgba(255,255,255,.6);}
.cp{padding:13px;}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:460px){.kgrid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:10px 11px;}
.kl{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px;}
.kv{font-size:19px;font-weight:700;}.ks{font-size:9px;color:var(--gc);margin-top:3px;}
.kv.ok{color:var(--ok);}.kv.am{color:var(--am);}.kv.ro{color:var(--ro);}.kv.d{color:var(--d);}

/* ROWS */
.lrow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--b);cursor:pointer;background:var(--bc);transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--vc);}
.lrow.venc{border-left:4px solid var(--ro);background:var(--rb);}
.lrow.hoy{border-left:4px solid var(--am);background:var(--ab);}
.lrow.oro{border-left:4px solid var(--d);}
.lnm{font-size:13px;font-weight:700;}
.ldt{font-size:10.5px;color:var(--g);margin-top:2px;line-height:1.4;}
.lright{margin-left:auto;display:flex;gap:5px;align-items:center;flex-shrink:0;}
.wa-btn{background:#2F7D4F;color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.bok{background:#E8F0EB;color:#3A6B45;}.bam{background:#FDF0E0;color:#C17B2A;}.bro{background:#FAEBE9;color:#B5362A;}.bd{background:#F0EDE8;color:#A67C52;}.bgr{background:var(--ba);color:var(--g);}

/* KANBAN */
.kan{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.kcol{min-width:200px;background:var(--ba);border:1px solid var(--b);border-radius:11px;padding:9px;flex-shrink:0;}
.kctit{font-size:10px;color:var(--v);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;}
.kcard{background:var(--bc);border:1px solid var(--b);border-radius:9px;padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;}
.kcard:hover{box-shadow:0 2px 8px rgba(44,64,50,.12);}
.kcard b{display:block;font-size:12.5px;}.kcard .ks2{color:var(--g);font-size:10px;margin-top:3px;}

/* TABLA */
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--v);color:#fff;text-align:left;padding:8px 10px;font-size:10.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--b);}

/* FORM */
.flabel{font-size:9px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.pbar-wrap{background:var(--ba);border-radius:8px;height:10px;overflow:hidden;margin:6px 0 4px;}
.pbar{height:100%;border-radius:8px;background:var(--v);transition:.4s;}
.alert-m2{font-size:11px;color:var(--ro);font-weight:700;padding:6px 10px;background:var(--rb);border-radius:7px;margin-top:6px;display:none;}

/* MODAL */
.modalbg{position:fixed;inset:0;background:rgba(28,28,26,.5);display:none;z-index:200;align-items:flex-end;justify-content:center;}
.modalbg.open{display:flex;}
.modal{background:var(--bc);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 18px 32px;}
.mh{font-size:15px;font-weight:700;color:var(--v);margin-bottom:2px;}
.ms{font-size:11px;color:var(--g);margin-bottom:14px;}
.tpl-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tpl-btn{background:var(--ba);border:1px solid var(--b);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--v);cursor:pointer;font-family:inherit;}
.tpl-btn:hover{background:var(--vc);}
.btm-bar{display:flex;gap:8px;margin-top:14px;}
.btn-p{background:var(--v);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;}
.btn-s{background:var(--ba);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--g);}
.btn-d{background:var(--d);color:#fff;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--v);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
.save-bar span{color:rgba(255,255,255,.8);font-size:12px;}
.save-btn{background:#fff;border:none;border-radius:8px;color:var(--v);padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.carta-wrap{background:var(--bc);border:1px solid var(--b);border-radius:12px;padding:32px;font-size:13px;line-height:1.7;display:none;margin-top:14px;}
@media print{body *{visibility:hidden;}.carta-wrap,.carta-wrap *{visibility:visible;}.carta-wrap{display:block!important;position:absolute;left:0;top:0;width:100%;border:none;padding:40px;}}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--v);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:28px 16px;color:var(--gc);font-size:13px;}
.nota-tip{font-size:10px;color:var(--ok);background:var(--vc);border:1px solid var(--bv);border-radius:7px;padding:5px 9px;margin-bottom:10px;}
.sec-tit{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin:14px 0 8px;}
.info-box{border-radius:9px;padding:10px 13px;margin-bottom:10px;font-size:12px;line-height:1.5;}
.info-am{background:var(--ab);border:1px solid var(--am);color:#7a4e16;}
.info-ro{background:var(--rb);border:1px solid var(--ro);color:#7a1a10;}
.info-ok{background:var(--vc);border:1px solid var(--bv);color:var(--ok);}
.fchip{background:var(--ba);border:1px solid var(--b);border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);}
.fchip.on{background:var(--v);color:#fff;border-color:var(--v);}
.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* POLITICAS */
.pol-sec{margin-bottom:16px;}
.pol-sec h3{color:var(--v);font-size:13px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--d);}
.pol-sec p,.pol-sec li{font-size:12px;color:#2A2C24;line-height:1.65;margin-bottom:4px;}
.pol-sec ul{padding-left:16px;}
.pol-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.pol-kpi-item{background:var(--ba);border-radius:8px;padding:9px 11px;font-size:11.5px;}
.pol-kpi-item b{display:block;color:var(--v);font-size:12px;margin-bottom:3px;}
.escalera-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.escalera-table th{background:var(--v);color:#fff;padding:7px 10px;text-align:left;}
.escalera-table td{padding:7px 10px;border-bottom:1px solid var(--b);}
.escalera-table tr:last-child td{border-bottom:none;}
.alerta-3m{background:var(--rb);border:1px solid var(--ro);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.alerta-3m h4{color:var(--ro);font-size:13px;font-weight:700;margin-bottom:4px;}
.alerta-3m p{font-size:11.5px;color:#7a1a10;line-height:1.5;}
/* PIPELINE MENSUAL */
.mes-selector{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.mes-selector::-webkit-scrollbar{display:none;}
.mes-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:var(--ba);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--g);}
.mes-chip.on{background:var(--v);color:#fff;border-color:var(--v);}
.mes-chip.alert{border-color:var(--ro);color:var(--ro);}
/* VIGENCIA LEADS */
.vtag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-left:4px;}
.vhot{background:#FAEBE9;color:#B5362A;}   /* vencido >21 días sin contacto */
.vwarm{background:#FDF0E0;color:#C17B2A;}  /* 8-21 días */
.vok{background:#E8F0EB;color:#3A6B45;}    /* ≤7 días */
.vnew{background:#F0EDE8;color:#A67C52;}   /* nuevo bot — sin contacto aún */
/* CALIENTES PANEL */
.hot-card{background:var(--rb);border:1px solid var(--ro);border-radius:11px;padding:10px 13px;margin-bottom:8px;cursor:pointer;}
.hot-card:hover{box-shadow:0 2px 8px rgba(181,54,42,.15);}
.hot-card .hc-nm{font-size:13px;font-weight:700;color:#B5362A;}
.hot-card .hc-dt{font-size:10.5px;color:#7a1a10;margin-top:3px;}
.hot-badge{display:inline-flex;align-items:center;gap:4px;background:#FAEBE9;border:1px solid var(--ro);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--ro);}
/* PIPELINE MONTH HEADER */
.pipe-month-hd{padding:10px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.pipe-month-hd span{font-size:11px;color:#fff;font-weight:600;}
.pipe-month-hd small{font-size:9px;color:rgba(255,255,255,.6);}
.pipe-mes-total{font-size:11px;font-weight:700;color:var(--d);padding:6px 14px;background:var(--vc);border-bottom:1px solid var(--bv);}
/* MÓDULO DE PAGOS POR CUOTAS */
.pagos-wrap{margin-bottom:14px;}
.proyecto-card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.pc-hd{padding:10px 14px;background:var(--v);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pc-hd-name{font-size:13px;font-weight:700;color:#fff;flex:1;}
.pc-hd-total{font-size:12px;font-weight:700;color:var(--vc);}
.pc-hd-toggle{background:rgba(255,255,255,.15);border:none;border-radius:6px;color:#fff;font-size:11px;padding:3px 8px;cursor:pointer;font-family:inherit;}
.cuota-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--b);}
.cuota-row:last-child{border-bottom:none;}
.cuota-row.pagada{background:var(--vc);}
.cuota-row.vencida{background:var(--rb);}
.cuota-row.proxima{background:var(--ab);}
.cq-pct{width:36px;font-size:11px;font-weight:700;color:var(--g);flex-shrink:0;}
.cq-label{width:80px;font-size:11px;color:var(--g);flex-shrink:0;}
.cq-valor{flex:1;font-size:13px;font-weight:700;color:var(--v);}
.cq-fecha{font-size:11px;color:var(--g);width:90px;flex-shrink:0;}
.cq-status{width:80px;flex-shrink:0;}
.cq-badge{display:inline-flex;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.cq-ok{background:var(--vc);color:var(--ok);}
.cq-pend{background:var(--ba);color:var(--g);}
.cq-venc{background:var(--rb);color:var(--ro);}
.cq-prox{background:var(--ab);color:var(--am);}
.cq-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s;}
.cq-check.done{background:var(--ok);border-color:var(--ok);color:#fff;}
.pagos-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.pk{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:10px 12px;}
.pk-v{font-size:18px;font-weight:700;color:var(--v);}
.pk-l{font-size:9px;color:var(--g);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}
.pk-s{font-size:10px;color:var(--g);margin-top:2px;}
.add-cuota-btn{background:var(--ba);border:1px dashed var(--b);border-radius:8px;padding:8px 14px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);width:100%;text-align:center;margin-top:4px;}
.add-cuota-btn:hover{background:var(--vc);color:var(--ok);}
.pagos-mes-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pagos-mes-nav button{background:var(--ba);border:1px solid var(--b);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
.pagos-mes-nav span{font-size:14px;font-weight:700;color:var(--v);flex:1;text-align:center;}
.nuevo-proyecto-form{background:var(--bc);border:1.5px dashed var(--b);border-radius:12px;padding:14px;margin-bottom:14px;display:none;}
.nuevo-proyecto-form.open{display:block;}

/* INGRESO MANUAL DE LEADS */
.nuevo-lead-form{background:var(--bc);border:1.5px solid var(--bv);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.nlf-hd{padding:10px 16px;background:var(--v);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.nlf-hd h4{color:#fff;font-size:13px;font-weight:600;margin:0;}
.nlf-hd small{color:rgba(255,255,255,.65);font-size:10px;}
.nlf-body{padding:14px;display:none;}
.nlf-body.open{display:block;}
.nlf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;}
@media(max-width:520px){.nlf-grid{grid-template-columns:1fr;}}
.nlf-full{grid-column:1/-1;}
.nlf-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g);margin-bottom:4px;display:block;}
.nlf-input{width:100%;padding:9px 11px;border:1.5px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;transition:border-color .15s;}
.nlf-input:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.nlf-select{width:100%;padding:9px 11px;border:1.5px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
.nlf-select:focus{border-color:var(--v);}
.nlf-fuente-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--b);background:var(--ba);}
.nlf-fuente-tag.sel{background:var(--v);color:#fff;border-color:var(--v);}
.fuente-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.nlf-ok{background:var(--vc);border:1px solid var(--bv);border-radius:9px;padding:8px 12px;font-size:11px;color:var(--ok);display:none;margin-top:8px;}

/* INGRESO DE CONTRATOS */
.contrato-form{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:14px;}
.contrato-form-hd{padding:10px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;}
.contrato-form-hd span{font-size:12px;font-weight:600;color:#fff;}
.contrato-form-body{padding:14px;}
.cf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;}
@media(max-width:500px){.cf-grid{grid-template-columns:1fr;}}
.cf-full{grid-column:1/-1;}
.cf-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g);margin-bottom:4px;display:block;}
.cf-input{width:100%;padding:9px 11px;border:1.5px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;transition:border-color .15s;}
.cf-input:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.cf-select{width:100%;padding:9px 11px;border:1.5px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
.cf-select:focus{border-color:var(--v);}
.cf-total{background:var(--vc);border:1px solid var(--bv);border-radius:9px;padding:10px 14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
.cf-total-label{font-size:10px;color:var(--ok);text-transform:uppercase;letter-spacing:.6px;}
.cf-total-value{font-size:18px;font-weight:700;color:var(--ok);}

<script>
// ═══════════════════════════════════════════════
// USUARIOS Y ROLES
// ═══════════════════════════════════════════════
var USERS = {
  'juanma':  { pwd:'moss2026CEO', rol:'ceo',       nombre:'Juan Ma · CEO' },
  'com1':    { pwd:'com1moss26',  rol:'comercial', nombre:'Comercial 1',  key:'com1' },
  'com2':    { pwd:'com2moss26',  rol:'comercial', nombre:'Comercial 2',  key:'com2' },
  'liz':     { pwd:'liz2026',     rol:'comercial', nombre:'Lizeth Figueroa', key:'com1' },
  'care':    { pwd:'moss2026',    rol:'comercial', nombre:'Equipo Comercial', key:'com1' }
};
// CEO ve todos los leads y puede filtrar por comercial.
// Comercial solo ve sus leads asignados (campo responsableKey en SEG).
// Asignación automática aleatoria equitativa al crear SEG de lead nuevo.

var SESSION = null; // { usuario, rol, nombre }

function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value;
  var user=USERS[u];
  if(!user||user.pwd!==p){
    document.getElementById('login-err').style.display='block';
    return;
  }
  SESSION={usuario:u, rol:user.rol, nombre:user.nombre};
  document.getElementById('login-screen').style.display='none';
  var app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('user-chip').textContent=user.nombre;
  buildNavbar();
  cargar();
}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

function buildNavbar(){
  var isCeo=SESSION.rol==='ceo';
  var tabs=[
    ['seg','📋','Seguimiento'],
    ['pipe','🔀','Pipeline'],
    ['cal','🔴','Calientes'],
    ['nuevo','➕','Nuevo Lead'],
    isCeo?['bot','🤖','Leads Bot']:null,
    isCeo?['asig','👥','Asignación']:null,
    ['pagos','💳','Pagos'],
    ['com','💰','Comisiones'],
    isCeo?['met','📊','Métricas']:null,
    ['pol','📜','Políticas']
  ].filter(Boolean);
  var nb=document.getElementById('navbar');
  nb.innerHTML=tabs.map(function(t,i){
    return '<div class="nitem'+(i===0?' on':'')+'" onclick="nav(\''+t[0]+'\',this)"><div class="nic">'+t[1]+'</div><div class="nlb">'+t[2]+'</div></div>';
  }).join('');
  _vista=tabs[0][0];
}

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
var CFG={
  scriptUrl:'https://script.google.com/macros/s/AKfycbyg653sAcOCSmU-pVDF5wEPo8M8to0-Gj3lbTUGdMpLS9GRZlKsdII-sZ4Pt0oukTDB9w/exec',
  odooUrl:'https://moss-arquitectura-y-mobiliario-sas.odoo.com',
  odooKey:'75ca5013352d14fdaf9b59069db61c61ac5754763',
  odooDb:'moss-arquitectura-y-mobiliario-sas',
  igUrl:'https://www.instagram.com/moss.arquitectura',
  empresa:'MOSS Arquitectura y Mobiliario S.A.S. — NIT 901.159.078-6',
  metaMes:300000000, umbral:150000000, pisoM2:1200000, minCto:18000000,
  waCom1:'573213516016',   // Comercial 1 — alertas urgentes
  waCom2:'573134379479'    // Comercial 2 — alertas urgentes
};
function tasa(v){if(v<=150e6)return 0;if(v<=250e6)return 0.01;if(v<=350e6)return 0.02;return 0.035;}

var LEADS=[], LEADS_HIST=[], ODOO_OPS=[], SEG={}, _dirty=false, _vista='seg', _mesCom=hoyStr().slice(0,7), _filtroBot='todos', _verHistoricos=false;
var _mesPipe=hoyStr().slice(0,7);
var _filtroCom='todos'; // CEO filter: 'todos' | 'com1' | 'com2'

// ── Asignación aleatoria equitativa ──────────────────────────────────────────
// Lee cuántos leads activos tiene cada comercial y asigna al que tenga menos.
// En empate: elige aleatoriamente entre los empatados.
function asignarComercial(lead){
  var coms=['com1','com2'];
  var todos=LEADS.concat(ODOO_OPS);
  // Para leads calientes: asignar al que tenga MENOS calientes activos
  var esUrgente=lead&&(esCaliente(lead)||esOro(lead));
  if(esUrgente){
    var cal={com1:0,com2:0};
    todos.forEach(function(l){
      var s=SEG[l.id]||{};
      if(s.stage==='perdido'||s.stage==='vendido') return;
      if(esCaliente(l)&&s.responsableKey&&cal[s.responsableKey]!==undefined) cal[s.responsableKey]++;
    });
    if(cal.com1<cal.com2) return 'com1';
    if(cal.com2<cal.com1) return 'com2';
    return coms[Math.floor(Math.random()*2)];
  }
  // Para leads normales: al que tenga menos leads activos totales
  var conteo={com1:0,com2:0};
  todos.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='perdido') return;
    var k=s.responsableKey||'';
    if(conteo[k]!==undefined) conteo[k]++;
  });
  if(conteo.com1<conteo.com2) return 'com1';
  if(conteo.com2<conteo.com1) return 'com2';
  return coms[Math.floor(Math.random()*2)];
}

// Nombre visible de un comercial key
function nomCom(key){
  var u=Object.values(USERS).find(function(u){return u.key===key;});
  return u?u.nombre:(key||'—');
}

// ¿El usuario actual puede ver este lead?
function puedoVerLead(l){
  if(!SESSION) return false;
  if(SESSION.rol==='ceo') return true;
  var s=SEG[l.id]||{};
  var miKey=USERS[SESSION.usuario]&&USERS[SESSION.usuario].key;
  if(!miKey) return true; // sin key: ve todo (legacy)
  return (s.responsableKey||'')=== miKey;
}

function diasSinContacto(l){
  var s=SEG[l.id]||{};
  if(s.proxContacto && s.proxContacto >= hoyStr()) return 0;
  var fechas=[s.proxContacto, fechaLeadStr(l)].filter(Boolean).sort().reverse();
  if(!fechas.length) return 999;
  var d=new Date(fechas[0]+'T12:00:00');
  if(isNaN(d)) return 999;
  return Math.floor((new Date()-d)/(1000*60*60*24));
}

// ── Tiempo desde que llegó el lead (usando fechaIngreso si existe, sino l.fecha) ──
function horasDesdeIngreso(l){
  var s=SEG[l.id]||{};
  // Si ya tiene primer contacto registrado: tiempo=0 (ya fue atendido)
  if(s.intentos && s.intentos>0 && s.primerContactoTs) return 0;
  // Usar timestamp exacto si existe, sino fecha del lead
  var ts=s.fechaIngresoTs || l.fechaTs || null;
  if(ts){
    var diff=(new Date()-new Date(ts))/(1000*60*60);
    return Math.round(diff*10)/10;
  }
  // Fallback: usar l.fecha como día (sin hora exacta)
  var f=String(l.fecha||'').slice(0,10);
  if(!f) return null;
  var d=new Date(f+'T12:00:00');
  if(isNaN(d)) return null;
  var diff=(new Date()-d)/(1000*60*60);
  return Math.round(diff);
}

// ── Registrar primer contacto con timestamp ──────────────────────────────────
function registrarPrimerContacto(id){
  var s=SEG[id]||{};
  if(!s.primerContactoTs && (s.intentos||0)===0){
    s.primerContactoTs=new Date().toISOString();
    // Calcular tiempo de respuesta en minutos
    var ts=s.fechaIngresoTs||null;
    if(ts){
      s.tiempoRespuestaMin=Math.round((new Date()-new Date(ts))/60000);
    }
  }
}

// ── Badge de tiempo para mostrar en cada lead ────────────────────────────────
function timerBadge(l){
  var s=SEG[l.id]||{};
  if(s.stage==='vendido'||s.stage==='perdido') return '';
  // Si ya tiene contactos: mostrar tiempo desde último contacto
  if(s.intentos && s.intentos>0){
    var d=diasSinContacto(l);
    if(d===0) return '<span class="timer-badge tb-ok">✓ Contactado</span>';
    if(d<=3)  return '<span class="timer-badge tb-ok">'+d+'d</span>';
    if(d<=7)  return '<span class="timer-badge tb-warn">'+d+'d sin contacto</span>';
    if(d<=21) return '<span class="timer-badge tb-warn">⚠ '+d+'d</span>';
    return '<span class="timer-badge tb-hot">🔴 '+d+'d inactivo</span>';
  }
  // Sin ningún contacto: mostrar urgencia de primer contacto
  var h=horasDesdeIngreso(l);
  if(h===null) return '<span class="timer-badge tb-new">NUEVO</span>';
  if(h<1) return '<span class="timer-badge tb-hot">🔴 Hace '+(Math.round(h*60))+'min — ATENDER YA</span>';
  if(h<10) return '<span class="timer-badge tb-hot">🔴 Hace '+Math.round(h)+'h sin respuesta</span>';
  if(h<24) return '<span class="timer-badge tb-warn">⚠ Hace '+Math.round(h)+'h</span>';
  var d2=Math.floor(h/24);
  return '<span class="timer-badge tb-hot">🔴 '+d2+'d sin primer contacto</span>';
}

// ── SLA score: % leads calientes respondidos en <10 min este mes ─────────────
function slaScore(){
  var cal=LEADS.filter(function(l){return esCaliente(l);});
  if(!cal.length) return {pct:100, total:0, ok:0, vencidos:0};
  var ok=cal.filter(function(l){
    var s=SEG[l.id]||{};
    return s.primerContactoTs && (s.tiempoRespuestaMin||999)<10;
  }).length;
  var venc=cal.filter(function(l){
    var s=SEG[l.id]||{};
    return !s.intentos || s.intentos===0;
  }).length;
  return {pct:Math.round(ok/Math.max(cal.length,1)*100), total:cal.length, ok:ok, vencidos:venc};
}
function vigTag(l){
  var s=SEG[l.id]||{};
  if(s.stage==='vendido'||s.stage==='perdido') return '';
  var d=diasSinContacto(l);
  if(!s.intentos && !s.proxContacto) return '<span class="vtag vnew">NUEVO</span>';
  if(d<=7)  return '<span class="vtag vok">Activo</span>';
  if(d<=21) return '<span class="vtag vwarm">'+d+'d</span>';
  return '<span class="vtag vhot">'+d+'d inactivo</span>';
}
function esCaliente(l){
  var s=SEG[l.id]||{};
  // Marcado manualmente como caliente
  if(s.clasificacion==='Caliente') return true;
  // Criterios del bot: cumple presupuesto + urgencia de tiempo
  var tp=String(l.tiempoInicio||'').toLowerCase();
  var cp=String(l.cumplePresupuesto||'').toLowerCase();
  if(/si|sí/.test(cp) && /menor a un mes|un mes|1 mes|1-3|1 a 3/.test(tp)) return true;
  // Valor declarado alto
  if(Number(l.valor)>=80000000) return true;
  // Criterio adicional: cumple presupuesto sin importar tiempo
  if(/si|sí/.test(cp) && tp) return true;
  return false;
}

// esOro actualizado — incluye calientes + leads con cumplePresupuesto=SÍ
function esOroV2(l){
  var s=SEG[l.id]||{};
  if(s.clasificacion==='Caliente') return true;
  var cp=String(l.cumplePresupuesto||'').toLowerCase();
  if(/si|sí/.test(cp)) return true;
  if(Number(l.valor)>=80000000) return true;
  return false;
}
// Parsear fecha de lead en cualquier formato → Date object (o null)
function parseFechaLead(l){
  var f=String(l.fecha||'').trim();
  if(!f) return null;
  // ISO yyyy-MM-dd
  if(/^\d{4}-\d{2}-\d{2}/.test(f)) return new Date(f+'T12:00:00');
  // "Tue Nov 04 2025" / JS Date.toString
  var d=new Date(f);
  if(!isNaN(d.getTime())) return d;
  return null;
}

// Fecha de lead como string ISO yyyy-MM-dd para comparar/ordenar
function fechaLeadStr(l){
  var d=parseFechaLead(l);
  if(!d) return '';
  return d.toISOString().slice(0,10);
}

}

function cargar(){
  setBadge(false,'Cargando…');
  var cbName='mosscrm_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    setBadge(false,'Sin conexión'); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){} render();
  },12000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(!d||!d.ok){setBadge(false,'Error del servidor');render();return;}
    var todos=d.leads||[];
    LEADS_HIST=todos.filter(function(l){return !esLead2026(l);});
    LEADS=todos.filter(function(l){return esLead2026(l);});
    SEG=d.seguimiento||{};
    LEADS.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    LEADS_HIST.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    setBadge(true,'✓ Bot: '+LEADS.length+' activos 2026');
    render();
    setTimeout(checkAlertas, 800); // revisar alertas después de cargar
    setTimeout(checkRecordatorios, 1500); // revisar recordatorios D+N
    if(CFG.odooUrl && CFG.odooKey) cargarOdoo();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(false,'Error');render();};
  sc.src=CFG.scriptUrl+'?action=crm&callback='+cbName;
  document.body.appendChild(sc);
}
function cargarOdoo(){
  setBadge(false,'Conectando Odoo…');
  var cbName='mossodoo_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    delete window[cbName]; try{document.body.removeChild(sc);}catch(e){}
    setBadge(true,'Bot ✓ · Odoo sin respuesta');
    render();
  },15000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(d && d.ok && d.oportunidades){
      ODOO_OPS = d.oportunidades.map(function(o){
        return {
          id:'odoo_'+o.id,
          nombre:o.partner_name||o.name||('Oportunidad '+o.id),
          proyecto:o.name||'',
          valor:o.planned_revenue||0,
          etapaOdoo:o.stage_name||'',
          responsable:o.user_name||'',
          contacto:o.phone||o.email||'',
          probabilidad:o.probability||0,
          fuente:'odoo'
        };
      });
      ODOO_OPS.forEach(function(o){
        if(!SEG[o.id]) SEG[o.id]={stage:mapOdooStage(o.etapaOdoo),nota:'',proxContacto:'',intentos:0,
          presupuestoCliente:'',valorCotizado:String(o.valor),valorCerrado:'',m2:'',
          responsable:o.responsable,fase1Agendada:'',fechaCierre:'',anticipoOK:'',
          clasificacion:'',historial:[],vinculadaAlCierre:'',fuente:'odoo'};
      });
      setBadge(true,'✓ Bot + Odoo · '+ODOO_OPS.length+' oportunidades');
    } else {
      setBadge(true,'Bot ✓ · Odoo: '+(d&&d.error?d.error:'sin datos'));
    }
    render();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(true,'Bot ✓ · Odoo error conexión');render();};
  sc.src=CFG.scriptUrl+'?action=odoo&callback='+cbName
    +'&odooUrl='+encodeURIComponent(CFG.odooUrl)
    +'&odooKey='+encodeURIComponent(CFG.odooKey)
    +'&odooDb='+encodeURIComponent(CFG.odooDb);
  document.body.appendChild(sc);
}
function mapOdooStage(nombreEtapa){
  var n=(nombreEtapa||'').toLowerCase();
  if(n.indexOf('contrato')>=0||n.indexOf('firmado')>=0) return 'vendido';
  if(n.indexOf('alta probabilidad')>=0) return 'fase1';
  if(n.indexOf('cotizaci')>=0) return 'cotizado';
  if(n.indexOf('fase 0')>=0||n.indexOf('reuni')>=0) return 'fase0';
  if(n.indexOf('meses')>=0) return 'contactado';
  return 'prospecto';
}

function rSeg(){
  var hoy=hoyStr(), venc=[],hoyL=[],oro=[],resto=[];
  var listaTotal=LEADS.concat(ODOO_OPS).filter(puedoVerLead);
  // CEO filter by comercial
  if(SESSION&&SESSION.rol==='ceo'&&_filtroCom!=='todos'){
    listaTotal=listaTotal.filter(function(l){return (SEG[l.id]||{}).responsableKey===_filtroCom;});
  }
  listaTotal.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var pc=s.proxContacto||'';
    if(pc&&pc<hoy) venc.push(l);
    else if(pc===hoy) hoyL.push(l);
    else if(esOro(l)&&!s.intentos) oro.push(l);
    else resto.push(l);
  });
  var act=listaTotal.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='vendido'&&s.stage!=='perdido';});
  var h='';
  // CEO filter bar
  if(SESSION&&SESSION.rol==='ceo'){
    h+=fchipBar([['todos','Todos'],['com1','C1'],['com2','C2']],'_filtroCom');
  }
  // ── Panel SLA tiempo de respuesta ─────────────────────────────────────────
  var sla=slaScore();
  var sinResp=act.filter(function(l){var s=SEG[l.id]||{};return esCaliente(l)&&(!s.intentos||s.intentos===0);});
  var respHoy=act.filter(function(l){var s=SEG[l.id]||{};
    return s.primerContactoTs&&s.primerContactoTs.slice(0,10)===hoyStr();}).length;
  var slaColor=sla.pct>=80?'#3A6B45':sla.pct>=50?'#C17B2A':'#B5362A';
  if(sinResp.length||act.length){
    h+='<div class="sla-header">'
      +'<div class="sla-kpi"><div class="sla-kpi-v" style="color:'+(sinResp.length?'#FAEBE9':'#C8E6C9')+'">'+sinResp.length+'</div><div class="sla-kpi-l">Sin primer contacto</div></div>'
      +'<div class="sla-sep"></div>'
      +'<div class="sla-kpi"><div class="sla-kpi-v">'+respHoy+'</div><div class="sla-kpi-l">Respondidos hoy</div></div>'
      +'<div class="sla-sep"></div>'
      +'<div class="sla-kpi"><div class="sla-kpi-v" style="color:'+slaColor+'">'+sla.pct+'%</div><div class="sla-kpi-l">SLA &lt;10min cumplido</div></div>'
      +'<div class="sla-sep"></div>'
      +'<div class="sla-kpi"><div class="sla-kpi-v">'+act.length+'</div><div class="sla-kpi-l">En pipeline</div></div>'
      +(sinResp.length?'<div style="margin-left:auto;background:#FAEBE9;border:1px solid var(--ro);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--ro);font-weight:700">⚡ '+sinResp.length+' lead(s) caliente(s) sin responder — SLA &lt; 10 min</div>':'')
      +'</div>';
  }
  h+='<div class="kgrid">'
    +K(venc.length,'Vencidos ⚠',venc.length?'ro':'ok',venc.length?'Contactar ahora':'Al día')
    +K(hoyL.length,'Para hoy',hoyL.length?'am':'','Programados')
    +K(oro.length,'Sin contactar (nuevos)','d',oro.length?'SLA < 10 min':'')
    +K(act.length,'En pipeline','','activos 2026')+'</div>';
  if(LEADS_HIST.length){
    h+='<div class="info-ok">📦 <b>'+LEADS_HIST.length+' leads históricos (2025 y anteriores)</b> ocultos del seguimiento activo — ya fueron gestionados. '
      +'<a href="#" onclick="_verHistoricos=!_verHistoricos;render();return false" style="color:var(--ok);font-weight:700">'
      +(_verHistoricos?'Ocultar':'Ver históricos')+'</a></div>';
  }
  if(_verHistoricos){
    h+='<div class="card"><div class="chd"><span>Históricos 2025 y anteriores (solo consulta)</span><small>'+LEADS_HIST.length+' leads</small></div>';
    LEADS_HIST.slice(0,30).forEach(function(l){h+=rowL(l,'');});
    if(LEADS_HIST.length>30) h+='<div style="padding:10px;text-align:center;font-size:11px;color:var(--g)">Mostrando 30 de '+LEADS_HIST.length+'</div>';
    h+='</div>';
  }

  // Alerta rendimiento (solo CEO ve el nombre de Liz)
  var meses=calcMesesSinMeta();
  if(meses>=2){
    h+='<div class="alerta-3m"><h4>⚠ Alerta rendimiento — '+meses+' mes(es) sin meta</h4>'
      +'<p>La Política Comercial establece que tres meses consecutivos sin alcanzar la meta mínima ($150M) '
      +'son causal de terminación del contrato con justa causa (Cláusula Sexta, Otrosí No.1 — 02/03/2026). '
      +(meses>=3?'<b>Se ha alcanzado el umbral de 3 meses. Revisar con Dirección.</b>':
        'Mes '+(meses+1)+' en curso — evitar llegar a 3.')+'</p></div>';
  }

  // Unificar todo en una sola lista ordenada por fecha DESC
  // Prioridad: vencidos y de hoy siempre primero, luego resto por fecha más reciente
  var vencSet=new Set(venc.map(function(l){return l.id;}));
  var hoySet=new Set(hoyL.map(function(l){return l.id;}));
  // Todos los activos sin duplicados, ordenados fecha DESC
  var todosActivos=act.slice();
  todosActivos.sort(function(a,b){
    // 1. Vencidos primero
    var av=vencSet.has(a.id)?0:1, bv=vencSet.has(b.id)?0:1;
    if(av!==bv) return av-bv;
    // 2. Para hoy segundo
    var ah=hoySet.has(a.id)?0:1, bh=hoySet.has(b.id)?0:1;
    if(ah!==bh) return ah-bh;
    // 3. Resto: fecha de ingreso DESC (más reciente primero)
    var fa=fechaLeadStr(a)||'0000-00-00', fb=fechaLeadStr(b)||'0000-00-00';
    if(fb!==fa) return fb>fa?1:-1;
    // 4. Empate de fecha: ORO primero
    var ao=esOro(a)?0:1, bo=esOro(b)?0:1;
    return ao-bo;
  });
  h+='<div class="card"><div class="chd"><span>Prioridad hoy — más recientes primero</span><small>'+act.length+' leads activos · '+listaTotal.length+' total (Bot+Odoo)</small></div>';
  if(!todosActivos.length) h+='<div class="empty">✅ Sin leads pendientes</div>';
  else todosActivos.forEach(function(l){
    h+=rowL(l,vencSet.has(l.id)?'venc':(hoySet.has(l.id)?'hoy':(esOro(l)?'oro':'')));
  });
  h+='</div>';
  return h;
}
function K(v,l,c,s){return '<div class="kpi"><div class="kl">'+l+'</div><div class="kv'+(c?' '+c:'')+'">'+(v)+'</div>'+(s?'<div class="ks">'+s+'</div>':'')+'</div>';}
function rowL(l,cls){
  var s=SEG[l.id]||{};
  var esOdoo=(s.fuente==='odoo'||l.fuente==='odoo');
  var tel=String(l.contacto||'').replace(/[^0-9]/g,'');
  var wa=tel?'<a class="wa-btn" onclick="event.stopPropagation()" href="https://wa.me/57'+tel+'" target="_blank">WA</a>':'';
  // Quick action: mensaje pre-escrito para calientes sin contacto
  var s0=SEG[l.id]||{};
  var qaMsg=construirMsgCliente(l,s0);
  var qa='';
  if(esCaliente(l)&&(!s0.intentos||s0.intentos===0)&&tel){
    qa='<a class="qa-btn" data-lid="'+l.id+'" href="https://wa.me/57'+tel+'?text='+encodeURIComponent(qaMsg)+'" target="_blank" onclick="event.stopPropagation();registrarContactoAlerta(this.dataset.lid)">⚡ Contactar ya</a>';
  }
  var etq=ETAPAS.find(function(e){return e[0]===(s.stage||'prospecto');})||ETAPAS[0];
  return '<div class="lrow '+cls+'" onclick="abrirLead(\''+l.id+'\')">'
    +'<div style="flex:1;min-width:0"><div class="lnm">'+(l.nombre&&l.nombre.trim()?l.nombre:"#"+String(l.id).slice(-6))
    +(esOdoo?' <span class="bdg" style="background:#714B6722;color:#714B67">🟣 Odoo</span>':'')+'</div>'
    +'<div class="ldt">'+(l.proyecto||'')+(l.m2?' · '+l.m2+' m²':'')+(l.acabado?' · '+l.acabado:'')
    +(l.valor?' · '+fmtCOP(l.valor):'')
    +(function(){var f=fechaLeadStr(l);return f?(' · ingresó: '+new Date(f+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'})):'';})()
    +(s.responsableKey?' · 👤 '+nomCom(s.responsableKey):'')+(s.proxContacto?' · 📅 '+s.proxContacto:'')+(s.intentos?' · '+s.intentos+' contactos':'')+'</div></div>'
    +'<div class="lright">'+timerBadge(l)+qa+(esOro(l)?'<span class="bdg bd">ORO</span>':'')
    +'<span class="bdg bgr">'+etq[2]+'</span>'+wa+'</div></div>';
}

// PIPELINE MENSUAL v34

function rPipe(){
  var listaTotal=LEADS.concat(ODOO_OPS).filter(puedoVerLead);
  var hoy=hoyStr(), mesActual=hoy.slice(0,7);

  // Build month list
  var mesesSet={};
  listaTotal.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    var m=f?f.slice(0,7):'';
    if(m) mesesSet[m]=(mesesSet[m]||0)+1;
    else mesesSet['sin-mes']=(mesesSet['sin-mes']||0)+1;
  });
  if(!mesesSet[mesActual]) mesesSet[mesActual]=0;
  var mesesOrden=Object.keys(mesesSet).filter(function(m){return m!=='sin-mes';}).sort();
  if(!mesesOrden.includes(_mesPipe)) _mesPipe=mesActual;

  // Month selector chips
  var h='<div class="mes-selector">';
  mesesOrden.forEach(function(m){
    var cnt=mesesSet[m]||0;
    var nm=new Date(m+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short',year:'numeric'});
    var venc=listaTotal.filter(function(l){
      var s=SEG[l.id]||{};
      if(s.stage==='vendido'||s.stage==='perdido') return false;
      var f=s.proxContacto||String(l.fecha||'').slice(0,10);
      return (f?f.slice(0,7):mesActual)===m && s.proxContacto && s.proxContacto<hoy;
    }).length;
    h+='<button class="mes-chip'+(_mesPipe===m?' on':'')+(venc?' alert':'')+'" onclick="_mesPipe=\''+m+'\';render()">'+nm+' ('+cnt+')'+(venc?' ⚠':'')+'</button>';
  });
  h+='</div>';

  // Filter leads for selected month
  var leadsDelMes=listaTotal.filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    return (f?f.slice(0,7):mesActual)===_mesPipe;
  });
  var huerfanos=listaTotal.filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    return !f;
  });

  var totMes=leadsDelMes.reduce(function(a,l){return a+(Number((SEG[l.id]||{}).valorCotizado)||Number(l.valor)||0);},0);
  var calMes=leadsDelMes.filter(function(l){return esCaliente(l);}).length;
  var vencMes=leadsDelMes.filter(function(l){var s=SEG[l.id]||{};return s.proxContacto&&s.proxContacto<hoy;}).length;

  h+='<div class="kgrid">'
    +K(leadsDelMes.length,'Leads este mes','',new Date(_mesPipe+'-01T12:00:00').toLocaleDateString('es-CO',{month:'long',year:'numeric'}))
    +K(calMes,'Calientes',calMes?'ro':'ok',calMes?'prioridad ahora':'ninguno')
    +K(vencMes,'Vencidos',vencMes?'ro':'ok',vencMes?'sin seguimiento':'Al dia')
    +K(totMes?fmtCOP(totMes):'$0','Pipeline del mes','d','cotizado+valor')
    +'</div>';

  // Kanban
  h+='<div class="kan">';
  ETAPAS.forEach(function(e){
    var ls=leadsDelMes.filter(function(l){return (SEG[l.id]||{}).stage===e[0];});
    var tot=ls.reduce(function(a,l){return a+(Number((SEG[l.id]||{}).valorCotizado)||Number(l.valor)||0);},0);
    h+='<div class="kcol"><div class="kctit">'+e[2]+' '+e[1]+'<span class="bdg bgr">'+ls.length+'</span></div>';
    if(tot) h+='<div style="font-size:11px;color:var(--d);font-weight:700;margin-bottom:8px">'+fmtCOP(tot)+'</div>';
    if(!ls.length) h+='<div style="font-size:11px;color:var(--gc);text-align:center;padding:10px">—</div>';
    ls.forEach(function(l){
      var s=SEG[l.id]||{};
      var v=Number(s.valorCotizado)||Number(l.valor)||0;
      var esOdoo=(s.fuente==='odoo'||l.fuente==='odoo');
      h+='<div class="kcard" onclick="abrirLead(\''+l.id+'\')" style="'+(esCaliente(l)?'border-left:3px solid var(--d);':'')+'">'
        +'<b>'+(l.nombre||l.id)+(esOdoo?' 🟣':'')+(esCaliente(l)?' 🔴':'')+'</b>'
        +'<div class="ks2">'+(l.proyecto||'')+(v?' · '+fmtCOP(v):'')+vigTag(l)+'</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';

  if(huerfanos.length){
    h+='<div class="card" style="margin-top:10px"><div class="chd"><span>Sin mes asignado</span><small>Asigna proxContacto para ubicarlos</small></div>';
    huerfanos.slice(0,20).forEach(function(l){
      h+='<div class="lrow" onclick="abrirLead(\''+l.id+'\')">'
        +'<div style="flex:1"><div class="lnm">'+(l.nombre&&l.nombre.trim()?l.nombre:"#"+String(l.id).slice(-6))+'</div>'
        +'<div class="ldt">'+(l.proyecto||'Sin proyecto')+'</div></div>'
        +'<span class="bdg bgr">Sin fecha</span></div>';
    });
    if(huerfanos.length>20) h+='<div style="padding:8px 13px;font-size:11px;color:var(--gc)">+'+(huerfanos.length-20)+' mas</div>';
    h+='</div>';
  }
  return h;
}

function rCal(){

  var calientes=todos.filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    return esCaliente(l)||esOro(l)||(s.clasificacion&&s.clasificacion!=='Frio');
  });
  // Si el comercial no tiene leads "calientes" mostramos TODOS los activos sin contacto
  if(!calientes.length){
    calientes=todos.filter(function(l){
      var s=SEG[l.id]||{};
      return s.stage!=='vendido'&&s.stage!=='perdido';
    });
  }
  // Ordenar: primero los MÁS RECIENTES (fecha de ingreso DESC), luego por días sin contacto
  calientes.sort(function(a,b){
    // Fecha DESC: el más reciente (mayor fecha) primero
    var fa=fechaLeadStr(a)||'0000-00-00', fb=fechaLeadStr(b)||'0000-00-00';
    if(fb>fa) return 1;   // b es más reciente → b va primero
    if(fa>fb) return -1;  // a es más reciente → a va primero
    // Empate: más días sin contacto primero
    return diasSinContacto(b)-diasSinContacto(a);
  });
  var sin1=calientes.filter(function(l){return !((SEG[l.id]||{}).intentos);}).length;
  var venc=calientes.filter(function(l){var pc=(SEG[l.id]||{}).proxContacto;return pc&&pc<hoyStr();}).length;

    +K(calientes.length,'Leads calientes','ro','prioridad maxima')

    +K(calientes.filter(function(l){return diasSinContacto(l)<=7;}).length,'Activos 7d','ok','')
    +'</div>';

  if(sin1>0){
    h+='<div class="alerta-3m"><h4>'+sin1+' leads calientes sin primer contacto</h4>'
      +'<p>SLA: respuesta al lead del bot en menos de 10 minutos. Atender ahora.</p></div>';
  }

  if(!calientes.length){
    h+='<div class="card"><div class="cp"><div class="empty">Sin leads calientes pendientes</div></div></div>';
    return h;
  }

  var hoyLeads=calientes.filter(function(l){return fechaLeadStr(l)===hoyStr();}).length;
  h+='<div class="card"><div class="chd"><span>Leads — más recientes primero</span>'
    +'<small>'+calientes.length+' leads'+(hoyLeads?' · '+hoyLeads+' de hoy':'')+'</small></div>';
  calientes.forEach(function(l){
    var s=SEG[l.id]||{};
    var dias=diasSinContacto(l);
    var tel=String(l.contacto||'').replace(/[^0-9]/g,'');
    var wa=tel?'<a class="wa-btn" onclick="event.stopPropagation()" href="https://wa.me/57'+tel+'" target="_blank">WA</a>':'';
  // Quick action: mensaje pre-escrito para calientes sin contacto
  var s0=SEG[l.id]||{};
  var qaMsg=construirMsgCliente(l,s0);
  var qa='';
  if(esCaliente(l)&&(!s0.intentos||s0.intentos===0)&&tel){
    qa='<a class="qa-btn" data-lid="'+l.id+'" href="https://wa.me/57'+tel+'?text='+encodeURIComponent(qaMsg)+'" target="_blank" onclick="event.stopPropagation();registrarContactoAlerta(this.dataset.lid)">⚡ Contactar ya</a>';
  }
    var etq=ETAPAS.find(function(e){return e[0]===(s.stage||'prospecto');})||ETAPAS[0];
    var urgColor=dias>21?'var(--ro)':dias>7?'var(--am)':'var(--ok)';
    var urgLabel=!s.intentos?'NUEVO — contactar ya':dias>21?dias+'d inactivo':dias>7?dias+'d sin contacto':'Activo';
    var fStr=fechaLeadStr(l);
    var fechaMostrar=fStr?new Date(fStr+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'}):'';
    var esHoy=fStr===hoyStr();
    h+='<div class="lrow oro" onclick="abrirLead(this.dataset.lid)" data-lid="'+l.id+'" style="border-left:4px solid '+urgColor+'">'
      +'<div style="flex:1;min-width:0"><div class="lnm">'+(l.nombre&&l.nombre.trim()?l.nombre:"#"+String(l.id).slice(-6))
        +(esCaliente(l)?'<span class="hot-badge" style="margin-left:6px">Caliente</span>':'')
        +(esHoy?'<span class="hot-badge" style="margin-left:4px;background:#E8F0EB;border-color:var(--bv);color:var(--ok);border:1px solid">HOY</span>':'')
      +'</div>'
      +'<div class="ldt">'+(l.proyecto||'')+(l.m2?' · '+l.m2+' m²':'')
        +(l.valor?' · '+fmtCOP(l.valor):'')
        +(fechaMostrar?' · ingresó '+fechaMostrar:'')
        +' · <span style="color:'+urgColor+';font-weight:700">'+urgLabel+'</span>'
        +(s.proxContacto?' · próx: '+s.proxContacto:'')+'</div></div>'
      +'<div class="lright">'+qa+'<span class="bdg bgr">'+etq[2]+'</span>'+wa+'</div></div>';
  });
  h+='</div>';

  h+='<div class="card" style="margin-top:8px"><div class="chd"><span>Protocolo leads calientes</span></div><div class="cp">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div style="background:var(--rb);border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:700;color:var(--ro);margin-bottom:4px">NUEVO</div><div style="font-size:11px;color:#7a1a10">Contactar en menos de 10 min. Plantilla Dia 1. Registrar intento.</div></div>'
    +'<div style="background:var(--ab);border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:700;color:var(--am);margin-bottom:4px">8-21 dias sin contacto</div><div style="font-size:11px;color:#7a4e16">Plantilla Dia 7. Ofrecer visita a obra terminada. Registrar.</div></div>'
    +'<div style="background:var(--rb);border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:700;color:var(--ro);margin-bottom:4px">+21 dias inactivo</div><div style="font-size:11px;color:#7a1a10">Plantilla Dia 21. Si no responde: marcar Dormido.</div></div>'
    +'<div style="background:var(--vc);border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:700;color:var(--ok);margin-bottom:4px">Activo 7 dias</div><div style="font-size:11px;color:#2A5C35">Mantener seguimiento. Avanzar a Fase 1 si hay senal de cierre.</div></div>'
    +'</div></div></div>';
  return h;
}

// Toggle formulario
function toggleNLF(){
  var b=document.getElementById('nlf-body');
  if(b) b.classList.toggle('open');
}

// Seleccionar fuente con chips
function selFuente(el){
  document.querySelectorAll('.nlf-fuente-tag').forEach(function(t){t.classList.remove('sel');});
  el.classList.add('sel');
  _fuenteSel=el.dataset.fuente;
  // Mostrar/ocultar campo de referido
  var txt=document.getElementById('nl-fuente-txt');
  if(txt) txt.placeholder=_fuenteSel==='Referido'?'¿Quién lo refirió?':'Detalle adicional (opcional)';
}

// Crear el lead manualmente
function crearLead(){
  var nombre=(document.getElementById('nl-nombre')||{}).value||'';
  var tel=(document.getElementById('nl-tel')||{}).value||'';
  if(!nombre.trim()){toast('⚠ El nombre del cliente es obligatorio');return;}
  if(!tel.trim()){toast('⚠ El teléfono / WhatsApp es obligatorio');return;}

  var tipo=(document.getElementById('nl-tipo')||{}).value||'';
  var m2=(document.getElementById('nl-m2')||{}).value||'';
  var pres=(document.getElementById('nl-presupuesto')||{}).value||'';
  var urg=(document.getElementById('nl-urgencia')||{}).value||'';
  var nota=(document.getElementById('nl-nota')||{}).value||'';
  var proyecto=(document.getElementById('nl-proyecto')||{}).value||'';
  var fuenteTxt=(document.getElementById('nl-fuente-txt')||{}).value||'';
  var respEl=document.getElementById('nl-resp');
  var respVal=respEl?respEl.value:'auto';

  // Generar ID único para el lead manual
  var ts=Date.now();
  var id='manual_'+ts;

  // Determinar comercial asignado
  var fakeL={id:id,cumplePresupuesto:pres?'Sí':'No',tiempoInicio:urg,valor:Number(pres)||0};
  var key=respVal==='auto'?asignarComercial(fakeL):(respVal==='com1'?'com1':'com2');

  // Crear el lead en LEADS
  var nuevoL={
    id:id,
    nombre:nombre.trim(),
    contacto:tel.trim().replace(/[^0-9]/g,''),
    ciudad:'',
    proyecto:proyecto.trim(),
    tipo:tipo,
    espacios:'',
    m2:m2,
    acabado:'',
    cumplePresupuesto:pres?'Sí':'No',
    tiempoInicio:urg,
    valor:Number(pres)||0,
    fecha:hoyStr(),
    fechaTs:new Date().toISOString(),
    campana:'',
    fuente:'manual',
    fuente2:_fuenteSel+(fuenteTxt?' — '+fuenteTxt:''),
  };

  LEADS.unshift(nuevoL); // insertar al principio (más reciente)

  // Crear SEG para el nuevo lead
  var seg={
    stage:'prospecto',
    nota:nota.trim(),
    proxContacto:'',
    intentos:0,
    presupuestoCliente:pres?'$'+(Number(pres)/1e6).toFixed(0)+'M':'',
    valorCotizado:'',
    valorCerrado:'',
    m2:m2,
    responsable:nomCom(key),
    responsableKey:key,
    fase1Agendada:'',
    fechaCierre:'',
    anticipoOK:'',
    clasificacion:esCaliente(nuevoL)?'Caliente':'',
    historial:[{fecha:hoyStr(),accion:'Lead creado manualmente · Fuente: '+_fuenteSel+(fuenteTxt?' ('+fuenteTxt+')':'')}],
    vinculadaAlCierre:'',
    fechaIngresoTs:new Date().toISOString(),
    primerContactoTs:'',
    tiempoRespuestaMin:null,
  };
  SEG[id]=seg;

  // Guardar
  _dirty=true;
  document.getElementById('savebar').style.display='flex';

  // Mostrar confirmación
  var ok=document.getElementById('nl-ok');
  if(ok){ok.style.display='block'; setTimeout(function(){ok.style.display='none';},4000);}
  toast('✅ '+nombre.trim()+' creado · asignado a '+nomCom(key));

  // Limpiar form
  limpiarNL();
  // Re-render manteniendo la vista
  render();
}

// Limpiar formulario de nuevo lead

  var ids=['nl-nombre','nl-tel','nl-proyecto','nl-m2','nl-nota','nl-fuente-txt'];

  var s=document.getElementById('nl-tipo');if(s)s.value='';

function chkM2(){
  var cer=Number(document.getElementById('f-cer')?document.getElementById('f-cer').value:0)||0;
  var cot=Number(document.getElementById('f-cot')?document.getElementById('f-cot').value:0)||0;
  var m2=Number(document.getElementById('f-m2')?document.getElementById('f-m2').value:0)||0;
  var v=cer||cot; var el=document.getElementById('alm2'); if(!el)return;
  if(v&&m2){var pm=v/m2;if(pm<CFG.pisoM2){el.style.display='block';el.textContent='⚠ '+fmtCOP(Math.round(pm))+'/m² — por debajo del piso $1.200.000/m² (Regla 2 Playbook)';}else el.style.display='none';}
  else el.style.display='none';
}
function guardarDet(id){
  var s=SEG[id];
  s.stage=document.getElementById('f-stage').value;
  s.clasificacion=document.getElementById('f-cla').value;
  var respEl=document.getElementById('f-resp');
  if(respEl){ s.responsableKey=respEl.value; s.responsable=nomCom(respEl.value); }
  s.presupuestoCliente=document.getElementById('f-pre').value;
  s.valorCotizado=document.getElementById('f-cot').value;
  s.valorCerrado=document.getElementById('f-cer').value;
  s.m2=document.getElementById('f-m2').value;
  s.proxContacto=document.getElementById('f-px').value;
  s.fechaCierre=document.getElementById('f-fc').value;
  s.anticipoOK=document.getElementById('f-ant').value;
  s.vinculadaAlCierre=document.getElementById('f-vinc').value;
  s.fase1Agendada=document.getElementById('f-f1').value;
  s.intentos=Number(document.getElementById('f-int').value)||0;
  s.nota=document.getElementById('f-nota').value;
  if(!s.historial)s.historial=[];
  s.historial.push({fecha:hoyStr(),stage:s.stage,nota:s.nota.slice(0,60),accion:'Guardado'});
  _dirty=true; cModal(); toast('Guardado — recuerda sincronizar ☁'); render();
  document.getElementById('savebar').style.display='flex';
  // Si es lead de Odoo: sincronizar etapa automáticamente
  var _lOdoo=ODOO_OPS.find(function(x){return x.id===id;});
  if(_lOdoo && getOdooId(_lOdoo)){
    syncEtapaOdoo(id, s.stage, s.valorCotizado||s.valorCerrado||'');
  }
}
function enviarTpl(id,i){
  var l=LEADS.find(function(x){return x.id===id;}); var s=SEG[id];
  var txt=TPL[i][1].replace('{n}',(l.nombre||'').split(' ')[0]).replace('{x}',SESSION?SESSION.nombre.split(' ')[0]:'Lizeth').replace('{ig}',CFG.igUrl);
  var tel=String(l.contacto||'').replace(/[^0-9]/g,'');
  if(!tel){toast('Sin teléfono');return;}
  // Registrar primer contacto con timestamp para medir SLA
  registrarPrimerContacto(id);
  s.intentos=(s.intentos||0)+1;
  if(!s.historial)s.historial=[];
  s.historial.push({fecha:hoyStr(),accion:TPL[i][0]});
  _dirty=true; document.getElementById('savebar').style.display='flex';
  window.open('https://wa.me/57'+tel+'?text='+encodeURIComponent(txt),'_blank');
  toast('WhatsApp abierto · '+TPL[i][0]);
}

function ventasMes(mes, comKey){
  return LEADS.map(function(l){return{l:l,s:SEG[l.id]||{}};})
    .filter(function(x){
      if(x.s.stage!=='vendido'||x.s.anticipoOK!=='SI') return false;
      if((x.s.fechaCierre||'').slice(0,7)!==mes) return false;
      if(Number(x.s.valorCerrado)<=0) return false;
      if(comKey && comKey!=='todos') return x.s.responsableKey===comKey;
      return true;
    });
}

// Cargar datos del lead seleccionado en el formulario
function cfCargarLead(id){
  _editandoContrato = id;
  if(!id) return;
  var l=LEADS.concat(ODOO_OPS).find(function(x){return x.id===id;});
  var s=SEG[id]||{};
  if(!l) return;
  var val=document.getElementById('cf-valor');
  var ant=document.getElementById('cf-anticipo');
  var fec=document.getElementById('cf-fecha');
  var m2e=document.getElementById('cf-m2');
  var vinc=document.getElementById('cf-vinc');
  var resp=document.getElementById('cf-resp');
  if(val) val.value=s.valorCerrado||s.valorCotizado||l.valor||'';
  if(ant) ant.value=s.anticipoMonto||'';
  if(fec) fec.value=s.fechaCierre||hoyStr();
  if(m2e) m2e.value=s.m2||l.m2||'';
  if(vinc) vinc.value=s.vinculadaAlCierre||'SI';
  if(resp) resp.value=s.responsableKey||'com1';
  cfCalcular();
}

// Editar un lead existente desde la lista

function cfCalcular(){
  var val=Number((document.getElementById('cf-valor')||{}).value)||0;
  var ant=Number((document.getElementById('cf-anticipo')||{}).value)||0;
  var m2v=Number((document.getElementById('cf-m2')||{}).value)||0;
  var prev=document.getElementById('cf-preview');
  var wPiso=document.getElementById('cf-warn-piso');
  var wAnt=document.getElementById('cf-warn-ant');
  if(!prev) return;
  if(val>0){
    prev.style.display='flex';
    // Calcular comisión considerando total del mes + este contrato
    var miKey=SESSION&&USERS[SESSION.usuario]&&USERS[SESSION.usuario].key||'todos';
    var totalMes=ventasMes(_mesCom,miKey).reduce(function(a,x){return a+Number(x.s.valorCerrado);},0);
    var totalConEste=totalMes+val;
    var t=tasa(totalConEste);
    var comEste=Math.round(val*t);
    var p1=Math.round(comEste/2);
    var pm=m2v>0?Math.round(val/m2v):0;
    var comEl=document.getElementById('cf-com-val');
    var p1El=document.getElementById('cf-p1-val');
    var pmEl=document.getElementById('cf-pm-val');
    if(comEl) comEl.textContent=fmtCOP(comEste)+' ('+(t*100)+'%)';
    if(p1El)  p1El.textContent=fmtCOP(p1);
    if(pmEl)  pmEl.textContent=pm?fmtCOP(pm)+'/m²':'—';
    if(wPiso) wPiso.style.display=(pm>0&&pm<CFG.pisoM2)?'block':'none';
    if(wAnt)  wAnt.style.display=(ant>0&&ant<val*0.3)?'block':'none';
  } else {
    prev.style.display='none';
    if(wPiso) wPiso.style.display='none';
    if(wAnt)  wAnt.style.display='none';
  }
}

// Guardar el contrato
function cfGuardar(){
  var id=_editandoContrato||document.getElementById('cf-lead').value;
  if(!id){toast('⚠ Selecciona un cliente primero');return;}
  var val=document.getElementById('cf-valor').value;
  var ant=document.getElementById('cf-anticipo').value;
  var fec=document.getElementById('cf-fecha').value;
  var m2v=document.getElementById('cf-m2').value;
  var vinc=document.getElementById('cf-vinc').value;
  var resp=document.getElementById('cf-resp');
  if(!val||!fec){toast('⚠ Valor y fecha son obligatorios');return;}
  var s=SEG[id];
  if(!s){toast('⚠ Lead no encontrado en seguimiento');return;}
  // Actualizar SEG
  s.stage='vendido';
  s.valorCerrado=val;
  s.anticipoMonto=ant;
  s.anticipoOK=ant&&Number(ant)>0?'SI':'';
  s.fechaCierre=fec;
  s.m2=m2v||s.m2||'';
  s.vinculadaAlCierre=vinc;
  if(resp) s.responsableKey=resp.value;
  s.responsable=nomCom(s.responsableKey);
  if(!s.historial)s.historial=[];
  s.historial.push({fecha:hoyStr(),accion:'Contrato registrado: '+fmtCOP(Number(val))+' · anticipo: '+fmtCOP(Number(ant||0))});
  // Sync Odoo si aplica
  var lOdoo=ODOO_OPS.find(function(x){return x.id===id;});
  if(lOdoo&&getOdooId(lOdoo)) syncEtapaOdoo(id,'vendido',val);
  _dirty=true;
  document.getElementById('savebar').style.display='flex';
  _editandoContrato=null;
  toast('✅ Contrato registrado — '+fmtCOP(Number(val)));
  render();
}

// Limpiar formulario
function setMesCom(el){ _mesCom=el.dataset.mes; render(); }
function cfLimpiar(){
  _editandoContrato=null;
  var ids=['cf-lead','cf-valor','cf-anticipo','cf-m2'];
  ids.forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var fec=document.getElementById('cf-fecha');if(fec)fec.value=hoyStr();
  var prev=document.getElementById('cf-preview');if(prev)prev.style.display='none';
}

// Guardar estado de pagos en SEG storage (reutilizamos el mismo mecanismo)
var _pagos_dirty = false;

function guardarPagoCheck(proyId, cuotaIdx, pagada){
  var mes = _mesPagos;
  if(!PAGOS_DATA[mes]) return;
  var proy = PAGOS_DATA[mes].find(function(p){return p.id===proyId;});
  if(!proy||!proy.cuotas[cuotaIdx]) return;
  proy.cuotas[cuotaIdx].pagada = pagada;
  _pagos_dirty = true;
  toast((pagada?'✅':'◻') + ' ' + proy.cliente + ' · ' + proy.cuotas[cuotaIdx].label + ' ' + proy.cuotas[cuotaIdx].pct);
  render();
}

function actualizarFechaPago(proyId, cuotaIdx, fecha){
  var mes = _mesPagos;
  if(!PAGOS_DATA[mes]) return;
  var proy = PAGOS_DATA[mes].find(function(p){return p.id===proyId;});
  if(!proy||!proy.cuotas[cuotaIdx]) return;
  proy.cuotas[cuotaIdx].fecha = fecha;
  _pagos_dirty = true;
  _dirty = true;
  document.getElementById('savebar').style.display='flex';
}

function guardarNuevoProy(){
  var cli=(document.getElementById('np-cliente')||{}).value||'';
  var proy=(document.getElementById('np-proyecto')||{}).value||'';
  var total=Number((document.getElementById('np-total')||{}).value)||0;
  var m2v=(document.getElementById('np-m2')||{}).value||'';
  var notas=(document.getElementById('np-notas')||{}).value||'';
  if(!cli||!total){toast('⚠ Cliente y valor total son obligatorios');return;}
  var mes=_mesPagos;
  if(!PAGOS_DATA[mes]) PAGOS_DATA[mes]=[];
  var id='p_'+mes.replace('-','')+'_'+Date.now();
  var cuotas=[
    {pct:'10%',label:'1er Pago',valor:Math.round(total*0.10),fecha:'',pagada:false},
    {pct:'30%',label:'1er Pago',valor:Math.round(total*0.30),fecha:'',pagada:false},
    {pct:'40%',label:'2do Pago',valor:Math.round(total*0.40),fecha:'',pagada:false},
    {pct:'20%',label:'3er Pago',valor:Math.round(total*0.20),fecha:'',pagada:false},
  ];
  PAGOS_DATA[mes].push({id:id,cliente:cli,proyecto:proy,m2:m2v?Number(m2v):null,total:total,cuotas:cuotas,notas:notas});
  _pagos_dirty=true;_dirty=true;
  document.getElementById('savebar').style.display='flex';
  // Limpiar form
  ['np-cliente','np-proyecto','np-total','np-m2','np-notas'].forEach(function(x){var e=document.getElementById(x);if(e)e.value='';});
  document.getElementById('nuevo-proy-form').classList.remove('open');
  toast('✅ Proyecto añadido: '+cli+(proy?' — '+proy:''));
  render();
}

var _mesPagos = '2026-06'; // mes activo en el módulo de pagos

function rPagos(){
  initPagosData();
  var hoy=hoyStr();
  var proyMes=PAGOS_DATA[_mesPagos]||[];

  // Navegación de meses
  var dP=new Date(_mesPagos+'-01T12:00:00'); dP.setMonth(dP.getMonth()-1);
  var dN=new Date(_mesPagos+'-01T12:00:00'); dN.setMonth(dN.getMonth()+1);
  var mP=dP.toISOString().slice(0,7), mN=dN.toISOString().slice(0,7);
  var mLabel=new Date(_mesPagos+'-01T12:00:00').toLocaleDateString('es-CO',{month:'long',year:'numeric'});

  // KPIs globales del mes
  var totalMes=proyMes.reduce(function(a,p){return a+p.total;},0);
  var recaudado=proyMes.reduce(function(a,p){
    return a+p.cuotas.filter(function(c){return c.pagada;}).reduce(function(b,c){return b+c.valor;},0);
  },0);
  var porRecaudar=totalMes-recaudado;
  var cuotasVenc=[];
  proyMes.forEach(function(p){
    p.cuotas.forEach(function(c){
      if(!c.pagada&&c.fecha&&c.fecha.match(/\d{4}-\d{2}-\d{2}/)&&c.fecha<hoy)
        cuotasVenc.push({p:p,c:c});
    });
  });

  var h='<div class="pagos-mes-nav">'
    +'<button data-mes="'+mP+'" onclick="setMesPagos(this)">◀ '+new Date(mP+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short'})+'</button>'
    +'<span>PAGOS — '+mLabel.toUpperCase()+'</span>'
    +'<button data-mes="'+mN+'" onclick="setMesPagos(this)">'+new Date(mN+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short'})+' ▶</button>'
    +'</div>';

  // Selector rápido de meses
  h+='<div class="filter-bar">';
  ['2026-03','2026-04','2026-05','2026-06','2026-07'].forEach(function(m){
    var nm=new Date(m+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short',year:'2-digit'});
    h+='<button class="fchip'+(_mesPagos===m?' on':'')+'" data-mes="'+m+'" onclick="setMesPagos(this)">'+nm+'</button>';
  });
  h+='</div>';

  // KPIs
  var pctRec=totalMes?Math.round(recaudado/totalMes*100):0;
  h+='<div class="pagos-kpis">'
    +'<div class="pk"><div class="pk-v">'+fmtCOP(totalMes)+'</div><div class="pk-l">Total contratos</div><div class="pk-s">'+proyMes.length+' proyectos</div></div>'
    +'<div class="pk"><div class="pk-v" style="color:var(--ok)">'+fmtCOP(recaudado)+'</div><div class="pk-l">Recaudado</div><div class="pk-s">'+pctRec+'% del total</div></div>'
    +'<div class="pk"><div class="pk-v" style="color:'+(porRecaudar>0?'var(--am)':'var(--ok)')+'">'+fmtCOP(porRecaudar)+'</div><div class="pk-l">Por recaudar</div><div class="pk-s">'+(100-pctRec)+'% pendiente</div></div>'
    +'<div class="pk"><div class="pk-v" style="color:'+(cuotasVenc.length?'var(--ro)':'var(--ok)')+'">'+cuotasVenc.length+'</div><div class="pk-l">Cuotas vencidas</div><div class="pk-s">'+(cuotasVenc.length?'⚠ Gestionar':'Al día')+'</div></div>'
    +'</div>';

  // Alerta cuotas vencidas
  if(cuotasVenc.length){
    h+='<div class="alerta-3m"><h4>⚠ '+cuotasVenc.length+' cuota(s) vencida(s) sin marcar como pagada</h4>'
      +'<p>'+cuotasVenc.map(function(x){return x.p.cliente+(x.p.proyecto?' / '+x.p.proyecto:'')+' · '+x.c.label+' '+x.c.pct+' · '+fmtCOP(x.c.valor)+' · fecha: '+x.c.fecha;}).join('<br>')+'</p></div>';
  }

  // Botón agregar proyecto
  h+='<button class="add-cuota-btn" onclick="agregarProyecto()">➕ Agregar proyecto del mes</button>';

  // Formulario nuevo proyecto
  h+='<div class="nuevo-proyecto-form" id="nuevo-proy-form">'
    +'<div style="font-size:12px;font-weight:700;color:var(--v);margin-bottom:10px">Nuevo proyecto — '+mLabel+'</div>'
    +'<div class="nlf-grid">'
    +'<div><label class="nlf-label">Cliente *</label><input class="nlf-input" id="np-cliente" placeholder="Nombre del cliente"></div>'
    +'<div><label class="nlf-label">Proyecto / Conjunto</label><input class="nlf-input" id="np-proyecto" placeholder="Ej: Tramonte Torre 3"></div>'
    +'<div><label class="nlf-label">Valor total del contrato *</label><input class="nlf-input" id="np-total" type="number" placeholder="Ej: 65000000" oninput="npPreview()"></div>'
    +'<div><label class="nlf-label">m²</label><input class="nlf-input" id="np-m2" type="number" placeholder="Ej: 48"></div>'
    +'<div class="nlf-full"><label class="nlf-label">Notas</label><input class="nlf-input" id="np-notas" placeholder="Ej: Inicia obra julio, entrega apto dic 2026..."></div>'
    +'</div>'
    +'<div id="np-preview" style="font-size:11px;color:var(--g);margin:8px 0;display:none">Cuotas estimadas: 10%=<b id="np-c1"></b> · 30%=<b id="np-c2"></b> · 40%=<b id="np-c3"></b> · 20%=<b id="np-c4"></b></div>'
    +'<div style="display:flex;gap:8px;margin-top:10px">'
    +'<button class="btn-p" onclick="guardarNuevoProy()" style="flex:1">✅ Guardar proyecto</button>'
    +'<button class="btn-s" onclick="cerrarNuevoProy()">Cancelar</button>'
    +'</div></div>';

  // Proyectos del mes
  if(!proyMes.length){
    h+='<div class="card"><div class="cp"><div class="empty">Sin proyectos registrados para este mes</div></div></div>';
  }
  proyMes.forEach(function(p){
    var totalProy=p.total;
    var recProy=p.cuotas.filter(function(c){return c.pagada;}).reduce(function(a,c){return a+c.valor;},0);
    var pctP=totalProy?Math.round(recProy/totalProy*100):0;
    var pm=p.m2?Math.round(totalProy/p.m2):null;
    h+='<div class="proyecto-card">'
      +'<div class="pc-hd">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="pc-hd-name">'+p.cliente+(p.proyecto?' <span style="font-weight:400;opacity:.8">— '+p.proyecto+'</span>':'')+'</div>'
      +'<div style="font-size:10px;color:rgba(255,255,255,.65);margin-top:2px">'
        +(pm?fmtCOP(pm)+'/m² · ':'')
        +'Total: '+fmtCOP(totalProy)+' · Recaudado: '+fmtCOP(recProy)+' ('+pctP+'%)'
        +(p.notas?' · '+p.notas:'')
      +'</div></div>'
      +'<button class="pc-hd-toggle" data-pid="'+p.id+'" onclick="toggleProyCard(this.dataset.pid)">◀▶</button>'
      +'</div>'
      +'<div id="pc-body-'+p.id+'">';

    // Barra de progreso
    h+='<div style="height:4px;background:var(--b)"><div style="height:4px;background:var(--ok);width:'+pctP+'%;transition:width .5s"></div></div>';

    // Cuotas
    p.cuotas.forEach(function(c,idx){
      var esPagada=c.pagada;
      var esFecha=c.fecha&&c.fecha.match(/\d{4}-\d{2}-\d{2}/);
      var esVenc=!esPagada&&esFecha&&c.fecha<hoy;
      var esProx=!esPagada&&esFecha&&c.fecha>=hoy&&c.fecha<=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
      var rowCls=esPagada?'pagada':esVenc?'vencida':esProx?'proxima':'';
      h+='<div class="cuota-row '+rowCls+'">'
        // Check de pago
        +'<div class="cq-check'+(esPagada?' done':'')+'" data-pid="'+p.id+'" data-idx="'+idx+'" onclick="guardarPagoCheck(this.dataset.pid,Number(this.dataset.idx),!'+esPagada+')">'
        +(esPagada?'✓':'')+'</div>'
        +'<span class="cq-pct">'+c.pct+'</span>'
        +'<span class="cq-label">'+c.label+'</span>'
        +'<span class="cq-valor">'+fmtCOP(c.valor)+'</span>'
        // Fecha editable
        +'<span class="cq-fecha">'
        +(esFecha?'<input type="date" value="'+c.fecha+'" data-pid="'+p.id+'" data-idx="'+idx+'" onchange="actualizarFechaPago(this.dataset.pid,Number(this.dataset.idx),this.value)" style="border:none;background:transparent;font-size:11px;color:inherit;cursor:pointer;width:100px">':'<span style="font-size:10px;color:var(--g)">'+(c.fecha||'Sin fecha')+'</span>')
        +'</span>'
        // Status
        +'<span class="cq-status">'
        +(esPagada?'<span class="cq-badge cq-ok">✅ Pagado</span>':esVenc?'<span class="cq-badge cq-venc">⚠ Vencida</span>':esProx?'<span class="cq-badge cq-prox">📅 Esta semana</span>':'<span class="cq-badge cq-pend">Pendiente</span>')
        +'</span>'
        +'</div>';
    });
    h+='</div></div>'; // end pc-body + proyecto-card
  });

  return h;
}

function rMet(){
  var act=LEADS.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='perdido';});
  var cot=LEADS.filter(function(l){return Number((SEG[l.id]||{}).valorCotizado)>0;});
  var ven=LEADS.filter(function(l){return (SEG[l.id]||{}).stage==='vendido';});
  var oro=LEADS.filter(function(l){return esOro(l)&&(SEG[l.id]||{}).stage!=='vendido'&&(SEG[l.id]||{}).stage!=='perdido';});
  var tC=cot.length?Math.round(ven.length/cot.length*100):0;
  var descs=ven.map(function(l){var s=SEG[l.id];return(Number(s.valorCotizado)>0&&Number(s.valorCerrado)>0)?(1-s.valorCerrado/s.valorCotizado)*100:null;}).filter(function(x){return x!==null;});
  var dP=descs.length?Math.round(descs.reduce(function(a,b){return a+b;},0)/descs.length):0;
  var pms=ven.map(function(l){var s=SEG[l.id];return(Number(s.m2)>0&&Number(s.valorCerrado)>0)?s.valorCerrado/s.m2:null;}).filter(function(x){return x;});
  var pmP=pms.length?Math.round(pms.reduce(function(a,b){return a+b;},0)/pms.length):0;
  var meses=calcMesesSinMeta();
  var h='';
  if(meses>0) h+='<div class="alerta-3m"><h4>⚠ Alerta rendimiento — '+meses+' mes(es) consecutivo(s) sin meta mínima ($150M)</h4>'
    +'<p>Política: 3 meses consecutivos sin meta = causal de terminación con justa causa (Otrosí No.1, Cláusula Sexta). '
    +(meses>=3?'<b>UMBRAL ALCANZADO. Revisar decisión con Dirección.</b>':'Mes '+(meses+1)+' en curso.')+'</p></div>';
  h+='<div class="card"><div class="chd"><span>Métricas viernes — Playbook MOSS</span></div><div class="cp">'
    +'<div class="kgrid">'
    +K(oro.length,'Leads oro sin contactar',oro.length?'ro':'ok',oro.length?'Meta: 0':'✅')
    +K(tC+'%','Tasa de cierre',tC<30?'am':'ok','Meta: 30%')
    +K(dP+'%','Descuento promedio',dP>0?'am':'ok','Meta: 0%')
    +K(pmP?fmtCOP(pmP):'—','$/m² promedio',pmP&&pmP<CFG.pisoM2?'ro':'ok','Piso: $1.2M')
    +'</div>'
    +'<div class="nota-tip">SLA: contacto &lt;10min · cotización &lt;48h · seguimiento &lt;24h · mín 5 contactos antes de marcar perdido · contrato mín $18M</div>'
    +'</div></div>';
  // Funnel
  h+='<div class="card"><div class="chd"><span>Embudo de conversión</span></div><div class="cp">';
  var steps=[['Leads totales',LEADS.length],['Contactados',LEADS.filter(function(l){return (SEG[l.id]||{}).intentos>0;}).length],['Cotizados',cot.length],['Vendidos',ven.length]];
  steps.forEach(function(f,i){
    var pct=Math.round(f[1]/steps[0][1]*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>'+f[0]+'</span><span><b>'+f[1]+'</b> ('+pct+'%)</span></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+Math.max(pct,2)+'%"></div></div></div>';
  });
  h+='</div></div>';
  return h;
}
