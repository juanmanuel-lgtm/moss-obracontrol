<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSS CRM Comercial v33</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--v:#2D4A35;--vc:#E8F0EB;--bv:#C2D1C5;--d:#A67C52;--cr:#F2EBE0;--bc:#FAF7F3;--ba:#EEEAE3;--g:#6B6560;--gc:#B5AFA8;--b:#DDD5C8;--ok:#3A6B45;--am:#C17B2A;--ab:#FDF0E0;--ro:#B5362A;--rb:#FAEBE9;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cr);color:#1C1C1A;min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--v);}
.login-box{background:var(--bc);border-radius:16px;padding:32px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.login-logo{width:48px;height:48px;background:var(--v);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:var(--d);margin:0 auto 16px;}
.login-box h2{text-align:center;color:var(--v);font-size:18px;margin-bottom:6px;}
.login-box p{text-align:center;color:var(--g);font-size:12px;margin-bottom:20px;}
.login-box input{width:100%;padding:11px 13px;border:1px solid var(--b);border-radius:9px;font-size:14px;margin-bottom:10px;font-family:inherit;}
.login-box input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.login-btn{width:100%;background:var(--v);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-err{color:var(--ro);font-size:12px;text-align:center;margin-top:8px;display:none;}
.login-role{font-size:10px;color:var(--gc);text-align:center;margin-top:10px;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bc);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(44,64,50,.08);}
.tlogo{width:30px;height:30px;background:var(--v);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--d);}
.ttitle{font-weight:700;font-size:13px;color:var(--v);}
.tsub{font-size:9px;color:var(--gc);text-transform:uppercase;letter-spacing:1px;}
.topright{margin-left:auto;display:flex;gap:8px;align-items:center;}
.user-chip{font-size:10px;padding:4px 9px;border-radius:7px;background:var(--vc);color:var(--v);font-weight:700;border:1px solid var(--bv);}
.dbadge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;font-size:10px;cursor:pointer;border:1px solid;}
.dok{background:var(--vc);border-color:var(--bv);color:var(--ok);}
.dno{background:var(--ab);border-color:#C17B2A40;color:var(--am);}
.dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navbar{background:var(--v);display:flex;overflow-x:auto;scrollbar-width:none;}
.navbar::-webkit-scrollbar{display:none;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:58px;transition:background .15s;}
.nitem.on{border-bottom-color:var(--d);background:rgba(255,255,255,.1);}
.nic{font-size:15px;}.nlb{font-size:8.5px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;}
.nitem.on .nlb{color:#fff;}
.content{flex:1;padding:12px 12px 80px;}

/* CARDS + KPIs */
.card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;}
.chd{padding:9px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.chd span{font-size:11px;color:#fff;font-weight:600;}.chd small{font-size:9px;color:rgba(255,255,255,.6);}
.cp{padding:13px;}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:460px){.kgrid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:10px 11px;}
.kl{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px;}
.kv{font-size:19px;font-weight:700;}.ks{font-size:9px;color:var(--gc);margin-top:3px;}
.kv.ok{color:var(--ok);}.kv.am{color:var(--am);}.kv.ro{color:var(--ro);}.kv.d{color:var(--d);}

/* ROWS */
.lrow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--b);cursor:pointer;background:var(--bc);transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:hover{background:var(--vc);}
.lrow.venc{border-left:4px solid var(--ro);background:var(--rb);}
.lrow.hoy{border-left:4px solid var(--am);background:var(--ab);}
.lrow.oro{border-left:4px solid var(--d);}
.lnm{font-size:13px;font-weight:700;}
.ldt{font-size:10.5px;color:var(--g);margin-top:2px;line-height:1.4;}
.lright{margin-left:auto;display:flex;gap:5px;align-items:center;flex-shrink:0;}
.wa-btn{background:#2F7D4F;color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;}
.bok{background:#E8F0EB;color:#3A6B45;}.bam{background:#FDF0E0;color:#C17B2A;}.bro{background:#FAEBE9;color:#B5362A;}.bd{background:#F0EDE8;color:#A67C52;}.bgr{background:var(--ba);color:var(--g);}

/* KANBAN */
.kan{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.kcol{min-width:200px;background:var(--ba);border:1px solid var(--b);border-radius:11px;padding:9px;flex-shrink:0;}
.kctit{font-size:10px;color:var(--v);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;}
.kcard{background:var(--bc);border:1px solid var(--b);border-radius:9px;padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s;}
.kcard:hover{box-shadow:0 2px 8px rgba(44,64,50,.12);}
.kcard b{display:block;font-size:12.5px;}.kcard .ks2{color:var(--g);font-size:10px;margin-top:3px;}

/* TABLA */
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--v);color:#fff;text-align:left;padding:8px 10px;font-size:10.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--b);}

/* FORM */
.flabel{font-size:9px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--b);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bc);color:#1C1C1A;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--v);box-shadow:0 0 0 2px var(--vc);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.pbar-wrap{background:var(--ba);border-radius:8px;height:10px;overflow:hidden;margin:6px 0 4px;}
.pbar{height:100%;border-radius:8px;background:var(--v);transition:.4s;}
.alert-m2{font-size:11px;color:var(--ro);font-weight:700;padding:6px 10px;background:var(--rb);border-radius:7px;margin-top:6px;display:none;}

/* MODAL */
.modalbg{position:fixed;inset:0;background:rgba(28,28,26,.5);display:none;z-index:200;align-items:flex-end;justify-content:center;}
.modalbg.open{display:flex;}
.modal{background:var(--bc);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:18px 18px 32px;}
.mh{font-size:15px;font-weight:700;color:var(--v);margin-bottom:2px;}
.ms{font-size:11px;color:var(--g);margin-bottom:14px;}
.tpl-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tpl-btn{background:var(--ba);border:1px solid var(--b);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--v);cursor:pointer;font-family:inherit;}
.tpl-btn:hover{background:var(--vc);}
.btm-bar{display:flex;gap:8px;margin-top:14px;}
.btn-p{background:var(--v);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;}
.btn-s{background:var(--ba);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--g);}
.btn-d{background:var(--d);color:#fff;border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--v);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
.save-bar span{color:rgba(255,255,255,.8);font-size:12px;}
.save-btn{background:#fff;border:none;border-radius:8px;color:var(--v);padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.carta-wrap{background:var(--bc);border:1px solid var(--b);border-radius:12px;padding:32px;font-size:13px;line-height:1.7;display:none;margin-top:14px;}
@media print{body *{visibility:hidden;}.carta-wrap,.carta-wrap *{visibility:visible;}.carta-wrap{display:block!important;position:absolute;left:0;top:0;width:100%;border:none;padding:40px;}}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--v);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:28px 16px;color:var(--gc);font-size:13px;}
.nota-tip{font-size:10px;color:var(--ok);background:var(--vc);border:1px solid var(--bv);border-radius:7px;padding:5px 9px;margin-bottom:10px;}
.sec-tit{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin:14px 0 8px;}
.info-box{border-radius:9px;padding:10px 13px;margin-bottom:10px;font-size:12px;line-height:1.5;}
.info-am{background:var(--ab);border:1px solid var(--am);color:#7a4e16;}
.info-ro{background:var(--rb);border:1px solid var(--ro);color:#7a1a10;}
.info-ok{background:var(--vc);border:1px solid var(--bv);color:var(--ok);}
.fchip{background:var(--ba);border:1px solid var(--b);border-radius:20px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);}
.fchip.on{background:var(--v);color:#fff;border-color:var(--v);}
.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* POLITICAS */
.pol-sec{margin-bottom:16px;}
.pol-sec h3{color:var(--v);font-size:13px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--d);}
.pol-sec p,.pol-sec li{font-size:12px;color:#2A2C24;line-height:1.65;margin-bottom:4px;}
.pol-sec ul{padding-left:16px;}
.pol-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.pol-kpi-item{background:var(--ba);border-radius:8px;padding:9px 11px;font-size:11.5px;}
.pol-kpi-item b{display:block;color:var(--v);font-size:12px;margin-bottom:3px;}
.escalera-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.escalera-table th{background:var(--v);color:#fff;padding:7px 10px;text-align:left;}
.escalera-table td{padding:7px 10px;border-bottom:1px solid var(--b);}
.escalera-table tr:last-child td{border-bottom:none;}
.alerta-3m{background:var(--rb);border:1px solid var(--ro);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.alerta-3m h4{color:var(--ro);font-size:13px;font-weight:700;margin-bottom:4px;}
.alerta-3m p{font-size:11.5px;color:#7a1a10;line-height:1.5;}
/* PIPELINE MENSUAL */
.mes-selector{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.mes-selector::-webkit-scrollbar{display:none;}
.mes-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:var(--ba);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--g);}
.mes-chip.on{background:var(--v);color:#fff;border-color:var(--v);}
.mes-chip.alert{border-color:var(--ro);color:var(--ro);}
/* VIGENCIA LEADS */
.vtag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-left:4px;}
.vhot{background:#FAEBE9;color:#B5362A;}   /* vencido >21 días sin contacto */
.vwarm{background:#FDF0E0;color:#C17B2A;}  /* 8-21 días */
.vok{background:#E8F0EB;color:#3A6B45;}    /* ≤7 días */
.vnew{background:#F0EDE8;color:#A67C52;}   /* nuevo bot — sin contacto aún */
/* CALIENTES PANEL */
.hot-card{background:var(--rb);border:1px solid var(--ro);border-radius:11px;padding:10px 13px;margin-bottom:8px;cursor:pointer;}
.hot-card:hover{box-shadow:0 2px 8px rgba(181,54,42,.15);}
.hot-card .hc-nm{font-size:13px;font-weight:700;color:#B5362A;}
.hot-card .hc-dt{font-size:10.5px;color:#7a1a10;margin-top:3px;}
.hot-badge{display:inline-flex;align-items:center;gap:4px;background:#FAEBE9;border:1px solid var(--ro);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--ro);}
/* PIPELINE MONTH HEADER */
.pipe-month-hd{padding:10px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.pipe-month-hd span{font-size:11px;color:#fff;font-weight:600;}
.pipe-month-hd small{font-size:9px;color:rgba(255,255,255,.6);}
.pipe-mes-total{font-size:11px;font-weight:700;color:var(--d);padding:6px 14px;background:var(--vc);border-bottom:1px solid var(--bv);}
/* PROPUESTA PDF */
.prop-preview{background:var(--bc);border:1px solid var(--b);border-radius:12px;padding:24px;margin-top:12px;display:none;font-size:13px;line-height:1.6;}
.prop-preview.show{display:block;}
@media print{
  body *{visibility:hidden!important;}
  .prop-preview,.prop-preview *{visibility:visible!important;}
  .prop-preview{display:block!important;position:absolute;left:0;top:0;width:100%;border:none;padding:32px;border-radius:0;}
}
.prop-logo-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #5C6E46;}
.prop-logo-nm{font-size:22px;font-weight:700;color:#3B4F2E;letter-spacing:-0.5px;}
.prop-logo-sub{font-size:10px;color:#6B7060;text-transform:uppercase;letter-spacing:.8px;}
.prop-section{margin-bottom:14px;}
.prop-section h4{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6B7060;font-weight:700;margin-bottom:6px;}
.prop-table{width:100%;border-collapse:collapse;}
.prop-table td{padding:6px 10px;border-bottom:1px solid #E8E0D0;font-size:12px;}
.prop-table td:first-child{color:#6B7060;width:40%;}
.prop-table td:last-child{font-weight:600;color:#3B4F2E;}
.prop-total{background:#F5F0E8;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin:12px 0;}
.prop-total-label{font-size:11px;color:#6B7060;text-transform:uppercase;letter-spacing:.6px;}
.prop-total-value{font-size:20px;font-weight:700;color:#3B4F2E;}
.prop-note{font-size:11px;color:#8FA478;background:#E8F0EB;border-radius:7px;padding:8px 12px;margin-top:10px;}
.prop-sign{display:flex;gap:40px;margin-top:28px;padding-top:16px;border-top:1px solid #E8E0D0;}
.prop-sign-box{flex:1;text-align:center;}
.prop-sign-line{border-top:1px solid #3B4F2E;padding-top:6px;font-size:11px;color:#6B7060;}

/* ODOO SYNC INDICATOR */
.odoo-sync{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:9.5px;font-weight:700;}
.odoo-synced {background:#EDE7F6;color:#5E35B1;}
.odoo-syncing{background:#E8EAF6;color:#3949AB;animation:pulse 1s infinite;}
.odoo-sync-err{background:#FAEBE9;color:#B5362A;}
.odoo-sync-na {background:var(--ba);color:var(--gc);}

/* ALERTA AUTOMÁTICA MODAL */
.alert-modal{position:fixed;inset:0;background:rgba(28,28,26,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.alert-modal.open{display:flex;}
.alert-box{background:var(--bc);border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.alert-box-hd{background:var(--ro);padding:14px 18px;display:flex;align-items:center;gap:10px;}
.alert-box-hd h3{color:#fff;font-size:14px;margin:0;}
.alert-box-hd span{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;margin-left:auto;}
.alert-item{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;}
.alert-item:last-child{border-bottom:none;}
.alert-item-info{flex:1;min-width:0;}
.alert-item-name{font-size:13px;font-weight:700;color:var(--v);}
.alert-item-time{font-size:10.5px;color:var(--ro);font-weight:700;margin-top:2px;}
.alert-item-det{font-size:10px;color:var(--g);margin-top:1px;}
.wa-action-btn{display:flex;align-items:center;gap:6px;background:#25D366;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none;}
.wa-action-btn:hover{background:#1fb356;}
.dismiss-btn{background:var(--ba);border:1px solid var(--b);border-radius:10px;padding:8px 12px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);}
.alert-footer{padding:12px 16px;background:var(--ba);display:flex;justify-content:space-between;align-items:center;}
/* FLOATING ALERT BELL */
.alert-bell{position:fixed;bottom:80px;right:16px;z-index:400;background:var(--ro);color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(181,54,42,.4);display:none;align-items:center;justify-content:center;animation:bellring .6s ease-in-out infinite;}
.alert-bell.show{display:flex;}
@keyframes bellring{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.alert-bell-badge{position:absolute;top:-4px;right:-4px;background:#fff;color:var(--ro);border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* QUICK ACTION in row */
.qa-btn{display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;}
.qa-btn:hover{background:#1fb356;}

/* SEMÁFORO TIEMPO DE RESPUESTA */
.sla-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;margin-bottom:2px;}
.sla-ok  {background:#E8F0EB;color:#3A6B45;}
.sla-warn{background:#FDF0E0;color:#C17B2A;}
.sla-hot {background:#FAEBE9;color:#B5362A;}
.sla-new {background:#F0EDE8;color:#A67C52;}
.sla-dot {width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sla-dot-ok  {background:#3A6B45;}
.sla-dot-warn{background:#C17B2A;animation:pulse 1.5s infinite;}
.sla-dot-hot {background:#B5362A;animation:pulse .8s infinite;}
.sla-dot-new {background:#A67C52;animation:pulse 1s infinite;}
/* LEAD CARD MEJORADA */
.lrow-time{font-size:9.5px;color:var(--gc);margin-top:1px;}
.timer-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;}
.tb-new {background:#F0EDE8;color:#A67C52;border:1px solid #D4C4B0;}
.tb-ok  {background:#E8F0EB;color:#3A6B45;border:1px solid #C2D1C5;}
.tb-warn{background:#FDF0E0;color:#C17B2A;border:1px solid #E8C88A;}
.tb-hot {background:#FAEBE9;color:#B5362A;border:1px solid #E8A8A0;}
/* PANEL SLA HEADER */
.sla-header{background:var(--v);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.sla-kpi{text-align:center;}
.sla-kpi-v{font-size:20px;font-weight:700;color:#fff;}

<script>

var USERS = {
  'juanma':  { pwd:'moss2026CEO', rol:'ceo',       nombre:'Juan Ma · CEO' },
  'com1':    { pwd:'com1moss26',  rol:'comercial', nombre:'Comercial 1',  key:'com1' },
  'com2':    { pwd:'com2moss26',  rol:'comercial', nombre:'Comercial 2',  key:'com2' },
  'liz':     { pwd:'liz2026',     rol:'comercial', nombre:'Lizeth Figueroa', key:'com1' },

// CEO ve todos los leads y puede filtrar por comercial.
// Comercial solo ve sus leads asignados (campo responsableKey en SEG).

var SESSION = null; // { usuario, rol, nombre }

function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value;
  var user=USERS[u];
  if(!user||user.pwd!==p){

  SESSION={usuario:u, rol:user.rol, nombre:user.nombre};

  app.style.display='flex';

  cargar();
}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

function buildNavbar(){
  var isCeo=SESSION.rol==='ceo';
  var tabs=[
    ['seg','📋','Seguimiento'],
    ['pipe','🔀','Pipeline'],
    ['cal','🔴','Calientes'],
    isCeo?['bot','🤖','Leads Bot']:null,
    isCeo?['asig','👥','Asignación']:null,
    ['com','💰','Comisiones'],
    isCeo?['met','📊','Métricas']:null,
    ['pol','📜','Políticas']
  ].filter(Boolean);
  var nb=document.getElementById('navbar');
  nb.innerHTML=tabs.map(function(t,i){
    return '<div class="nitem'+(i===0?' on':'')+'" onclick="nav(\''+t[0]+'\',this)"><div class="nic">'+t[1]+'</div><div class="nlb">'+t[2]+'</div></div>';
  }).join('');
  _vista=tabs[0][0];
}

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
var CFG={
  scriptUrl:'https://script.google.com/macros/s/AKfycbyg653sAcOCSmU-pVDF5wEPo8M8to0-Gj3lbTUGdMpLS9GRZlKsdII-sZ4Pt0oukTDB9w/exec',
  odooUrl:'https://moss-arquitectura-y-mobiliario-sas.odoo.com',
  odooKey:'75ca5013352d14fdaf9b59069db61c61ac5754763',
  odooDb:'moss-arquitectura-y-mobiliario-sas',
  igUrl:'https://www.instagram.com/moss.arquitectura',
  empresa:'MOSS Arquitectura y Mobiliario S.A.S. — NIT 901.159.078-6',
  metaMes:300000000, umbral:150000000, pisoM2:1200000, minCto:18000000,
  waCom1:'573213516016',   // Comercial 1 — alertas urgentes
  waCom2:'573134379479'    // Comercial 2 — alertas urgentes
};
function tasa(v){if(v<=150e6)return 0;if(v<=250e6)return 0.01;if(v<=350e6)return 0.02;return 0.035;}

var LEADS=[], LEADS_HIST=[], ODOO_OPS=[], SEG={}, _dirty=false, _vista='seg', _mesCom=hoyStr().slice(0,7), _filtroBot='todos', _verHistoricos=false;
var _mesPipe=hoyStr().slice(0,7);
var _filtroCom='todos'; // CEO filter: 'todos' | 'com1' | 'com2'

// ── Asignación aleatoria equitativa ──────────────────────────────────────────
// Lee cuántos leads activos tiene cada comercial y asigna al que tenga menos.
// En empate: elige aleatoriamente entre los empatados.
function asignarComercial(lead){
  var coms=['com1','com2'];
  var todos=LEADS.concat(ODOO_OPS);
  // Para leads calientes: asignar al que tenga MENOS calientes activos
  var esUrgente=lead&&(esCaliente(lead)||esOro(lead));
  if(esUrgente){
    var cal={com1:0,com2:0};
    todos.forEach(function(l){
      var s=SEG[l.id]||{};
      if(s.stage==='perdido'||s.stage==='vendido') return;
      if(esCaliente(l)&&s.responsableKey&&cal[s.responsableKey]!==undefined) cal[s.responsableKey]++;
    });
    if(cal.com1<cal.com2) return 'com1';
    if(cal.com2<cal.com1) return 'com2';
    return coms[Math.floor(Math.random()*2)];
  }
  // Para leads normales: al que tenga menos leads activos totales
  var conteo={com1:0,com2:0};
  todos.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='perdido') return;
    var k=s.responsableKey||'';
    if(conteo[k]!==undefined) conteo[k]++;
  });
  if(conteo.com1<conteo.com2) return 'com1';
  if(conteo.com2<conteo.com1) return 'com2';
  return coms[Math.floor(Math.random()*2)];
}

// Nombre visible de un comercial key
function nomCom(key){
  var u=Object.values(USERS).find(function(u){return u.key===key;});
  return u?u.nombre:(key||'—');
}

// ¿El usuario actual puede ver este lead?
function puedoVerLead(l){
  if(!SESSION) return false;
  if(SESSION.rol==='ceo') return true;
  var s=SEG[l.id]||{};
  var miKey=USERS[SESSION.usuario]&&USERS[SESSION.usuario].key;
  if(!miKey) return true; // sin key: ve todo (legacy)
  return (s.responsableKey||'')=== miKey;
}

function diasSinContacto(l){
  var s=SEG[l.id]||{};
  if(s.proxContacto && s.proxContacto >= hoyStr()) return 0;
  var fechas=[s.proxContacto, String(l.fecha||'').slice(0,10)].filter(Boolean).sort().reverse();
  if(!fechas.length) return 999;
  var d=new Date(fechas[0]+'T12:00:00');
  if(isNaN(d)) return 999;
  return Math.floor((new Date()-d)/(1000*60*60*24));
}

// ── Tiempo desde que llegó el lead (usando fechaIngreso si existe, sino l.fecha) ──
function horasDesdeIngreso(l){
  var s=SEG[l.id]||{};
  // Si ya tiene primer contacto registrado: tiempo=0 (ya fue atendido)
  if(s.intentos && s.intentos>0 && s.primerContactoTs) return 0;
  // Usar timestamp exacto si existe, sino fecha del lead
  var ts=s.fechaIngresoTs || l.fechaTs || null;
  if(ts){
    var diff=(new Date()-new Date(ts))/(1000*60*60);
    return Math.round(diff*10)/10;
  }
  // Fallback: usar l.fecha como día (sin hora exacta)
  var f=String(l.fecha||'').slice(0,10);
  if(!f) return null;
  var d=new Date(f+'T12:00:00');
  if(isNaN(d)) return null;
  var diff=(new Date()-d)/(1000*60*60);
  return Math.round(diff);
}

// ── Registrar primer contacto con timestamp ──────────────────────────────────
function registrarPrimerContacto(id){
  var s=SEG[id]||{};
  if(!s.primerContactoTs && (s.intentos||0)===0){
    s.primerContactoTs=new Date().toISOString();
    // Calcular tiempo de respuesta en minutos
    var ts=s.fechaIngresoTs||null;
    if(ts){
      s.tiempoRespuestaMin=Math.round((new Date()-new Date(ts))/60000);
    }
  }
}

// ── Badge de tiempo para mostrar en cada lead ────────────────────────────────
function timerBadge(l){
  var s=SEG[l.id]||{};
  if(s.stage==='vendido'||s.stage==='perdido') return '';
  // Si ya tiene contactos: mostrar tiempo desde último contacto
  if(s.intentos && s.intentos>0){
    var d=diasSinContacto(l);
    if(d===0) return '<span class="timer-badge tb-ok">✓ Contactado</span>';
    if(d<=3)  return '<span class="timer-badge tb-ok">'+d+'d</span>';
    if(d<=7)  return '<span class="timer-badge tb-warn">'+d+'d sin contacto</span>';
    if(d<=21) return '<span class="timer-badge tb-warn">⚠ '+d+'d</span>';
    return '<span class="timer-badge tb-hot">🔴 '+d+'d inactivo</span>';
  }
  // Sin ningún contacto: mostrar urgencia de primer contacto
  var h=horasDesdeIngreso(l);
  if(h===null) return '<span class="timer-badge tb-new">NUEVO</span>';
  if(h<1) return '<span class="timer-badge tb-hot">🔴 Hace '+(Math.round(h*60))+'min — ATENDER YA</span>';
  if(h<10) return '<span class="timer-badge tb-hot">🔴 Hace '+Math.round(h)+'h sin respuesta</span>';
  if(h<24) return '<span class="timer-badge tb-warn">⚠ Hace '+Math.round(h)+'h</span>';
  var d2=Math.floor(h/24);
  return '<span class="timer-badge tb-hot">🔴 '+d2+'d sin primer contacto</span>';
}

// ── SLA score: % leads calientes respondidos en <10 min este mes ─────────────
function slaScore(){
  var cal=LEADS.filter(function(l){return esCaliente(l);});
  if(!cal.length) return {pct:100, total:0, ok:0, vencidos:0};
  var ok=cal.filter(function(l){
    var s=SEG[l.id]||{};
    return s.primerContactoTs && (s.tiempoRespuestaMin||999)<10;
  }).length;
  var venc=cal.filter(function(l){
    var s=SEG[l.id]||{};
    return !s.intentos || s.intentos===0;
  }).length;
  return {pct:Math.round(ok/Math.max(cal.length,1)*100), total:cal.length, ok:ok, vencidos:venc};
}
function vigTag(l){
  var s=SEG[l.id]||{};
  if(s.stage==='vendido'||s.stage==='perdido') return '';
  var d=diasSinContacto(l);
  if(!s.intentos && !s.proxContacto) return '<span class="vtag vnew">NUEVO</span>';
  if(d<=7)  return '<span class="vtag vok">Activo</span>';
  if(d<=21) return '<span class="vtag vwarm">'+d+'d</span>';
  return '<span class="vtag vhot">'+d+'d inactivo</span>';
}
function esCaliente(l){
  var s=SEG[l.id]||{};
  if(s.clasificacion==='Caliente') return true;
  var tp=String(l.tiempoInicio||'').toLowerCase();
  var cp=String(l.cumplePresupuesto||'').toLowerCase();
  if(/si|sí/.test(cp) && /menor a un mes|un mes|1 mes|1-3|1 a 3/.test(tp)) return true;
  if(Number(l.valor)>=80000000) return true;
  return false;
}
function esLead2026(l){
  // El lead se considera activo 2026 si su fecha de interacción es >= 2026-01-01
  var f = String(l.fecha||'').trim();
  if(!f) return false;
  var anio = parseInt(f.slice(0,4),10);
  if(!isNaN(anio)) return anio>=2026;
  // fallback: intentar parsear formatos tipo "Tue Nov 04 2025"
  var d = new Date(f);
  if(!isNaN(d.getTime())) return d.getFullYear()>=2026;
  return false;
}

var ETAPAS=[
  ['prospecto','Prospecto','📥'],['contactado','Contactado','📞'],
  ['fase0','Fase 0 · Visita','🏠'],['cotizado','Cotización enviada','📄'],
  ['fase1','Fase 1 · Negociación','🤝'],['vendido','Vendido ✅','✅'],
  ['perdido','Dormido / Perdido','💤']
];
var TPL=[
  ['Día 1 — Cotización','Hola {n}! Soy {x} de MOSS 🌿 Te comparto la cotización de tu proyecto. Incluye plazo fijo de 2 meses, póliza de cumplimiento y 1 año de garantía ✅ ¿Qué día te queda bien para revisarla juntos?'],
  ['Día 3 — Video obra','Hola {n}! Mira cómo quedó una remodelación similar a la tuya que acabamos de entregar 🏡 {ig} ¿Te imaginas tu apartamento así? Cualquier duda me avisas.'],
  ['Día 7 — Reservar cupo','Hola {n} 👋 Esta semana iniciamos 2 obras y quiero reservarte cupo de inicio. Si firmamos esta semana congelamos precios 🔒 ¿Agendamos?'],
  ['Día 14 — Visita obra','Hola {n}, ¿te gustaría visitar una de nuestras obras en curso? 👷 Es la mejor forma de ver la calidad MOSS. ¡Con gusto te coordino la visita!'],
  ['Día 21 — Último contacto','Hola {n} 😊 Si este no es el momento, lo dejamos para más adelante y te sigo compartiendo proyectos por redes. ¿Lo retomamos pronto?']
];

// ═══════════════════════════════════════════════
// CARGA
// ═══════════════════════════════════════════════
function cargar(){
  setBadge(false,'Cargando…');
  var cbName='mosscrm_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    setBadge(false,'Sin conexión'); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){} render();
  },12000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(!d||!d.ok){setBadge(false,'Error del servidor');render();return;}
    var todos=d.leads||[];
    LEADS_HIST=todos.filter(function(l){return !esLead2026(l);});
    LEADS=todos.filter(function(l){return esLead2026(l);});
    SEG=d.seguimiento||{};
    LEADS.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    LEADS_HIST.forEach(function(l){if(!SEG[l.id])SEG[l.id]=nuevoSeg(l);});
    setBadge(true,'✓ Bot: '+LEADS.length+' activos 2026');
    render();
    setTimeout(checkAlertas, 800); // revisar alertas después de cargar
    setTimeout(checkRecordatorios, 1500); // revisar recordatorios D+N
    if(CFG.odooUrl && CFG.odooKey) cargarOdoo();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(false,'Error');render();};
  sc.src=CFG.scriptUrl+'?action=crm&callback='+cbName;
  document.body.appendChild(sc);
}
function cargarOdoo(){
  setBadge(false,'Conectando Odoo…');
  var cbName='mossodoo_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    delete window[cbName]; try{document.body.removeChild(sc);}catch(e){}
    setBadge(true,'Bot ✓ · Odoo sin respuesta');
    render();
  },15000);
  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(d && d.ok && d.oportunidades){
      ODOO_OPS = d.oportunidades.map(function(o){
        return {
          id:'odoo_'+o.id,
          nombre:o.partner_name||o.name||('Oportunidad '+o.id),
          proyecto:o.name||'',
          valor:o.planned_revenue||0,
          etapaOdoo:o.stage_name||'',
          responsable:o.user_name||'',
          contacto:o.phone||o.email||'',
          probabilidad:o.probability||0,
          fuente:'odoo'
        };
      });
      ODOO_OPS.forEach(function(o){
        if(!SEG[o.id]) SEG[o.id]={stage:mapOdooStage(o.etapaOdoo),nota:'',proxContacto:'',intentos:0,
          presupuestoCliente:'',valorCotizado:String(o.valor),valorCerrado:'',m2:'',
          responsable:o.responsable,fase1Agendada:'',fechaCierre:'',anticipoOK:'',
          clasificacion:'',historial:[],vinculadaAlCierre:'',fuente:'odoo'};
      });
      setBadge(true,'✓ Bot + Odoo · '+ODOO_OPS.length+' oportunidades');
    } else {
      setBadge(true,'Bot ✓ · Odoo: '+(d&&d.error?d.error:'sin datos'));
    }
    render();
  };
  sc.onerror=function(){clearTimeout(tm);setBadge(true,'Bot ✓ · Odoo error conexión');render();};
  sc.src=CFG.scriptUrl+'?action=odoo&callback='+cbName
    +'&odooUrl='+encodeURIComponent(CFG.odooUrl)
    +'&odooKey='+encodeURIComponent(CFG.odooKey)
    +'&odooDb='+encodeURIComponent(CFG.odooDb);
  document.body.appendChild(sc);
}
function mapOdooStage(nombreEtapa){
  var n=(nombreEtapa||'').toLowerCase();
  if(n.indexOf('contrato')>=0||n.indexOf('firmado')>=0) return 'vendido';
  if(n.indexOf('alta probabilidad')>=0) return 'fase1';
  if(n.indexOf('cotizaci')>=0) return 'cotizado';
  if(n.indexOf('fase 0')>=0||n.indexOf('reuni')>=0) return 'fase0';
  if(n.indexOf('meses')>=0) return 'contactado';
  return 'prospecto';
}
function todosLosLeads(){ return LEADS.concat(ODOO_OPS); }

function nuevoSeg(l){
  var oro=esOro(l);
  var key=asignarComercial(l); // pasa el lead para priorizar calientes
  // Registrar timestamp exacto de ingreso al CRM (primer vez que se ve el lead)
  var ahora=new Date().toISOString();
  return{stage:l.campana&&/vendido/i.test(l.campana||'')?'vendido':'prospecto',
    nota:'',proxContacto:'',intentos:0,presupuestoCliente:'',valorCotizado:'',
    valorCerrado:'',m2:l.m2||'',responsable:nomCom(key),responsableKey:key,
    fase1Agendada:'',fechaCierre:'',anticipoOK:'',clasificacion:oro?'Caliente':'',
    historial:[],vinculadaAlCierre:'',
    fechaIngresoTs:l.fechaTs||ahora,  // timestamp de ingreso al sistema
    primerContactoTs:'',              // se llena al primer envío de WA
    tiempoRespuestaMin:null};         // minutos entre ingreso y primer contacto
}
function esOro(l){
  var s=SEG[l.id]||{};
  return s.clasificacion==='Caliente'||(/si/i.test(l.cumplePresupuesto||'')&&/menor a un mes/i.test(l.tiempoInicio||''));
}

// NAV
// ═══════════════════════════════════════════════
function nav(v,el){
  _vista=v;
  document.querySelectorAll('.nitem').forEach(function(n){n.classList.remove('on');});
  if(el)el.classList.add('on');
  render();
}
function render(){
  var c=document.getElementById('content');
  if(_vista==='seg') c.innerHTML=rSeg();
  else if(_vista==='pipe') c.innerHTML=rPipe();
  else if(_vista==='cal') c.innerHTML=rCal();
  else if(_vista==='asig') c.innerHTML=rAsig();
  else if(_vista==='bot') c.innerHTML=rBot();
  else if(_vista==='com') c.innerHTML=rCom();
  else if(_vista==='met') c.innerHTML=rMet();
  else c.innerHTML=rPol();
}

// ═══════════════════════════════════════════════
// SEGUIMIENTO
// ═══════════════════════════════════════════════
function rSeg(){
  var hoy=hoyStr(), venc=[],hoyL=[],oro=[],resto=[];
  var listaTotal=LEADS.concat(ODOO_OPS).filter(puedoVerLead);
  // CEO filter by comercial
  if(SESSION&&SESSION.rol==='ceo'&&_filtroCom!=='todos'){
    listaTotal=listaTotal.filter(function(l){return (SEG[l.id]||{}).responsableKey===_filtroCom;});
  }
  listaTotal.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var pc=s.proxContacto||'';
    if(pc&&pc<hoy) venc.push(l);
    else if(pc===hoy) hoyL.push(l);
    else if(esOro(l)&&!s.intentos) oro.push(l);
    else resto.push(l);
  });
  var act=listaTotal.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='vendido'&&s.stage!=='perdido';});
  var h='';
  // CEO filter bar
  if(SESSION&&SESSION.rol==='ceo'){
    h+=fchipBar([['todos','Todos'],['com1','C1'],['com2','C2']],'_filtroCom');
  }
  // ── Panel SLA tiempo de respuesta ─────────────────────────────────────────
  var sla=slaScore();
  var sinResp=act.filter(function(l){var s=SEG[l.id]||{};return esCaliente(l)&&(!s.intentos||s.intentos===0);});
  var respHoy=act.filter(function(l){var s=SEG[l.id]||{};
    return s.primerContactoTs&&s.primerContactoTs.slice(0,10)===hoyStr();}).length;
  var slaColor=sla.pct>=80?'#3A6B45':sla.pct>=50?'#C17B2A':'#B5362A';
  if(sinResp.length||act.length){
    h+='<div class="sla-header">'
      +'<div class="sla-kpi"><div class="sla-kpi-v" style="color:'+(sinResp.length?'#FAEBE9':'#C8E6C9')+'">'+sinResp.length+'</div><div class="sla-kpi-l">Sin primer contacto</div></div>'
      +'<div class="sla-sep"></div>'
      +'<div class="sla-kpi"><div class="sla-kpi-v">'+respHoy+'</div><div class="sla-kpi-l">Respondidos hoy</div></div>'

// PIPELINE MENSUAL v34
// ═══════════════════════════════════════════════
function rPipe(){
  var listaTotal=LEADS.concat(ODOO_OPS).filter(puedoVerLead);
  var hoy=hoyStr(), mesActual=hoy.slice(0,7);

  // Build month list
  var mesesSet={};
  listaTotal.forEach(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    var m=f?f.slice(0,7):'';
    if(m) mesesSet[m]=(mesesSet[m]||0)+1;
    else mesesSet['sin-mes']=(mesesSet['sin-mes']||0)+1;
  });
  if(!mesesSet[mesActual]) mesesSet[mesActual]=0;
  var mesesOrden=Object.keys(mesesSet).filter(function(m){return m!=='sin-mes';}).sort();
  if(!mesesOrden.includes(_mesPipe)) _mesPipe=mesActual;

  // Month selector chips
  var h='<div class="mes-selector">';
  mesesOrden.forEach(function(m){
    var cnt=mesesSet[m]||0;
    var nm=new Date(m+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short',year:'numeric'});
    var venc=listaTotal.filter(function(l){
      var s=SEG[l.id]||{};
      if(s.stage==='vendido'||s.stage==='perdido') return false;
      var f=s.proxContacto||String(l.fecha||'').slice(0,10);
      return (f?f.slice(0,7):mesActual)===m && s.proxContacto && s.proxContacto<hoy;
    }).length;
    h+='<button class="mes-chip'+(_mesPipe===m?' on':'')+(venc?' alert':'')+'" onclick="_mesPipe=\''+m+'\';render()">'+nm+' ('+cnt+')'+(venc?' ⚠':'')+'</button>';
  });
  h+='</div>';

  // Filter leads for selected month
  var leadsDelMes=listaTotal.filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    return (f?f.slice(0,7):mesActual)===_mesPipe;
  });
  var huerfanos=listaTotal.filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    var f=s.proxContacto||String(l.fecha||'').slice(0,10);
    return !f;
  });

  var totMes=leadsDelMes.reduce(function(a,l){return a+(Number((SEG[l.id]||{}).valorCotizado)||Number(l.valor)||0);},0);
  var calMes=leadsDelMes.filter(function(l){return esCaliente(l);}).length;
  var vencMes=leadsDelMes.filter(function(l){var s=SEG[l.id]||{};return s.proxContacto&&s.proxContacto<hoy;}).length;

  h+='<div class="kgrid">'
    +K(leadsDelMes.length,'Leads este mes','',new Date(_mesPipe+'-01T12:00:00').toLocaleDateString('es-CO',{month:'long',year:'numeric'}))
    +K(calMes,'Calientes',calMes?'ro':'ok',calMes?'prioridad ahora':'ninguno')
    +K(vencMes,'Vencidos',vencMes?'ro':'ok',vencMes?'sin seguimiento':'Al dia')
    +K(totMes?fmtCOP(totMes):'$0','Pipeline del mes','d','cotizado+valor')
    +'</div>';

  // Kanban
  h+='<div class="kan">';
  ETAPAS.forEach(function(e){
    var ls=leadsDelMes.filter(function(l){return (SEG[l.id]||{}).stage===e[0];});
    var tot=ls.reduce(function(a,l){return a+(Number((SEG[l.id]||{}).valorCotizado)||Number(l.valor)||0);},0);
    h+='<div class="kcol"><div class="kctit">'+e[2]+' '+e[1]+'<span class="bdg bgr">'+ls.length+'</span></div>';
    if(tot) h+='<div style="font-size:11px;color:var(--d);font-weight:700;margin-bottom:8px">'+fmtCOP(tot)+'</div>';
    if(!ls.length) h+='<div style="font-size:11px;color:var(--gc);text-align:center;padding:10px">—</div>';
    ls.forEach(function(l){
      var s=SEG[l.id]||{};
      var v=Number(s.valorCotizado)||Number(l.valor)||0;
      var esOdoo=(s.fuente==='odoo'||l.fuente==='odoo');
      h+='<div class="kcard" onclick="abrirLead(\''+l.id+'\')" style="'+(esCaliente(l)?'border-left:3px solid var(--d);':'')+'">'
        +'<b>'+(l.nombre||l.id)+(esOdoo?' 🟣':'')+(esCaliente(l)?' 🔴':'')+'</b>'
        +'<div class="ks2">'+(l.proyecto||'')+(v?' · '+fmtCOP(v):'')+vigTag(l)+'</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';

  if(huerfanos.length){
    h+='<div class="card" style="margin-top:10px"><div class="chd"><span>Sin mes asignado</span><small>Asigna proxContacto para ubicarlos</small></div>';
    huerfanos.slice(0,20).forEach(function(l){
      h+='<div class="lrow" onclick="abrirLead(\''+l.id+'\')">'
        +'<div style="flex:1"><div class="lnm">'+(l.nombre||l.id)+'</div>'
        +'<div class="ldt">'+(l.proyecto||'Sin proyecto')+'</div></div>'
        +'<span class="bdg bgr">Sin fecha</span></div>';
    });
    if(huerfanos.length>20) h+='<div style="padding:8px 13px;font-size:11px;color:var(--gc)">+'+(huerfanos.length-20)+' mas</div>';
    h+='</div>';
  }
  return h;
}

  return LEADS.map(function(l){return{l:l,s:SEG[l.id]||{}};})

  var tC=cot.length?Math.round(ven.length/cot.length*100):0;
  var descs=ven.map(function(l){var s=SEG[l.id];return(Number(s.valorCotizado)>0&&Number(s.valorCerrado)>0)?(1-s.valorCerrado/s.valorCotizado)*100:null;}).filter(function(x){return x!==null;});
  var dP=descs.length?Math.round(descs.reduce(function(a,b){return a+b;},0)/descs.length):0;
  var pms=ven.map(function(l){var s=SEG[l.id];return(Number(s.m2)>0&&Number(s.valorCerrado)>0)?s.valorCerrado/s.m2:null;}).filter(function(x){return x;});
  var pmP=pms.length?Math.round(pms.reduce(function(a,b){return a+b;},0)/pms.length):0;
  var meses=calcMesesSinMeta();
  var h='';
  if(meses>0) h+='<div class="alerta-3m"><h4>⚠ Alerta rendimiento — '+meses+' mes(es) consecutivo(s) sin meta mínima ($150M)</h4>'
    +'<p>Política: 3 meses consecutivos sin meta = causal de terminación con justa causa (Otrosí No.1, Cláusula Sexta). '
    +(meses>=3?'<b>UMBRAL ALCANZADO. Revisar decisión con Dirección.</b>':'Mes '+(meses+1)+' en curso.')+'</p></div>';
  h+='<div class="card"><div class="chd"><span>Métricas viernes — Playbook MOSS</span></div><div class="cp">'
    +'<div class="kgrid">'
    +K(oro.length,'Leads oro sin contactar',oro.length?'ro':'ok',oro.length?'Meta: 0':'✅')
    +K(tC+'%','Tasa de cierre',tC<30?'am':'ok','Meta: 30%')
    +K(dP+'%','Descuento promedio',dP>0?'am':'ok','Meta: 0%')
    +K(pmP?fmtCOP(pmP):'—','$/m² promedio',pmP&&pmP<CFG.pisoM2?'ro':'ok','Piso: $1.2M')
    +'</div>'
    +'<div class="nota-tip">SLA: contacto &lt;10min · cotización &lt;48h · seguimiento &lt;24h · mín 5 contactos antes de marcar perdido · contrato mín $18M</div>'
    +'</div></div>';
  // Funnel
  h+='<div class="card"><div class="chd"><span>Embudo de conversión</span></div><div class="cp">';
  var steps=[['Leads totales',LEADS.length],['Contactados',LEADS.filter(function(l){return (SEG[l.id]||{}).intentos>0;}).length],['Cotizados',cot.length],['Vendidos',ven.length]];
  steps.forEach(function(f,i){
    var pct=Math.round(f[1]/steps[0][1]*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>'+f[0]+'</span><span><b>'+f[1]+'</b> ('+pct+'%)</span></div>'
      +'<div class="pbar-wrap"><div class="pbar" style="width:'+Math.max(pct,2)+'%"></div></div></div>';
  });
  h+='</div></div>';
  return h;
}

// Helpers para onclick sin conflicto de comillas
function abrirLeadById(el){ abrirLead(el.getAttribute('data-id')); }
function reasignarC1(el){ reasignar(el.closest('[data-id]').getAttribute('data-id'),'com1'); }
function reasignarC2(el){ reasignar(el.closest('[data-id]').getAttribute('data-id'),'com2'); }
function reasignarOtro(el,otro){ reasignar(el.closest('[data-id]').getAttribute('data-id'),otro); }

function rAsig(){
  var todos=LEADS.concat(ODOO_OPS);
  var activos=todos.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='perdido';});
  var com1L=activos.filter(function(l){return (SEG[l.id]||{}).responsableKey==='com1';});
  var com2L=activos.filter(function(l){return (SEG[l.id]||{}).responsableKey==='com2';});
  var sinAsig=activos.filter(function(l){var k=(SEG[l.id]||{}).responsableKey;return !k||k==='';});
  function statsC(lista){
    var vend=lista.filter(function(l){return (SEG[l.id]||{}).stage==='vendido';});
    var cal=lista.filter(function(l){return esCaliente(l)&&(SEG[l.id]||{}).stage!=='vendido';});
    var venc=lista.filter(function(l){var s=SEG[l.id]||{};return s.proxContacto&&s.proxContacto<hoyStr()&&s.stage!=='vendido';});
    var tot=vend.reduce(function(a,l){return a+Number((SEG[l.id]||{}).valorCerrado||0);},0);
    return {tot:lista.length,vend:vend.length,cal:cal.length,venc:venc.length,valor:tot};
  }
  var s1=statsC(com1L),s2=statsC(com2L);
  var actC1=com1L.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='vendido';}).length;
  var actC2=com2L.filter(function(l){var s=SEG[l.id]||{};return s.stage!=='vendido';}).length;
  var h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
  h+='<div class="card"><div class="chd"><span>&#128100; Comercial 1</span><small>'+actC1+' activos</small></div><div class="cp"><div class="kgrid">'+K(actC1,'Leads activos',actC1>actC2+5?'ro':(actC1<actC2-5?'ok':''),'')+K(s1.cal,'Calientes',s1.cal?'ro':'ok','')+K(s1.venc,'Vencidos',s1.venc?'am':'ok','')+K(fmtCOP(s1.valor),'Cerrado','d','')+'</div></div></div>';
  h+='<div class="card"><div class="chd"><span>&#128100; Comercial 2</span><small>'+actC2+' activos</small></div><div class="cp"><div class="kgrid">'+K(actC2,'Leads activos',actC2>actC1+5?'ro':(actC2<actC1-5?'ok':''),'')+K(s2.cal,'Calientes',s2.cal?'ro':'ok','')+K(s2.venc,'Vencidos',s2.venc?'am':'ok','')+K(fmtCOP(s2.valor),'Cerrado','d','')+'</div></div></div>';
  h+='</div>';
  var diff=Math.abs(actC1-actC2);
  if(diff>5){
    var masC=actC1>actC2?'Comercial 1':'Comercial 2';
    h+='<div class="alerta-3m" style="background:var(--ab);border-color:var(--am)"><h4 style="color:var(--am)">Desbalance de '+diff+' leads</h4><p style="color:#7a4e16">'+masC+' tiene mas leads. Reasignar para equilibrar.</p></div>';
  }
  if(sinAsig.length){
    h+='<div class="card" style="margin-bottom:12px"><div class="chd" style="background:var(--ro)"><span>Sin asignar ('+sinAsig.length+')</span><small>Asignar ahora</small></div>';
    sinAsig.forEach(function(l){
      h+='<div class="lrow" data-id="'+l.id+'" onclick="abrirLeadById(this)">'
        +'<div style="flex:1"><div class="lnm">'+(l.nombre||l.id)+'</div>'
        +'<div class="ldt">'+(l.proyecto||'')+(l.valor?' · '+fmtCOP(l.valor):'')+'</div></div>'
        +'<button class="wa-btn" style="background:var(--v)" onclick="event.stopPropagation();reasignarC1(this)">→ C1</button>'
        +'<button class="wa-btn" style="background:var(--d);margin-left:4px" onclick="event.stopPropagation();reasignarC2(this)">→ C2</button>'
        +'</div>';
    });
    h+='</div>';
  }
  function listaAsig(lista,key,titulo){
    var activa=lista.filter(function(l){return (SEG[l.id]||{}).stage!=='vendido'&&(SEG[l.id]||{}).stage!=='perdido';});
    var r='<div class="card"><div class="chd"><span>'+titulo+'</span><small>'+activa.length+' activos</small></div>';
    if(!activa.length){r+='<div class="empty">Sin leads activos</div>';return r+'</div>';}
    var otro=key==='com1'?'com2':'com1';
    activa.slice(0,30).forEach(function(l){
      var s=SEG[l.id]||{};
      var etq=ETAPAS.find(function(e){return e[0]===(s.stage||'prospecto');})||ETAPAS[0];
      r+='<div class="lrow" data-id="'+l.id+'" data-otro="'+otro+'" onclick="abrirLeadById(this)" style="'+(esCaliente(l)?'border-left:4px solid var(--d);':'')+'">'
        +'<div style="flex:1;min-width:0"><div class="lnm">'+(l.nombre||l.id)+vigTag(l)+'</div>'
        +'<div class="ldt">'+(l.proyecto||'')+(l.valor?' · '+fmtCOP(l.valor):'')+' · '+etq[2]+' '+etq[1]+'</div></div>'
        +'<div class="lright"><button class="wa-btn" style="background:var(--gc);font-size:10px" data-lid="'+l.id+'" data-otro="'+otro+'" onclick="event.stopPropagation();reasignar(this.dataset.lid,this.dataset.otro)" title="Reasignar">&#8644;</button></div></div>';
    });
    if(activa.length>30) r+='<div style="padding:8px 13px;font-size:11px;color:var(--gc)">+'+(activa.length-30)+' mas</div>';
    return r+'</div>';
  }
  h+=listaAsig(com1L,'com1','&#128100; Comercial 1 — leads activos');
  h+=listaAsig(com2L,'com2','&#128100; Comercial 2 — leads activos');

  // ── RANKING DE DESEMPEÑO ─────────────────────────────────────────────
  h+=rRanking(com1L,com2L);
  return h;
}

function rRanking(com1L,com2L){
  var hoy=hoyStr(), mesActual=hoy.slice(0,7);
  function metricas(lista,key){
    var todos=lista;
    // Ventas este mes
    var vendMes=todos.filter(function(l){
      var s=SEG[l.id]||{};
      return s.stage==='vendido'&&s.anticipoOK==='SI'&&(s.fechaCierre||'').slice(0,7)===mesActual&&Number(s.valorCerrado)>0;
    });
    var totalMes=vendMes.reduce(function(a,l){return a+Number((SEG[l.id]||{}).valorCerrado||0);},0);
    // Tasa de cierre (vendidos / cotizados)
    var cotizados=todos.filter(function(l){return Number((SEG[l.id]||{}).valorCotizado)>0;}).length;
    var vendidos=todos.filter(function(l){return (SEG[l.id]||{}).stage==='vendido';}).length;
    var tasaCierre=cotizados?Math.round(vendidos/cotizados*100):0;
    // SLA: leads respondidos en <10 min
    var calientes=todos.filter(function(l){return esCaliente(l);});
    var slaOk=calientes.filter(function(l){var s=SEG[l.id]||{};return s.tiempoRespuestaMin!=null&&s.tiempoRespuestaMin<10;}).length;
    var slaPct=calientes.length?Math.round(slaOk/calientes.length*100):100;
    // Leads activos calientes
    var calAct=todos.filter(function(l){var s=SEG[l.id]||{};return esCaliente(l)&&s.stage!=='vendido'&&s.stage!=='perdido';}).length;
    // Vencidos
    var venc=todos.filter(function(l){var s=SEG[l.id]||{};return s.proxContacto&&s.proxContacto<hoy&&s.stage!=='vendido'&&s.stage!=='perdido';}).length;
    return {totalMes:totalMes,tasaCierre:tasaCierre,slaPct:slaPct,calAct:calAct,venc:venc,vendMes:vendMes.length,cotizados:cotizados};
  }
  var m1=metricas(com1L,'com1'), m2=metricas(com2L,'com2');

  function barRace(v1,v2,label,fmt,higherIsBetter){
    var max=Math.max(v1,v2,1);
    var p1=Math.round(v1/max*100), p2=Math.round(v2/max*100);
    var w1=higherIsBetter?(v1>=v2?'var(--ok)':'var(--am)'):(v1<=v2?'var(--ok)':'var(--am)');
    var w2=higherIsBetter?(v2>=v1?'var(--ok)':'var(--am)'):(v2<=v1?'var(--ok)':'var(--am)');
    return '<div style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g);margin-bottom:4px">'
      +'<span style="font-weight:700;color:var(--v)">'+fmt(v1)+'</span><span>'+label+'</span><span style="font-weight:700;color:var(--d)">'+fmt(v2)+'</span></div>'
      +'<div style="display:flex;gap:3px">'
      +'<div style="flex:1;display:flex;justify-content:flex-end"><div style="height:8px;width:'+p1+'%;background:'+w1+';border-radius:4px 0 0 4px;transition:width .5s"></div></div>'
      +'<div style="width:2px;background:var(--b)"></div>'
      +'<div style="flex:1"><div style="height:8px;width:'+p2+'%;background:'+w2+';border-radius:0 4px 4px 0;transition:width .5s"></div></div>'
      +'</div></div>';
  }

  var cop=function(v){return v?'$'+(v/1e6).toFixed(1)+'M':'$0';};
  var pct=function(v){return v+'%';};
  var num=function(v){return String(v);};

  // Ganador del mes
  var ganador=m1.totalMes>m2.totalMes?'&#128100; Comercial 1':m2.totalMes>m1.totalMes?'&#128100; Comercial 2':'Empate';

  var h='<div class="card" style="margin-top:8px"><div class="chd"><span>&#127942; Ranking de desempeño — '+new Date(mesActual+'-01T12:00:00').toLocaleDateString('es-CO',{month:'long',year:'numeric'})+'</span><small>C1 vs C2</small></div><div class="cp">';

  // Winner banner
  if(m1.totalMes!==m2.totalMes){
    h+='<div style="background:var(--ab);border:1px solid var(--am);border-radius:9px;padding:8px 12px;margin-bottom:14px;text-align:center;font-size:12px;font-weight:700;color:var(--am)">&#127942; Líder del mes: '+ganador+'</div>';
  }

  // Race bars
  h+=barRace(m1.totalMes,m2.totalMes,'Ventas cerradas mes',cop,true);
  h+=barRace(m1.tasaCierre,m2.tasaCierre,'Tasa de cierre %',pct,true);
  h+=barRace(m1.slaPct,m2.slaPct,'SLA respuesta <10min',pct,true);
  h+=barRace(m1.calAct,m2.calAct,'Calientes activos',num,false); // menos es mejor (ya los gestionó)
  h+=barRace(m1.venc,m2.venc,'Leads vencidos',num,false); // menos es mejor

  // Tabla resumen
  h+='<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px">'
    +'<tr style="background:var(--v)"><th style="padding:5px 8px;text-align:left;color:#fff;font-size:10px">Métrica</th>'
    +'<th style="padding:5px 8px;text-align:center;color:#fff;font-size:10px">Comercial 1</th>'
    +'<th style="padding:5px 8px;text-align:center;color:#fff;font-size:10px">Comercial 2</th></tr>';
  [
    ['Ventas este mes',cop(m1.totalMes),cop(m2.totalMes),m1.totalMes>=m2.totalMes],
    ['Cierres mes',m1.vendMes,m2.vendMes,m1.vendMes>=m2.vendMes],
    ['Cotizaciones',m1.cotizados,m2.cotizados,m1.cotizados>=m2.cotizados],
    ['Tasa de cierre',pct(m1.tasaCierre),pct(m2.tasaCierre),m1.tasaCierre>=m2.tasaCierre],
    ['SLA <10min',pct(m1.slaPct),pct(m2.slaPct),m1.slaPct>=m2.slaPct],
    ['Calientes activos',m1.calAct,m2.calAct,m1.calAct<=m2.calAct],
    ['Leads vencidos',m1.venc,m2.venc,m1.venc<=m2.venc],
  ].forEach(function(row,i){
    var bg=i%2===0?'var(--ba)':'var(--bc)';
    var c1win=row[3];
    h+='<tr style="background:'+bg+'"><td style="padding:5px 8px;color:var(--g)">'+row[0]+'</td>'
      +'<td style="padding:5px 8px;text-align:center;font-weight:700;color:'+(c1win?'var(--ok)':'var(--ro)')+'">'+row[1]+'</td>'
      +'<td style="padding:5px 8px;text-align:center;font-weight:700;color:'+(!c1win?'var(--ok)':'var(--ro)')+'">'+row[2]+'</td></tr>';
  });
  h+='</table></div></div>';
  return h;
}

function reasignar(id,key){
  var s=SEG[id];
  if(!s) return;
  var anterior=s.responsableKey||'—';
  s.responsableKey=key;
  s.responsable=nomCom(key);
  if(!s.historial) s.historial=[];
  s.historial.push({fecha:hoyStr(),accion:'Reasignado: '+anterior+' a '+key,stage:s.stage});
  _dirty=true;
  document.getElementById('savebar').style.display='flex';
  toast('Reasignado a '+nomCom(key));
  render();
}

function fchipBar(opts, varName){
  var h='<div class="filter-bar">';
  opts.forEach(function(o){
    var val=o[0], lbl=o[1];
    var cur=(varName==='_filtroCom'?_filtroCom:_filtroBot);
    var on=cur===val?' on':'';
    h+='<button class="fchip'+on+'" data-val="'+val+'" data-var="'+varName+'" onclick="setFiltro(this)">'+lbl+'</button>';
  });
  return h+'</div>';
}
function setFiltro(el){
  var v=el.dataset.val, vr=el.dataset.var;
  if(vr==='_filtroCom') _filtroCom=v;
  else _filtroBot=v;
  render();
}
function calcMesesSinMeta(){
  // Revisar últimos 3 meses en el SEG para ver cuántos consecutivos sin $150M
  var hoy=new Date(), meses=0;
  for(var i=1;i<=3;i++){
    var d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    var mes=d.toISOString().slice(0,7);
    var total=LEADS.map(function(l){return SEG[l.id]||{};})
      .filter(function(s){return s.stage==='vendido'&&s.anticipoOK==='SI'&&(s.fechaCierre||'').slice(0,7)===mes;})
      .reduce(function(a,s){return a+Number(s.valorCerrado||0);},0);
    if(total<CFG.umbral) meses++; else break;
  }
  return meses;
}
function sync(){
  if(!_dirty){toast('Sin cambios pendientes');return;}
  setBadge(false,'Guardando…');
  var cbName='mosssave_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){delete window[cbName];try{document.body.removeChild(sc);}catch(e){}toast('⚠ Timeout');},15000);
  window[cbName]=function(d){
    clearTimeout(tm);delete window[cbName];try{document.body.removeChild(sc);}catch(e){}
    if(d&&d.ok){_dirty=false;document.getElementById('savebar').style.display='none';setBadge(true,'Guardado ✓');toast('✅ Guardado · '+d.guardados+' leads');}
    else toast('⚠ Error al guardar');
  };
  sc.onerror=function(){clearTimeout(tm);toast('⚠ Sin conexión');};
  var pl=encodeURIComponent(JSON.stringify(SEG));
  sc.src=CFG.scriptUrl+'?action=crm.guardar&callback='+cbName+'&payload='+pl;
  document.body.appendChild(sc);
}
function setBadge(ok,txt){
  var b=document.getElementById('badge'),t=document.getElementById('badge-txt');
  b.className='dbadge '+(ok?'dok':'dno');
  b.querySelector('.dot').style.background=ok?'var(--ok)':'var(--am)';
  t.textContent=txt;
}


// ═══════════════════════════════════════════════
// SINCRONIZACIÓN ODOO — Opción A: solo etapas
// ═══════════════════════════════════════════════
var _odooSyncState = {}; // id → 'synced'|'syncing'|'error'|'pending'

// Mapeo etapa MOSS → etapa Odoo (nombre)
var ETAPA_ODOO_MAP = {
  'prospecto':  'Nuevo',
  'contactado': 'Calificado',
  'fase0':      'Propuesta',
  'cotizado':   'Propuesta',
  'fase1':      'Alta probabilidad',
  'vendido':    'Ganado',
  'perdido':    'Perdido'
};

// ¿Este lead viene de Odoo y tiene ID numérico?
function getOdooId(l){
  if(l.fuente==='odoo' && String(l.id).startsWith('odoo_')){
    return String(l.id).replace('odoo_','');
  }
  return null;
}

// Sincronizar etapa de UN lead a Odoo
function syncEtapaOdoo(leadId, etapa, valor){
  var l = ODOO_OPS.find(function(x){return x.id===leadId;});
  if(!l) return; // no es lead de Odoo
  var odooId = getOdooId(l);
  if(!odooId) return;

  _odooSyncState[leadId]='syncing';
  render(); // mostrar spinner

  var cbName='mossodoo_write_'+Date.now();
  var sc=document.createElement('script');
  var tm=setTimeout(function(){
    delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    _odooSyncState[leadId]='error';
    toast('⚠ Odoo: timeout al sincronizar '+l.nombre);
    render();
  },12000);

  window[cbName]=function(d){
    clearTimeout(tm); delete window[cbName];
    try{document.body.removeChild(sc);}catch(e){}
    if(d&&d.ok){
      _odooSyncState[leadId]='synced';
      toast('🟣 Odoo actualizado — '+ETAPA_ODOO_MAP[etapa]+' · '+l.nombre);
    } else {
      _odooSyncState[leadId]='error';
      toast('⚠ Odoo error: '+(d&&d.error?d.error:'sin respuesta'));
    }
    render();
  };
  sc.onerror=function(){
    clearTimeout(tm);
    _odooSyncState[leadId]='error';
    toast('⚠ Odoo: sin conexión');
    render();
  };
  sc.src=CFG.scriptUrl
    +'?action=odoo.etapa&callback='+cbName
    +'&odooUrl='+encodeURIComponent(CFG.odooUrl)
    +'&odooKey='+encodeURIComponent(CFG.odooKey)
    +'&odooDb='+encodeURIComponent(CFG.odooDb)
    +'&odooId='+encodeURIComponent(odooId)
    +'&etapa='+encodeURIComponent(etapa)
    +(valor?'&valor='+encodeURIComponent(valor):'');
  document.body.appendChild(sc);
}

// Badge de estado de sync para mostrar en kcard / rowL
function odooBadge(l){
  var odooId=getOdooId(l);
  if(!odooId) return '';
  var st=_odooSyncState[l.id]||'pending';
  if(st==='synced')  return '<span class="odoo-sync odoo-synced">🟣 Odoo ✓</span>';
  if(st==='syncing') return '<span class="odoo-sync odoo-syncing">🟣 Sincronizando…</span>';
  if(st==='error')   return '<span class="odoo-sync odoo-sync-err">🟣 Error sync</span>';
  return '<span class="odoo-sync odoo-sync-na">🟣 Odoo</span>';
}


// ═══════════════════════════════════════════════
// RECORDATORIOS AUTOMÁTICOS D+3 / D+7 / D+14 / D+21
// ═══════════════════════════════════════════════
var _recDismissed={};

function leadsConRecordatorio(){
  var hoy=hoyStr();
  return LEADS.concat(ODOO_OPS).filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    if(_recDismissed[l.id]) return false;
    if(!s.proxContacto) return false;
    // Incluir: vencidos + hoy
    return s.proxContacto<=hoy;
  }).sort(function(a,b){
    // Primero los calientes, luego por fecha más antigua
    var ac=esCaliente(a)?0:1, bc=esCaliente(b)?0:1;
    if(ac!==bc) return ac-bc;
    return (SEG[a.id]||{}).proxContacto<(SEG[b.id]||{}).proxContacto?-1:1;
  });
}

function plantillaAutoParaLead(l){
  var s=SEG[l.id]||{};
  var intentos=s.intentos||0;
  // Elegir plantilla según número de intentos anteriores
  if(intentos===0) return 0;      // Día 1
  if(intentos===1) return 1;      // Día 3
  if(intentos===2) return 2;      // Día 7
  if(intentos===3) return 3;      // Día 14
  return 4;                       // Día 21
}

function checkRecordatorios(){
  var lista=leadsConRecordatorio();
  if(!lista.length) return;
  // Mostrar panel flotante de recordatorios si hay pendientes
  var existing=document.getElementById('rec-panel');
  if(existing) existing.remove();
  var panel=document.createElement('div');
  panel.id='rec-panel';
  panel.style.cssText='position:fixed;bottom:140px;right:16px;z-index:390;width:300px;'
    +'background:var(--bc);border:1px solid var(--b);border-radius:14px;'
    +'box-shadow:0 4px 20px rgba(0,0,0,.18);overflow:hidden;';
  var hd=document.createElement('div');
  hd.style.cssText='background:#A67C52;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;';
  var hdTitle=document.createElement('span');
  hdTitle.style.cssText='color:#fff;font-size:12px;font-weight:700';
  hdTitle.textContent='📅 '+lista.length+' seguimiento'+(lista.length>1?'s':'')+' pendiente'+(lista.length>1?'s':'');
  var hdClose=document.createElement('button');
  hdClose.style.cssText='background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:16px;line-height:1';
  hdClose.textContent='×';
  hdClose.addEventListener('click',function(){var p=document.getElementById('rec-panel');if(p)p.remove();});
  hd.appendChild(hdTitle);
  hd.appendChild(hdClose);
  panel.appendChild(hd);
  var body=document.createElement('div');
  body.style.cssText='max-height:260px;overflow-y:auto;';
  lista.slice(0,5).forEach(function(l){
    var s=SEG[l.id]||{};
    var tplIdx=plantillaAutoParaLead(l);
    var tplNom=TPL[tplIdx][0];
    var tel=String(l.contacto||'').replace(/[^0-9]/g,'');
    var nombre=(l.nombre||'').split(' ')[0];
    var comNom=s.responsableKey?nomCom(s.responsableKey):'';
    var msg=TPL[tplIdx][1].replace('{n}',nombre).replace('{x}',comNom.split(' ')[0]||'MOSS').replace('{ig}',CFG.igUrl);
    var waUrl=tel?'https://wa.me/57'+tel+'?text='+encodeURIComponent(msg):'';
    var dias=s.proxContacto<hoyStr()?Math.floor((new Date()-new Date(s.proxContacto+'T12:00:00'))/(86400000)):0;
    var item=document.createElement('div');
    item.style.cssText='padding:10px 12px;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:5px;';
    var nameRow=document.createElement('div');
    nameRow.style.cssText='display:flex;align-items:center;justify-content:space-between;';
    nameRow.innerHTML='<span style="font-size:12px;font-weight:700;color:var(--v)">'+(l.nombre||l.id)+'</span>'
      +'<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:'+(esCaliente(l)?'var(--rb)':'var(--ba)')+';color:'+(esCaliente(l)?'var(--ro)':'var(--g)')+';">'
      +(esCaliente(l)?'Caliente':'Tibio')+'</span>';
    var subRow=document.createElement('div');
    subRow.style.cssText='font-size:10px;color:var(--g);';
    subRow.textContent=tplNom+(dias>0?' · vencido hace '+dias+'d':'· hoy');
    var actRow=document.createElement('div');
    actRow.style.cssText='display:flex;gap:6px;';
    if(waUrl){
      var waBtn=document.createElement('a');
      waBtn.href=waUrl; waBtn.target='_blank';
      waBtn.style.cssText='flex:1;background:#25D366;color:#fff;border:none;border-radius:7px;padding:5px 8px;font-size:11px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;';
      waBtn.textContent='📲 '+tplNom;
      waBtn.addEventListener('click',function(){
        registrarContactoRecordatorio(l.id,tplIdx);
        _recDismissed[l.id]=true;
        setTimeout(function(){checkRecordatorios();},300);
      });
      actRow.appendChild(waBtn);
    }
    var skipBtn=document.createElement('button');
    skipBtn.style.cssText='background:var(--ba);border:1px solid var(--b);border-radius:7px;padding:5px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--g);';
    skipBtn.textContent='Posponer';
    skipBtn.addEventListener('click',function(){
      _recDismissed[l.id]=true;
      item.remove();
      if(!body.querySelector('div')) document.getElementById('rec-panel').remove();
    });
    actRow.appendChild(skipBtn);
    item.appendChild(nameRow);
    item.appendChild(subRow);
    item.appendChild(actRow);
    body.appendChild(item);
  });
  if(lista.length>5){
    var more=document.createElement('div');
    more.style.cssText='padding:8px 12px;font-size:11px;color:var(--g);text-align:center;';
    more.textContent='+'+(lista.length-5)+' más — ver en Seguimiento';
    body.appendChild(more);
  }
  panel.appendChild(body);
  document.body.appendChild(panel);
}

function registrarContactoRecordatorio(id,tplIdx){
  var s=SEG[id]; if(!s) return;
  registrarPrimerContacto(id);
  s.intentos=(s.intentos||0)+1;
  // Calcular próximo contacto automáticamente según protocolo
  var siguientes=[3,4,7,7,0]; // días hasta próximo contacto
  var dias=siguientes[Math.min(tplIdx,siguientes.length-1)];
  if(dias>0){
    var d=new Date(); d.setDate(d.getDate()+dias);
    s.proxContacto=d.toISOString().slice(0,10);
    toast('✅ Enviado · Próximo seguimiento: '+s.proxContacto);
  } else {
    s.proxContacto='';
    toast('✅ Ciclo completado · Marcar como Dormido si no responde');
  }
  if(!s.historial) s.historial=[];
  s.historial.push({fecha:hoyStr(),accion:TPL[tplIdx][0]+' (recordatorio auto)'});
  _dirty=true;
  document.getElementById('savebar').style.display='flex';
  render();
}

// Revisar recordatorios cada 10 minutos
setInterval(checkRecordatorios, 600000);

// ═══════════════════════════════════════════════
// ALERTAS AUTOMÁTICAS — leads calientes >30 min sin respuesta
// ═══════════════════════════════════════════════
var _alertaVista=false;
var _alertaDismissed={};  // ids ya descartados en esta sesión

function leadsUrgentes(){
  // Leads calientes sin primer contacto con >30 min desde ingreso
  return LEADS.concat(ODOO_OPS).filter(function(l){
    var s=SEG[l.id]||{};
    if(s.stage==='vendido'||s.stage==='perdido') return false;
    if(!esCaliente(l)) return false;
    if(s.intentos&&s.intentos>0) return false;       // ya contactado
    if(_alertaDismissed[l.id]) return false;          // ya descartado
    // Solo los que llevan >30 min sin respuesta
    var h=horasDesdeIngreso(l);
    if(h===null) return false;
    return h >= 0.5; // 0.5h = 30 minutos
  });
}

function checkAlertas(){
  var urgentes=leadsUrgentes();
  var bell=document.getElementById('alert-bell');
  var badge=document.getElementById('bell-badge');
  if(!bell) return;
  if(urgentes.length>0){
    bell.classList.add('show');
    badge.textContent=urgentes.length;
    // Auto-abrir si hay nuevos urgentes y no se ha visto ya
    if(!_alertaVista && urgentes.length>0){
      _alertaVista=true;
      abrirAlerta();
    }
  } else {
    bell.classList.remove('show');
    _alertaVista=false;
  }
}

function construirMsgCliente(l,s){
  var nombre=(l.nombre||'').split(' ')[0]||'';
  var nombreCom=s.responsableKey?nomCom(s.responsableKey):'MOSS';
  return 'Hola '+nombre+' 👋, soy '+nombreCom.split(' ')[0]+' de MOSS Arquitectura y Mobiliario.'
    +' Vi que te interesaste en una remodelación 🏠'
    +' Tengo 3 preguntas rápidas para prepararte una propuesta personalizada.'
    +' ¿Tienes un momento? 💪';
}

function abrirAlerta(){
  var urgentes=leadsUrgentes();
  if(!urgentes.length){ toast('Sin leads urgentes en este momento ✅'); return; }
  var list=document.getElementById('alert-list');
  var cnt=document.getElementById('alert-count');
  cnt.textContent=urgentes.length;
  list.innerHTML='';
  urgentes.forEach(function(l){
    var s=SEG[l.id]||{};
    var h=horasDesdeIngreso(l);
    var tiempoStr=h<1?Math.round(h*60)+'min':Math.round(h)+'h';
    var tel=String(l.contacto||'').replace(/[^0-9]/g,'');
    var msg=construirMsgCliente(l,s);
    var waUrl=tel?'https://wa.me/57'+tel+'?text='+encodeURIComponent(msg):'';
    var item=document.createElement('div');
    item.className='alert-item';
    item.dataset.lid=l.id;
    var infoDiv=document.createElement('div');
    infoDiv.className='alert-item-info';
    infoDiv.innerHTML='<div class="alert-item-name">'+(l.nombre||l.id)+'</div>'
      +'<div class="alert-item-time">⏱ Hace '+tiempoStr+' sin respuesta</div>'
      +'<div class="alert-item-det">'+(l.proyecto||'Sin proyecto')+(l.valor?' · $'+(Number(l.valor)/1e6).toFixed(0)+'M':'')
        +' · 👤 '+(s.responsableKey?nomCom(s.responsableKey):'Sin asignar')+'</div>';
    item.appendChild(infoDiv);
    if(waUrl){
      var aBtn=document.createElement('a');
      aBtn.className='wa-action-btn'; aBtn.href=waUrl; aBtn.target='_blank';
      aBtn.innerHTML='📲 Contactar';
      aBtn.addEventListener('click',function(){registrarContactoAlerta(l.id);});
      item.appendChild(aBtn);
    }
    var dBtn=document.createElement('button');
    dBtn.className='dismiss-btn'; dBtn.style.cssText='margin-left:6px;font-size:10px;padding:5px 8px';
    dBtn.textContent='✕';
    dBtn.addEventListener('click',function(){descartarAlerta(l.id);});
    item.appendChild(dBtn);
    list.appendChild(item);
  });
  document.getElementById('alert-modal').classList.add('open');
}

function cerrarAlerta(){
  document.getElementById('alert-modal').classList.remove('open');
}

function descartarAlerta(id){
  _alertaDismissed[id]=true;
  // Re-render lista
  var urgentes=leadsUrgentes();
  if(!urgentes.length){ cerrarAlerta(); checkAlertas(); return; }
  abrirAlerta();
}

function registrarContactoAlerta(id){
  // Al hacer clic en Contactar: registrar el intento igual que al enviar plantilla
  registrarPrimerContacto(id);
  var s=SEG[id];
  if(s){ 
    s.intentos=(s.intentos||0)+1;
    if(!s.historial)s.historial=[];
    s.historial.push({fecha:hoyStr(),accion:'Contacto desde alerta automática (WA)'});
    _dirty=true;
    document.getElementById('savebar').style.display='flex';
  }
  descartarAlerta(id);
  toast('✅ Contacto registrado — '+nomCom((SEG[id]||{}).responsableKey||''));
}

// Revisar alertas cada 2 minutos
setInterval(checkAlertas, 120000);

function hoyStr(){return new Date().toISOString().slice(0,10);}
function fmtCOP(n){return '$'+(Number(n)||0).toLocaleString('es-CO');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
</script>
