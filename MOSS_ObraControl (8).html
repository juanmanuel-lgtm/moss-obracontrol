body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2EBE0;color:#1C1C1A;min-height:100vh;}
:root{--v:#2D4A35;--vc:#E8F0EB;--bv:#C2D1C5;--d:#A67C52;--cr:#F2EBE0;--bc:#FAF7F3;--ba:#EEEAE3;--g:#6B6560;--gc:#B5AFA8;--b:#DDD5C8;--ok:#3A6B45;--ob:#E8F0EB;--am:#C17B2A;--ab:#FDF0E0;--ro:#B5362A;--rb:#FAEBE9;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bc);border-bottom:1px solid var(--b);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(44,64,50,.08);}
.ttitle{font-weight:700;font-size:13px;color:var(--v);}
.tsub{font-size:9px;color:var(--gc);text-transform:uppercase;letter-spacing:1px;}
.dbadge{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:7px;font-size:10px;cursor:pointer;border:1px solid;}
.dok{background:var(--vc);border-color:var(--bv);color:var(--ok);}
.dno{background:var(--ab);border-color:#C17B2A40;color:var(--am);}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navbar{background:var(--v);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.navbar::-webkit-scrollbar{display:none;}
.nitem{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:60px;}
.nitem.on{border-bottom-color:var(--d);background:rgba(255,255,255,.12);}
.nic{font-size:14px;}.nlb{font-size:8px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;}
.nitem.on .nlb{color:#fff;}
.content{flex:1;padding:12px 12px 90px;}
.card{background:var(--bc);border:1px solid var(--b);border-radius:12px;margin-bottom:11px;}
.chd{padding:10px 14px;background:var(--v);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.chd span{font-size:11px;color:#fff;font-weight:600;}.chd small{font-size:9px;color:rgba(255,255,255,.6);}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px;}
.kpi{background:var(--bc);border:1px solid var(--b);border-radius:10px;padding:9px 11px;}
.kl{font-size:8px;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.kv{font-size:18px;font-weight:700;line-height:1;}.ks{font-size:9px;color:var(--gc);margin-top:3px;}
.bdg{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:7px;font-size:9px;font-weight:600;}
.bok{background:#E8F0EB;color:#3A6B45;}.bri{background:#FDF0E0;color:#C17B2A;}.bla{background:#FAEBE9;color:#B5362A;}
.bpe{background:#F0EDE8;color:#7A736C;}.bpr{background:#FDF0E0;color:#C17B2A;}.bdo{background:#E8EEF5;color:#2D5A8A;}
.bst{background:#F0EDE8;color:#7A736C;}.bme{background:#FDF0E0;color:#C17B2A;}.bpl{background:#E8F0EB;color:#2D4A35;}
.prog{height:5px;background:var(--b);border-radius:3px;overflow:hidden;}
.prog div{height:100%;border-radius:3px;}
.prog-obra div{background:linear-gradient(90deg,#2D4A35,#A67C52);}
.prog-pres div{background:#3A6B45;}
.prog-pres.warn div{background:#C17B2A;}
.prog-pres.over div{background:#B5362A;}
.al{display:flex;gap:8px;padding:8px 11px;border-radius:9px;margin-bottom:5px;border:1px solid;}
.ale{background:#FAEBE9;border-color:#B5362A30;}.alw{background:#FDF0E0;border-color:#C17B2A30;}.als2{background:#E8F0EB;border-color:#3A6B4530;}
.alt{font-size:11px;font-weight:600;}.als{font-size:10px;color:var(--g);margin-top:2px;}
input,select,textarea{background:var(--cr);border:1px solid var(--b);border-radius:8px;color:#1C1C1A;padding:8px 10px;font-size:13px;width:100%;font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--v);}
label{font-size:10px;color:var(--g);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}.fr{margin-bottom:8px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.bp{background:var(--v);border:none;border-radius:8px;color:#fff;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.bd{background:var(--d);border:none;border-radius:8px;color:#fff;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.bg{background:transparent;border:1px solid var(--b);border-radius:8px;color:var(--g);padding:8px 13px;font-size:12px;cursor:pointer;font-family:inherit;}
.brow{display:flex;gap:8px;margin-top:10px;}
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 12px;font-size:11px;cursor:pointer;color:var(--g);border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab.on{color:var(--v);border-bottom-color:var(--v);font-weight:600;}
.di{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.ic{background:var(--cr);border-radius:9px;padding:9px 12px;}
.il{font-size:9px;color:var(--gc);text-transform:uppercase;margin-bottom:3px;}.iv{font-size:12px;font-weight:500;}
.rub{background:var(--cr);border-radius:8px;padding:8px 10px;border:1px solid var(--b);}
.rl{font-size:9px;color:var(--g);text-transform:uppercase;margin-bottom:3px;}.rv{font-size:12px;font-weight:700;}
.star{font-size:20px;cursor:pointer;color:var(--b);transition:color .1s;}.star.on{color:var(--d);}
.cod{font-family:monospace;font-size:11px;color:var(--d);font-weight:600;}
.sh{font-size:13px;font-weight:600;color:var(--v);margin-bottom:10px;}

.ue{font-size:11px;color:var(--g);}.ur{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:600;margin-left:6px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{background:var(--cr);border:1px solid var(--b);border-radius:7px;color:var(--g);padding:4px 9px;font-size:10px;cursor:pointer;font-family:inherit;}

.ialbl{font-size:9px;color:var(--d);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:8px;}
.iatxt{font-size:13px;line-height:1.8;white-space:pre-wrap;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--v);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;box-shadow:0 -2px 12px rgba(44,64,50,.2);}

.save-btn{background:#fff;border:none;border-radius:8px;color:var(--v);padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

.nbox.on{background:var(--v);color:#fff;border-color:var(--v);}

// Helpers

function normPlan(p){var s=String(p||"").toLowerCase().trim();if(s.indexOf("plus")>-1)return"Plus";if(s.indexOf("stand")>-1)return"Standard";return"Medium";}
function sem(o){
  if(o.av>=100)return"done";

  if(!o.fE)return o.etapa==="preobra"?"preobra":"pend";
  var dl=dL(o.fE),esp=Math.round((1-dl/o.dias)*100);
  if(o.av<esp-15)return"late";
