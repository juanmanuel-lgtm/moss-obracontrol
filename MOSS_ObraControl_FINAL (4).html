function rb(p){if(!p)return{carp:0,mat:0,imp:0,util:0,ob:0,acab:0};return{carp:p*.25,mat:p*.4,imp:p*.05,util:p*.3,ob:p*.28,acab:p*.11};}

function calProm(cf){var v=Object.values(cf||{}).filter(function(x){return x>0;});return v.length?Math.round(v.reduce(function(a,b){return a+b;},0)/v.length*10)/10:0;}

// Drive sync
function driveGet(cb){
  fetch(SCRIPT_URL+"?t="+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      var obras=d.filter(function(o){return o.id&&+o.id>0&&o.nom&&String(o.nom).trim()!=="";}).map(normObra);
      if(obras.length>0){
        try{localStorage.setItem("moss_obras",JSON.stringify(obras));}catch(e){}
        cb(obras);
      }
    }).catch(function(){
      try{var c=localStorage.getItem("moss_obras");if(c){var obras=JSON.parse(c).map(normObra);if(obras.length>0){S.obras=obras;render();}}}catch(e){}
    });
}

function syncDrive(){
  driveGet(function(obras){
    S.obras=obras;S.driveOk=true;S.ultimo=new Date();
    // No hacer render si el usuario esta escribiendo en un input
    var activo=document.activeElement;
    var escribiendo=activo&&(activo.tagName==="INPUT"||activo.tagName==="TEXTAREA"||activo.tagName==="SELECT");
    if(!escribiendo)render();
    else{
      // Solo actualizar el indicador de sync sin borrar lo que escribe
      var db=document.querySelector(".dbadge");
      if(db){db.className="dbadge dok";db.innerHTML='<span class="dot" style="background:#3A6B45"></span>Sync OK '+(S.ultimo?S.ultimo.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}):"");}
    }
  });
  // Sincronizar comunicados compartidos del equipo (JSONBin)
  cargarComunicadosRemoto();
}

function cargarCache(){

// Cambios pendientes
function marcar(id){S.pending[id]=true;}

function guardar(){
  var ids=Object.keys(S.pending);
  if(ids.length===0)return;
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  S.saving=true;S.saveMsg="Guardando...";render();
  var promesas=ids.map(function(id){
    var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){o=S.obras[i];break;}}
    return o?drivePost(o):Promise.resolve(false);
  });
  Promise.all(promesas).then(function(res){
    var ok=res.every(function(r){return r===true;});
    S.pending={};S.saving=false;
    S.saveMsg=ok?"Guardado para todos":"Error - reintenta";
    var sc=document.getElementById("save-count");
    if(sc)sc.textContent=S.saveMsg;
    else render();
    setTimeout(function(){S.saveMsg="";render();},2500);
  }).catch(function(){
    S.saving=false;S.saveMsg="Error de conexion";
    var sc=document.getElementById("save-count");
    if(sc)sc.textContent=S.saveMsg;
    else render();
    setTimeout(function(){S.saveMsg="";render();},2500);
  });
}

function bLogin(){
  var em=document.getElementById("lem");if(em)em.addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("lpin").focus();});
  var pin=document.getElementById("lpin");if(pin)pin.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

function doLogin(){
  var em=document.getElementById("lem").value.trim().toLowerCase();
  var pin=document.getElementById("lpin").value.trim();
  var err=document.getElementById("lerr");
  err.style.display="none";
  if(!em){err.textContent="Ingresa tu correo.";err.style.display="block";return;}
  if(em.indexOf("@mosscolombia.com.co")<0){err.textContent="Solo correos @mosscolombia.com.co";err.style.display="block";return;}
  if(!pin){err.textContent="Ingresa tu PIN.";err.style.display="block";return;}
  var u=null;for(var i=0;i<USERS.length;i++){if(USERS[i].email===em){u=USERS[i];break;}}
  if(!u){err.textContent="Correo no registrado.";err.style.display="block";return;}
  if(u.pin!==pin){err.textContent="PIN incorrecto.";err.style.display="block";document.getElementById("lpin").value="";return;}
  S.user=u;S.obras=[];S.driveOk=false;cargarCache();render();syncDrive();setInterval(syncDrive,POLL);
}

// Guarda el arreglo completo de comunicados en JSONBin
function guardarComunicadosRemoto(coms){
  fetch(JSONBIN_URL,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":JSONBIN_KEY
    },
    body:JSON.stringify({comunicados:coms})
  }).catch(function(err){console.log("Error JSONBin PUT:",err);});
}

// Lee los comunicados de JSONBin y los mezcla con los locales
function cargarComunicadosRemoto(){
  fetch(JSONBIN_URL+"/latest",{
    method:"GET",
    headers:{"X-Master-Key":JSONBIN_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data&&data.record&&data.record.comunicados){
      var remotos=data.record.comunicados;
      var ahora=Date.now();
      // Filtrar ultimos 90 dias
      remotos=remotos.filter(function(x){return !x.ts||(ahora-x.ts)<90*24*60*60*1000;});
      // Mezclar con locales sin duplicar (por timestamp)
      var locales=[];
      try{var cl=localStorage.getItem("moss_comunicados");if(cl)locales=JSON.parse(cl);}catch(e){}
      var vistos={};
      var todos=[];
      remotos.forEach(function(x){if(x.ts&&!vistos[x.ts]){vistos[x.ts]=1;todos.push(x);}});
      locales.forEach(function(x){if(x.ts&&!vistos[x.ts]){vistos[x.ts]=1;todos.push(x);}});
      // Ordenar por timestamp descendente
      todos.sort(function(a,b){return (b.ts||0)-(a.ts||0);});
      if(todos.length>50)todos=todos.slice(0,50);
      try{localStorage.setItem("moss_comunicados",JSON.stringify(todos));}catch(e){}
      // Si hay diferencia entre locales y remotos, re-renderizar
      if(locales.length!==todos.length&&S.tab==="hoy")render();
    }
  })
  .catch(function(err){console.log("Error JSONBin GET:",err);});
}

// Elimina un comunicado por timestamp (local y remoto)
function borrarComunicado(ts){
  if(!confirm("Eliminar este comunicado?"))return;
  var coms=[];
  try{var cl=localStorage.getItem("moss_comunicados");if(cl)coms=JSON.parse(cl);}catch(e){}
  coms=coms.filter(function(x){return x.ts!==ts;});
  try{localStorage.setItem("moss_comunicados",JSON.stringify(coms));}catch(e){}
  guardarComunicadosRemoto(coms);
  render();
}
function elimComunicado(idx){
  var coms=[];

function crearNuevo(){

// FIX: funciones de update separadas para evitar re-renders en inputs de fecha
function setAv(id,v){
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){S.obras[i].av=+v;marcar(id);break;}}
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
}
function updFecha(id,k,v){
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){S.obras[i][k]=v;marcar(id);break;}}
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  // Actualizar solo el navbar sin re-render completo
  var nb=document.querySelector(".save-bar");
  var nch=Object.keys(S.pending).length;
  if(!nb&&nch>0){var nav_=document.querySelector(".navbar");if(nav_){var bar=document.createElement("div");bar.className="save-bar";bar.innerHTML='<span style="color:rgba(255,255,255,.8);font-size:12px">'+nch+' cambio'+(nch>1?"s":"")+'</span><button class="save-btn" onclick="guardar()">Guardar para todos</button>';document.querySelector(".app").insertBefore(bar,document.querySelector(".content"));}}
}
function updGasto(id,k,v){
  var val=+v||0;
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){S.obras[i][k]=val;if(k==="pres"){var r=rb(val);S.obras[i].gC=S.obras[i].gC||0;}marcar(id);break;}}
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
}
function guardarNotas(id){
  var ta=document.getElementById("notasTA");
  if(!ta)return;
  var v=ta.value;
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){S.obras[i].notas=v;marcar(id);break;}}
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  // Guardar sin perder el foco del textarea
  var ids=Object.keys(S.pending);
  var promesas=ids.map(function(pid){
    var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+pid){o=S.obras[i];break;}}
    return o?drivePost(o):Promise.resolve(false);
  });
  var btn=document.querySelector("button.bp");
  if(btn)btn.textContent="Guardando...";
  Promise.all(promesas).then(function(res){
    S.pending={};
    var ok=res.every(function(r){return r===true;});
    if(btn)btn.textContent=ok?"Guardado correctamente":"Error - reintenta";
    setTimeout(function(){if(btn)btn.textContent="Guardar notas";},2000);

// Google Calendar
function calendarActividad(obraId){
  var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+obraId){o=S.obras[i];break;}}
  if(!o)return;
  var fi=document.getElementById("actFI");
  var ff2=document.getElementById("actFF");
  var fI=fi?fi.value:"",fF=ff2?ff2.value:"";
  if(!fI){alert("Ingresa la fecha de inicio de la actividad primero.");return;}
  var fiStr=fI.replace(/-/g,"");
  var d=new Date(fF||fI);d.setDate(d.getDate()+1);
  var ffStr=d.toISOString().slice(0,10).replace(/-/g,"");
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  if(o.res&&o.res.indexOf("@")>-1&&guests.indexOf(o.res)<0)guests+=","+o.res;
  var titulo="[MOSS] "+o.cod+" "+o.nom+" - "+o.act;
  var detalle="Obra: "+o.nom+" | Cliente: "+o.cli+" | Actividad: "+o.act+" | Residente: "+o.res;
  var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(titulo)+"&dates="+fiStr+"/"+ffStr+"&details="+encodeURIComponent(detalle)+"&add="+encodeURIComponent(guests);
  window.open(url,"_blank","noopener,noreferrer");
}
function abrirCalendarioProyecto(o){
  if(!o.fIDiseno&&!o.fI)return;
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  var evs=[];
  if(o.fIDiseno)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio Diseno",fi:o.fIDiseno,ff:o.fEDiseno||o.fI});
  if(o.fI)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio de Obra",fi:o.fI,ff:o.fI});
  if(o.fE)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Entrega",fi:o.fE,ff:o.fE});
  evs.forEach(function(ev){
    if(!ev.fi)return;
    var fi=ev.fi.replace(/-/g,"");
    var d=new Date(ev.ff||ev.fi);d.setDate(d.getDate()+1);
    var ff3=d.toISOString().slice(0,10).replace(/-/g,"");
    var det="Proyecto: "+o.nom+" | Cliente: "+o.cli+" | Codigo: "+o.cod;
    var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.t)+"&dates="+fi+"/"+ff3+"&details="+encodeURIComponent(det)+"&add="+encodeURIComponent(guests);
    window.open(url,"_blank","noopener,noreferrer");
  });
}
