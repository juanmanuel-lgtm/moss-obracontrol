// Utils
function nF(f){if(!f)return"";var s=String(f).trim();return s.indexOf("T")>-1?s.slice(0,10):s;}
function nPunch(p){if(!p)return[];if(Array.isArray(p))return p;var s=String(p).trim().replace("(","[").replace(")","]");if(s==="[]"||s==="")return[];try{var x=JSON.parse(s);return Array.isArray(x)?x:[];}catch(e){return[];}}
function nCalF(c){if(!c)return{};if(typeof c==="object"&&!Array.isArray(c))return c;try{return JSON.parse(c);}catch(e){return{};}}
function normPlan(p){var s=String(p||"").toLowerCase().trim();if(s.indexOf("plus")>-1)return"Plus";if(s.indexOf("stand")>-1)return"Standard";return"Medium";}
function sem(o){if(o.av>=100)return"done";if(!o.fE)return o.etapa==="preobra"?"preobra":"pend";var dl=dL(o.fE),esp=Math.round((1-dl/o.dias)*100);if(o.av<esp-15)return"late";if(o.av<esp-5)return"risk";return"ok";}
function cop(n){if(!n&&n!==0)return"-";return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);}
function copM(n){if(!n&&n!==0)return"-";if(n>=1000000)return"$"+(n/1000000).toFixed(1)+"M";return cop(n);}
function rb(p){if(!p)return{carp:0,mat:0,imp:0,util:0,ob:0,acab:0};return{carp:p*.25,mat:p*.4,imp:p*.05,util:p*.3,ob:p*.28,acab:p*.11};}
function gT(o){return(+o.gC||0)+(+o.gM||0)+(+o.gO||0)+(+o.gA||0);}
function calProm(cf){var v=Object.values(cf||{}).filter(function(x){return x>0;});return v.length?Math.round(v.reduce(function(a,b){return a+b;},0)/v.length*10)/10:0;}
function h(tag,attrs,inner){var a="";for(var k in attrs)a+=" "+k+'="'+attrs[k]+'"';return"<"+tag+a+">"+inner+"</"+tag+">";}

function garAbiertas(nombreObra){

  var nObra=clean(nombreObra);

// Estados de prioridad y su orden visual
// 1. Proxima a entregar (capitulos 8-10: electrodomesticos, aseo, pre-entrega)
// 2. En obra (capitulos 2-7: ya iniciada fisicamente)
// 3. Pre-obra (capitulo 1: diseno, planos, renders)
// 4. Sin recibir apto (apartamento aun no entregado por constructor)
// 5. Entregado (cliente recibio y firmo)
var ESTADOS_OBRA=[
  {key:"proxima",lbl:"Proxima a entregar",ic:"&#x1F535;",col:"#C17B2A",bg:"#FDF0E0",ord:1},
  {key:"enobra",lbl:"En obra",ic:"&#x1F3D7;",col:"#3A6B45",bg:"#E8F0EB",ord:2},
  {key:"preobra",lbl:"Pre-obra",ic:"&#x1F4D0;",col:"#1B2A4A",bg:"#E0E5EE",ord:3},
  {key:"sinrecibir",lbl:"Sin recibir apto",ic:"&#x1F3E2;",col:"#666",bg:"#EEE",ord:4},
  {key:"entregado",lbl:"Entregado",ic:"&#x2705;",col:"#3A6B45",bg:"#E8F0EB",ord:5}
];

// Obtener estado de una obra (manual desde JSONBin > automatico inferido)
function getEstadoObra(o){
  // Estado manual asignado tiene prioridad
  if(CRON.estados&&CRON.estados[o.id]){
    var est=CRON.estados[o.id];
    for(var i=0;i<ESTADOS_OBRA.length;i++)if(ESTADOS_OBRA[i].key===est)return ESTADOS_OBRA[i];
  }
  // Inferir automaticamente
  var et=String(o.etapa||"").toLowerCase().trim();
  var av=+o.av||0;
  var act=String(o.act||"").toLowerCase().trim();
  // Entregado
  if(et==="entregado"||av>=100||act==="entregado")return ESTADOS_OBRA[4];
  // Sin recibir apto
  if(av<=0&&(act===""||act==="sin iniciar"||act==="apto sin recibir"||act==="sin recibir"))return ESTADOS_OBRA[3];
  // Pre-obra
  if(act==="diseno"||act.indexOf("diseno")>=0||act.indexOf("diseño")>=0||act.indexOf("planos")>=0||act.indexOf("render")>=0||et==="diseno"||et==="pre-obra"||et==="preobra")return ESTADOS_OBRA[2];
  // Proxima a entregar (>= 75% o capitulos finales en actividad)
  if(av>=75||act.indexOf("aseo")>=0||act.indexOf("pre-entrega")>=0||act.indexOf("electrodom")>=0||act.indexOf("entrega")>=0)return ESTADOS_OBRA[0];
  // Por defecto: en obra
  return ESTADOS_OBRA[1];
}

// Ordena obras por estado de prioridad
function ordenarObrasPrioridad(obras){
  return obras.slice().sort(function(a,b){
    var ea=getEstadoObra(a),eb=getEstadoObra(b);
    if(ea.ord!==eb.ord)return ea.ord-eb.ord;
    // Dentro del mismo grupo, mas avance primero (excepto entregado por fecha desc)
    if(ea.key==="entregado")return String(b.fE||"").localeCompare(String(a.fE||""));
    if(ea.key==="sinrecibir")return String(a.fl||"9999").localeCompare(String(b.fl||"9999"));
    return (+b.av||0)-(+a.av||0);
  });
}

function guardarEditObra(id){
  var cod=document.getElementById("eo-cod").value.trim();
  var nom=document.getElementById("eo-nom").value.trim();
  var cli=document.getElementById("eo-cli").value.trim();
  if(!cod||!nom||!cli){alert("Codigo, nombre y cliente son obligatorios.");return;}
  for(var i=0;i<S.obras.length;i++){
    if(S.obras[i].id===+id){
      S.obras[i].cod=cod;
      S.obras[i].nom=nom;
      S.obras[i].cli=cli;
      S.obras[i].plan=document.getElementById("eo-plan").value||"Medium";
      S.obras[i].res=document.getElementById("eo-res").value||"";
      S.obras[i].maestro=document.getElementById("eo-mae").value||"";
      var p=+document.getElementById("eo-pres").value||0;
      if(p>0)S.obras[i].pres=p;
      // Cambio de etapa (solo si tiene permisos y el campo existe)
      var elEt=document.getElementById("eo-etapa");
      if(elEt&&puedeCerrarObra()){
        var nuevaEt=elEt.value;
        // Validar: no permitir entregado si hay garantias abiertas
        if(nuevaEt==="entregado"){
          var ga=garAbiertas(S.obras[i].nom);
          if(ga>0){
            alert("No se puede marcar como Entregado.\n\nEsta obra tiene "+ga+" garantia(s) en proceso. Cierra primero las garantias en la pestana de Garantias.");
            return;
          }
          // Cierre automatico: 100% + actividad Entregado
          S.obras[i].av=100;
          S.obras[i].act="Entregado";
        }
        S.obras[i].etapa=nuevaEt;
      }
      marcar(id);
      break;
    }
  }
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  document.getElementById("edit-obra-form").style.display="none";
  guardar();
  render();
}

function addComunicado(){
  var t=document.getElementById("com-titulo");
  var tx=document.getElementById("com-texto");
  if(!t||!tx||!t.value.trim()||!tx.value.trim()){alert("Escribe el titulo y el contenido del mensaje.");return;}
  var nuevo={
    titulo:t.value.trim(),
    texto:tx.value.trim(),
    fecha:new Date().toLocaleDateString("es-CO",{day:"numeric",month:"short",year:"numeric"}),
    autor:S.user.nombre,
    ts:Date.now()
  };
  // Guardar localmente de inmediato para respuesta rapida
  var coms=[];
  try{var cl=localStorage.getItem("moss_comunicados");if(cl)coms=JSON.parse(cl);}catch(e){}
  coms.unshift(nuevo);

  try{localStorage.setItem("moss_comunicados",JSON.stringify(coms));}catch(e){}
  // Guardar en JSONBin para compartir con el equipo
  guardarComunicadosRemoto(coms);
  nav("hoy");
}

// Guarda el arreglo completo de comunicados en JSONBin
function guardarComunicadosRemoto(coms){
  fetch(JSONBIN_URL,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":JSONBIN_KEY
    },
    body:JSON.stringify({comunicados:coms})
  }).catch(function(err){console.log("Error JSONBin PUT:",err);});
}

// Lee los comunicados de JSONBin y los mezcla con los locales
function cargarComunicadosRemoto(){
  fetch(JSONBIN_URL+"/latest?_t="+Date.now(),{cache:"no-store",
    method:"GET",
    headers:{"X-Master-Key":JSONBIN_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data&&data.record&&data.record.comunicados){
      var remotos=data.record.comunicados;
      var ahora=Date.now();
      // Filtrar ultimos 90 dias
      remotos=remotos.filter(function(x){return !x.ts||(ahora-x.ts)<90*24*60*60*1000;});
      // Mezclar con locales sin duplicar (por timestamp)
      var locales=[];
      try{var cl=localStorage.getItem("moss_comunicados");if(cl)locales=JSON.parse(cl);}catch(e){}
      var vistos={};
      var todos=[];
      remotos.forEach(function(x){if(x.ts&&!vistos[x.ts]){vistos[x.ts]=1;todos.push(x);}});
      locales.forEach(function(x){if(x.ts&&!vistos[x.ts]){vistos[x.ts]=1;todos.push(x);}});
      // Ordenar por timestamp descendente
      todos.sort(function(a,b){return (b.ts||0)-(a.ts||0);});
      if(todos.length>50)todos=todos.slice(0,50);
      try{localStorage.setItem("moss_comunicados",JSON.stringify(todos));}catch(e){}
      // Si hay diferencia entre locales y remotos, re-renderizar
      if(locales.length!==todos.length&&S.tab==="hoy")render();
    }
  })
  .catch(function(err){console.log("Error JSONBin GET:",err);});
}

// Elimina un comunicado por timestamp (local y remoto)
function borrarComunicado(ts){
  if(!confirm("Eliminar este comunicado?"))return;
  var coms=[];
  try{var cl=localStorage.getItem("moss_comunicados");if(cl)coms=JSON.parse(cl);}catch(e){}
  coms=coms.filter(function(x){return x.ts!==ts;});
  try{localStorage.setItem("moss_comunicados",JSON.stringify(coms));}catch(e){}
  guardarComunicadosRemoto(coms);
  render();
}

// Carga datos de cronograma y videos desde JSONBin
function cargarCronogramaRemoto(cb){
  // Primero leer el backup local como fallback
  var backup=null;
  try{var b=localStorage.getItem("moss_cron_backup");if(b)backup=JSON.parse(b);}catch(e){}
  fetch(JSONBIN_CRON_URL+"/latest?_t="+Date.now(),{cache:"no-store",
    method:"GET",
    headers:{"X-Master-Key":JSONBIN_KEY}
  })
  .then(function(r){
    if(!r.ok){
      console.error("[MOSS] Error leyendo JSONBin. Status:",r.status);
      // Si el GET falla y hay backup, usarlo
      if(backup){
        CRON.cronograma=backup.cronograma||{};
        CRON.videos=backup.videos||{};
        CRON.estados=backup.estados||{};
        CRON.drives=backup.drives||{};
        if(backup.garantias&&backup.garantias.length>0){S.gars=backup.garantias;CRON.garantias=backup.garantias;}
      }
      throw new Error("HTTP "+r.status);
    }
    return r.json();
  })
  .then(function(data){
    if(data&&data.record){
      var rem=data.record;
      // Si el remoto tiene datos mas nuevos, usarlos. Si esta vacio y hay backup, usar backup.
      var remGars=rem.garantias||[];
      var hayBackupConGars=backup&&backup.garantias&&backup.garantias.length>0;
      // Si remoto vacio Y local tiene datos => usar local Y subirlo de nuevo (recovery)
      if(remGars.length===0&&hayBackupConGars){
        console.warn("[MOSS] Remoto vacio pero hay backup local con "+backup.garantias.length+" garantias. Restaurando.");
        S.gars=backup.garantias;
        CRON.garantias=backup.garantias;
        CRON.cronograma=backup.cronograma||rem.cronograma||{};
        CRON.videos=backup.videos||rem.videos||{};
        CRON.estados=backup.estados||rem.estados||{};
        CRON.drives=backup.drives||rem.drives||{};
        guardarCronogramaRemoto(); // Re-subir
      }else{
        CRON.cronograma=rem.cronograma||{};
        CRON.videos=rem.videos||{};
        CRON.estados=rem.estados||{};
        CRON.drives=rem.drives||{};
        if(rem.garantias){
          CRON.garantias=rem.garantias;
          S.gars=rem.garantias;
        }
      }
    }
    if(cb)cb();
  })
  .catch(function(err){console.log("Error JSONBin cronograma GET:",err);if(cb)cb();});
}

// Guarda todo el estado de cronograma + videos en JSONBin
// Tambien guarda copia en localStorage como respaldo local
var _cronTimer=null;
function _localBackup(){
  try{
    localStorage.setItem("moss_cron_backup",JSON.stringify({
      cronograma:CRON.cronograma||{},
      videos:CRON.videos||{},
      garantias:S.gars||[],
      estados:CRON.estados||{},
      drives:CRON.drives||{},
      ts:Date.now()
    }));
  }catch(e){}
}
function guardarCronogramaRemoto(){
  // Backup local INMEDIATO (no se pierde si falla la red)
  _localBackup();
  // Debounce: agrupar guardados rapidos en uno solo
  if(_cronTimer)clearTimeout(_cronTimer);
  _cronTimer=setTimeout(function(){
    var payload=JSON.stringify({cronograma:CRON.cronograma||{},videos:CRON.videos||{},garantias:S.gars||[],estados:CRON.estados||{},drives:CRON.drives||{}});
    fetch(JSONBIN_CRON_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},
      body:payload
    }).then(function(r){
      if(!r.ok){
        // Falla del servidor (401, 403, 404, 500). Avisar al usuario.
        r.text().then(function(txt){

          }
        });
      }else{
        console.log("[MOSS] Guardado OK en JSONBin");
      }
    }).catch(function(err){
      console.error("[MOSS] Error de red al guardar:",err);
      if(!window._mossErrShown){
        window._mossErrShown=true;
        setTimeout(function(){window._mossErrShown=false;},10000);
        alert("Aviso: Sin conexion para guardar en la nube.\n\nLos cambios estan guardados LOCALMENTE en este dispositivo.");
      }
    });
  },400);
}

// Helper: estructura inicial de cronograma para una obra
function initCronograma(obraId){
  if(!CRON.cronograma[obraId]){
    CRON.cronograma[obraId]={};
    for(var i=0;i<CAPITULOS.length;i++){
      var cap=CAPITULOS[i];
      var checks={};
      for(var j=0;j<cap.items.length;j++)checks[cap.items[j]]=false;
      CRON.cronograma[obraId][cap.n]={fIni:"",fFin:"",checks:checks};
    }
  }
  return CRON.cronograma[obraId];
}

// Calcula % de avance de un capitulo (= items marcados / total)
function avanceCapitulo(obraId,capN){
  var datos=CRON.cronograma[obraId];
  if(!datos||!datos[capN])return 0;
  var checks=datos[capN].checks||{};
  var total=0,marcados=0;
  for(var k in checks){total++;if(checks[k])marcados++;}
  if(total===0)return 0;
  return Math.round(marcados/total*100);
}

// Estado del capitulo: ok/riesgo/atrasado/nostart
function estadoCapitulo(obraId,capN){
  var datos=CRON.cronograma[obraId];
  if(!datos||!datos[capN])return "nostart";
  var d=datos[capN];
  if(!d.fIni||!d.fFin)return "nostart";
  var av=avanceCapitulo(obraId,capN);
  if(av===100)return "ok";
  var hoy=new Date();
  var ini=new Date(d.fIni);
  var fin=new Date(d.fFin);
  if(hoy<ini)return "nostart";
  if(hoy>fin)return "atrasado";
  // Esperado por dias
  var transcurrido=(hoy-ini)/(fin-ini);
  if(av/100 < transcurrido-0.2)return "riesgo";
  return "ok";
}

// Avance total de obra = promedio simple de los 11 capitulos
function avanceTotalObra(obraId){
  if(!CRON.cronograma[obraId])return 0;
  var sum=0;
  for(var i=0;i<CAPITULOS.length;i++){
    sum+=avanceCapitulo(obraId,CAPITULOS[i].n);
  }
  return Math.round(sum/CAPITULOS.length);
}

// Autocalcular fechas del capitulo 10 (Pre-entrega) basado en o.fE
function autocalcPreentrega(obraId,fE){
  if(!fE)return;
  initCronograma(obraId);
  var fin=new Date(fE);
  var ini=new Date(fE);
  ini.setDate(ini.getDate()-5);
  CRON.cronograma[obraId][10].fIni=ini.toISOString().slice(0,10);
  CRON.cronograma[obraId][10].fFin=fin.toISOString().slice(0,10);
}

// Toggle de un item del checklist
function toggleCheck(obraId,capN,item){
  initCronograma(obraId);
  var v=CRON.cronograma[obraId][capN].checks[item];
  CRON.cronograma[obraId][capN].checks[item]=!v;
  guardarCronogramaRemoto();
  render();
}

// Update de fecha de capitulo
function updFechaCap(obraId,capN,campo,valor){
  initCronograma(obraId);
  CRON.cronograma[obraId][capN][campo]=valor;
  guardarCronogramaRemoto();
}

// Numero de semana ISO de una fecha
function semanaISO(d){
  var fecha=new Date(d.getTime());
  fecha.setHours(0,0,0,0);
  fecha.setDate(fecha.getDate()+3-(fecha.getDay()+6)%7);
  var semana1=new Date(fecha.getFullYear(),0,4);
  return 1+Math.round(((fecha-semana1)/86400000-3+(semana1.getDay()+6)%7)/7);
}
function anioSemana(d){var n=new Date(d.getTime());n.setDate(n.getDate()+3-(n.getDay()+6)%7);return n.getFullYear();}
function keyVideoSemana(obraId,fecha){
  var f=fecha||new Date();
  return obraId+"_"+anioSemana(f)+"-W"+String(semanaISO(f)).padStart(2,"0");
}
function rangoSemana(anio,semana){
  // Lunes y domingo de esa semana ISO
  var simple=new Date(anio,0,1+(semana-1)*7);
  var dow=simple.getDay();
  var lunes=new Date(simple);
  if(dow<=4)lunes.setDate(simple.getDate()-simple.getDay()+1);
  else lunes.setDate(simple.getDate()+8-simple.getDay());
  var domingo=new Date(lunes);domingo.setDate(lunes.getDate()+6);
  return {ini:lunes,fin:domingo};
}
function fmtFecha(d){return d.toLocaleDateString("es-CO",{day:"numeric",month:"short"});}

// Guardar/actualizar reporte semanal
function guardarVideoSemana(obraId,key,campo,valor){
  if(!CRON.videos[obraId])CRON.videos[obraId]={};
  if(!CRON.videos[obraId][key])CRON.videos[obraId][key]={link:"",coment:"",estado:"pendiente",notaRev:"",revisor:"",ts:Date.now()};
  CRON.videos[obraId][key][campo]=valor;
  CRON.videos[obraId][key].ts=Date.now();
  // Si cambia link o coment y estaba rechazado/aprobado, vuelve a pendiente
  if((campo==="link"||campo==="coment")&&CRON.videos[obraId][key].estado!=="pendiente"){
    CRON.videos[obraId][key].estado="pendiente";
    CRON.videos[obraId][key].notaRev="";
  }
  guardarCronogramaRemoto();
}

// Sandra aprueba o rechaza
function revisarVideo(obraId,key,decision,nota){
  if(!CRON.videos[obraId]||!CRON.videos[obraId][key])return;
  CRON.videos[obraId][key].estado=decision;
  CRON.videos[obraId][key].notaRev=nota||"";
  CRON.videos[obraId][key].revisor=S.user.nombre;
  CRON.videos[obraId][key].ts=Date.now();
  guardarCronogramaRemoto();
  render();
}

function guardarNotas(id){
  var ta=document.getElementById("notasTA");
  if(!ta)return;
  var v=ta.value;
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){S.obras[i].notas=v;marcar(id);break;}}
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  // Guardar sin perder el foco del textarea
  var ids=Object.keys(S.pending);
  var promesas=ids.map(function(pid){
    var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+pid){o=S.obras[i];break;}}
    return o?drivePost(o):Promise.resolve(false);
  });
  var btn=document.querySelector("button.bp");
  if(btn)btn.textContent="Guardando...";
  Promise.all(promesas).then(function(res){
    S.pending={};
    var ok=res.every(function(r){return r===true;});
    if(btn)btn.textContent=ok?"Guardado correctamente":"Error - reintenta";
    setTimeout(function(){if(btn)btn.textContent="Guardar notas";},2000);
  }).catch(function(){if(btn)btn.textContent="Error";});
}

// Google Calendar
function calendarActividad(obraId){
  var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+obraId){o=S.obras[i];break;}}
  if(!o)return;
  var fi=document.getElementById("actFI");
  var ff2=document.getElementById("actFF");
  var fI=fi?fi.value:"",fF=ff2?ff2.value:"";
  if(!fI){alert("Ingresa la fecha de inicio de la actividad primero.");return;}
  var fiStr=fI.replace(/-/g,"");
  var d=new Date(fF||fI);d.setDate(d.getDate()+1);
  var ffStr=d.toISOString().slice(0,10).replace(/-/g,"");
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  if(o.res&&o.res.indexOf("@")>-1&&guests.indexOf(o.res)<0)guests+=","+o.res;
  var titulo="[MOSS] "+o.cod+" "+o.nom+" - "+o.act;
  var detalle="Obra: "+o.nom+" | Cliente: "+o.cli+" | Actividad: "+o.act+" | Residente: "+o.res;
  var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(titulo)+"&dates="+fiStr+"/"+ffStr+"&details="+encodeURIComponent(detalle)+"&add="+encodeURIComponent(guests);
  window.open(url,"_blank","noopener,noreferrer");
}
function abrirCalendarioProyecto(o){
  if(!o.fIDiseno&&!o.fI)return;
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  var evs=[];
  if(o.fIDiseno)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio Diseno",fi:o.fIDiseno,ff:o.fEDiseno||o.fI});
  if(o.fI)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio de Obra",fi:o.fI,ff:o.fI});
  if(o.fE)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Entrega",fi:o.fE,ff:o.fE});
  evs.forEach(function(ev){
    if(!ev.fi)return;
    var fi=ev.fi.replace(/-/g,"");
    var d=new Date(ev.ff||ev.fi);d.setDate(d.getDate()+1);
    var ff3=d.toISOString().slice(0,10).replace(/-/g,"");
    var det="Proyecto: "+o.nom+" | Cliente: "+o.cli+" | Codigo: "+o.cod;
    var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.t)+"&dates="+fi+"/"+ff3+"&details="+encodeURIComponent(det)+"&add="+encodeURIComponent(guests);
    window.open(url,"_blank","noopener,noreferrer");
  });
}
