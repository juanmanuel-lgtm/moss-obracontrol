// === AUTO-DISTRIBUCION DE CRONOGRAMA (45 dias habiles L-S medio dia) ===
// Distribucion sugerida por capitulo (basada en plan operativo MOSS):
var CAP_DIAS={
  2:5,   // Redes electricas/hidrosanitarias - Semana 1
  3:7,   // Obra blanca - Semana 1-2
  4:6,   // Pisos y enchapes - Semana 2-3
  5:6,   // Carpinteria - Semana 3-4
  6:7,   // Remates y acabados - Semana 4-5
  7:5,   // Instalaciones - Semana 5
  8:2,   // Electrodomesticos - Semana 6
  9:2,   // Aseo general - Semana 6
  10:5,  // Pre-entrega
  11:1   // Entrega final
};

// Es dia habil para MOSS (L-V completos, S medio dia)
function esDiaHabilMOSS(date){
  var dow=date.getDay(); // 0=Domingo, 6=Sabado
  if(dow===0)return false; // Domingo no
  // Verificar festivo
  var anio=date.getFullYear();
  var mes=String(date.getMonth()+1).padStart(2,"0");
  var dia=String(date.getDate()).padStart(2,"0");
  var key=mes+"-"+dia;
  if(FEST[anio]&&FEST[anio].indexOf(key)>=0)return false;
  return true;
}

// Suma N dias habiles (L-V = 1 dia completo, S = 0.5 dia) desde una fecha
function sumarDiasHabilesMOSS(fechaInicio,diasHabiles){
  var d=new Date(fechaInicio);
  var acumulado=0;
  while(acumulado<diasHabiles){
    d.setDate(d.getDate()+1);
    if(!esDiaHabilMOSS(d))continue;
    // Sabado cuenta medio dia
    if(d.getDay()===6)acumulado+=0.5;
    else acumulado+=1;
  }
  return d;
}

// Distribuye automaticamente las fechas de los 10 capitulos (2-11) en 45 dias habiles
// a partir de la fecha de inicio de obra
function autocalcCronograma(obraId,fechaInicioObra,fechaEntregaCliente){
  if(!fechaInicioObra)return false;
  initCronograma(obraId);
  var inicio=new Date(fechaInicioObra);
  // Si no cae en dia habil, mover al siguiente habil
  while(!esDiaHabilMOSS(inicio))inicio.setDate(inicio.getDate()+1);
  // Capitulos 2 a 9 son secuenciales
  var cursor=new Date(inicio);
  for(var capN=2;capN<=9;capN++){
    var dias=CAP_DIAS[capN]||5;
    var fin=sumarDiasHabilesMOSS(cursor,dias-1); // -1 porque el dia de inicio cuenta
    CRON.cronograma[obraId][capN].fIni=cursor.toISOString().slice(0,10);
    CRON.cronograma[obraId][capN].fFin=fin.toISOString().slice(0,10);
    // Siguiente capitulo arranca el dia habil despues
    cursor=new Date(fin);
    cursor.setDate(cursor.getDate()+1);
    while(!esDiaHabilMOSS(cursor))cursor.setDate(cursor.getDate()+1);
  }
  // Capitulo 10 (Pre-entrega): 5 dias antes de la entrega
  if(fechaEntregaCliente){
    autocalcPreentrega(obraId,fechaEntregaCliente);
  }
  // Capitulo 11 (Entrega final): el dia de la entrega al cliente
  if(fechaEntregaCliente){
    CRON.cronograma[obraId][11].fIni=fechaEntregaCliente;

// Generar link de Google Calendar para un evento
// title: titulo del evento, fIni/fFin: fechas ISO YYYY-MM-DD, details: descripcion
function googleCalendarLink(title,fIni,fFin,details,location){
  // Google Calendar usa formato YYYYMMDD/YYYYMMDD (fFin es exclusivo en all-day)
  var formatDate=function(s){return s.replace(/-/g,"");};
  var fI=formatDate(fIni);
  // Sumar 1 dia al fin porque all-day events en Google son exclusivos
  var dFin=new Date(fFin);
  dFin.setDate(dFin.getDate()+1);
  var fF=dFin.getFullYear()+String(dFin.getMonth()+1).padStart(2,"0")+String(dFin.getDate()).padStart(2,"0");
  var url="https://calendar.google.com/calendar/render?action=TEMPLATE"+
    "&text="+encodeURIComponent(title)+
    "&dates="+fI+"/"+fF+
    "&details="+encodeURIComponent(details||"")+
    (location?"&location="+encodeURIComponent(location):"");
  return url;
}

var ETAPAS_DISENO=[
  {id:"esp",nom:"Especificación con el cliente",dias:3,desc:"Reunión inicial, levantamiento de necesidades, definición de alcance"},
  {id:"prop",nom:"Propuesta y renders",dias:5,desc:"Diseño preliminar, renders 3D, paleta de materiales"},

// Calcula días hábiles entre dos fechas
function diasHabilesEntre(f1,f2){
  if(!f1||!f2)return 0;
  try{
    var d=new Date(f1);d.setHours(12);
    var fin=new Date(f2);fin.setHours(12);
    if(isNaN(d.getTime())||isNaN(fin.getTime()))return 0;
    if(d>=fin)return 0;
    var acum=0,guard=0;
    while(d<fin&&guard<500){
      guard++;
      d.setDate(d.getDate()+1);
      if(!esDiaHabilMOSS(d))continue;
      acum+=d.getDay()===6?0.5:1;
    }
    return Math.round(acum);
  }catch(e){return 0;}
}

function getCapsActivos(obra){
  if(!obra||!obra.caps||!Array.isArray(obra.caps)||obra.caps.length===0)return CAPITULOS;

}

function semaforoCap(obraId,capN){
  var datos=CRON.cronograma[obraId];
  if(!datos||!datos[capN])return "gris";

  if(!d.fIni||!d.fFin)return "gris";
  var hoy=new Date();hoy.setHours(12);
  var fin=new Date(d.fFin);fin.setHours(12);
  var ini=new Date(d.fIni);ini.setHours(12);
  var av=avanceCapitulo(obraId,capN);
  if(av===100)return "verde";

  var diasRestantes=diasHabilesEntre(hoy.toISOString().slice(0,10),d.fFin);
  if(hoy>fin&&av<100)return "rojo";
  if(diasRestantes<=3)return "rojo";
  if(diasRestantes<=7)return "amarillo";
  return "verde";
}
function semaforoObra(obraId){

// Genera cronograma completo automáticamente al crear una obra nueva
// fFirmaDiseno: fecha en que el cliente firma el diseño (HITO principal)
function generarCronogramaCompleto(obraId,fFirmaDiseno){
  if(!fFirmaDiseno)return false;
  initCronograma(obraId);
  // Obtener obra para saber qué caps aplican
  var obraObj=null;
  for(var oi=0;oi<S.obras.length;oi++)if(S.obras[oi].id===obraId){obraObj=S.obras[oi];break;}
  var capsActivos=getCapsActivos(obraObj);
  // Caps de ejecución = activos excepto cap 1 (diseño), 10 (pre-entrega), 11 (entrega)
  var capsEjec=capsActivos.filter(function(c){return c.n>=2&&c.n<=9;});
  var firma=new Date(fFirmaDiseno+"T12:00:00");
  while(!esDiaHabilMOSS(firma))firma.setDate(firma.getDate()+1);

  // === ETAPA DISEÑO (Cap 1) ===
  var diasDiseno=ETAPAS_DISENO.reduce(function(s,e){return s+e.dias;},0);
  var inicioDiseno=new Date(firma);
  var retrocedidos=0;
  while(retrocedidos<diasDiseno){
    inicioDiseno.setDate(inicioDiseno.getDate()-1);
    if(!esDiaHabilMOSS(inicioDiseno))continue;
    retrocedidos+=inicioDiseno.getDay()===6?0.5:1;
  }
  CRON.cronograma[obraId][1].fIni=inicioDiseno.toISOString().slice(0,10);
  CRON.cronograma[obraId][1].fFin=firma.toISOString().slice(0,10);
  if(!CRON.cronograma[obraId][1].etapas)CRON.cronograma[obraId][1].etapas={};
  var cursorD=new Date(inicioDiseno);
  for(var ei=0;ei<ETAPAS_DISENO.length;ei++){
    var et=ETAPAS_DISENO[ei];
    var finEt=sumarDiasHabilesMOSS(cursorD,et.dias-1);
    CRON.cronograma[obraId][1].etapas[et.id]={fIni:cursorD.toISOString().slice(0,10),fFin:finEt.toISOString().slice(0,10),completado:false};
    cursorD=new Date(finEt);cursorD.setDate(cursorD.getDate()+1);
    while(!esDiaHabilMOSS(cursorD))cursorD.setDate(cursorD.getDate()+1);
  }

  // === PLANOS: 2 semanas desde firma ===
  var finPlanos=sumarDiasHabilesMOSS(firma,10);
  CRON.cronograma[obraId][1].fFinPlanos=finPlanos.toISOString().slice(0,10);
  CRON.cronograma[obraId][1].fFirma=fFirmaDiseno;

  // === EJECUCIÓN: distribuir 45 días hábiles entre caps activos ===
  var inicioObra=new Date(firma);
  inicioObra.setDate(inicioObra.getDate()+1);
  while(!esDiaHabilMOSS(inicioObra))inicioObra.setDate(inicioObra.getDate()+1);
  // Calcular total días de caps activos de ejecución
  var totalDiasEjec=capsEjec.reduce(function(s,c){return s+(CAP_DIAS[c.n]||5);},0);
  // Escalar para que sumen exactamente 45 días hábiles
  var factor=totalDiasEjec>0?45/totalDiasEjec:1;
  var cursor=new Date(inicioObra);
  for(var ci=0;ci<capsEjec.length;ci++){
    var cap=capsEjec[ci];
    var diasCap=Math.max(2,Math.round((CAP_DIAS[cap.n]||5)*factor));
    // Último cap activo recibe los días sobrantes para llegar a 45
    if(ci===capsEjec.length-1){
      var usados=diasHabilesEntre(inicioObra.toISOString().slice(0,10),cursor.toISOString().slice(0,10));
      diasCap=Math.max(2,45-usados);
    }
    var finCap=sumarDiasHabilesMOSS(cursor,diasCap-1);
    CRON.cronograma[obraId][cap.n].fIni=cursor.toISOString().slice(0,10);
    CRON.cronograma[obraId][cap.n].fFin=finCap.toISOString().slice(0,10);
    cursor=new Date(finCap);cursor.setDate(cursor.getDate()+1);
    while(!esDiaHabilMOSS(cursor))cursor.setDate(cursor.getDate()+1);
  }

  // Fecha de entrega = inicio obra + 45 días hábiles
  var fechaEntrega=sumarDiasHabilesMOSS(inicioObra,44);
  var fEntregaStr=fechaEntrega.toISOString().slice(0,10);
  autocalcPreentrega(obraId,fEntregaStr);
  if(capsActivos.some(function(c){return c.n===11;})){
    CRON.cronograma[obraId][11].fIni=fEntregaStr;
    CRON.cronograma[obraId][11].fFin=fEntregaStr;
  }
  for(var oi2=0;oi2<S.obras.length;oi2++){
    if(S.obras[oi2].id===obraId){S.obras[oi2].fE=fEntregaStr;S.obras[oi2].fl=inicioObra.toISOString().slice(0,10);break;}
  }
  guardarCronogramaRemoto();
  return{inicioObra:inicioObra.toISOString().slice(0,10),entrega:fEntregaStr,finPlanos:finPlanos.toISOString().slice(0,10)};
}

function semaforoEtapa(e){
  if(!e.fFin)return "gris";
  var hoy=new Date();hoy.setHours(12);
  var fin=new Date(e.fFin);fin.setHours(12);
  if(hoy>fin)return "rojo";
  var dias=diasHabilesEntre(hoy.toISOString().slice(0,10),e.fFin);
  if(dias<=2)return "rojo";
  if(dias<=5)return "amarillo";
  return "verde";
}

      ultimaActualizacion:new Date().toISOString().slice(0,10)
    };

// Calcular presupuesto de una obra segun sus m2
function calcularPresupuestoObra(obraId){
  var o=null;
  for(var i=0;i<S.obras.length;i++)if(S.obras[i].id===obraId){o=S.obras[i];break;}
  if(!o||!o.m2||o.m2<=0)return null;
  initPresupuestoBase();
  var m2=o.m2;
  var resultado={
    obra:o,
    m2:m2,
    capitulos:[],
    totalMat:0,totalMdoCosto:0,totalMdoVenta:0,total:0
  };
  for(var ci=0;ci<CAPITULOS.length;ci++){
    var cap=CAPITULOS[ci];
    var precios=CRON.presupuesto.precios[cap.n];
    if(!precios)continue;
    var mat=precios.mat*m2;
    var mdoCosto=precios.mdo*m2;
    var mdoVenta=mdoCosto*(1+(precios.markup||0)/100);
    var subtotal=mat+mdoVenta;
    resultado.capitulos.push({
      n:cap.n,nom:cap.nom,
      mat_unit:precios.mat,mdo_unit:precios.mdo,markup:precios.markup||0,
      mat:mat,mdo_costo:mdoCosto,mdo_venta:mdoVenta,total:subtotal,
      notas:precios.notas||""
    });
    resultado.totalMat+=mat;
    resultado.totalMdoCosto+=mdoCosto;
    resultado.totalMdoVenta+=mdoVenta;
    resultado.total+=subtotal;
  }
  return resultado;
}

// Comparar presupuesto vs ejecutado (gastado en materiales reales)
function compararPresupuestoEjecutado(obraId){
  var presup=calcularPresupuestoObra(obraId);
  if(!presup)return null;
  // Calcular gastado real en materiales segun pedidos en estado en_obra
  var gastadoMatPorCap={};
  var pedObra=CRON.pedidos[obraId]||{};
  for(var capK in pedObra){
    var lst=pedObra[capK]||[];
    for(var pi=0;pi<lst.length;pi++){
      var p=lst[pi];
      if(p.cantidad<=0)continue;
      // Buscar precio del material en catalogo
      var matCat=null;
      var lstCat=(CRON.materiales[capK]||[]);
      for(var lm=0;lm<lstCat.length;lm++)if(lstCat[lm].id===p.matId){matCat=lstCat[lm];break;}
      if(matCat&&matCat.precio>0){
        if(!gastadoMatPorCap[capK])gastadoMatPorCap[capK]=0;
        gastadoMatPorCap[capK]+=p.cantidad*matCat.precio;
      }
    }
  }
  // Agregar la comparacion a cada capitulo
  for(var ci=0;ci<presup.capitulos.length;ci++){
    var c=presup.capitulos[ci];
    c.mat_gastado=gastadoMatPorCap[c.n]||0;
    c.mat_diff=c.mat-c.mat_gastado; // positivo = ahorro, negativo = sobrecosto
  }
  return presup;
}

function initCatalogoMateriales(){
  if(CRON.materiales)return;
  CRON.materiales={};
  var idCounter=1;
  // Combinar fuentes: priorizar MAT_CATALOGO_SANDRA (datos reales)
  var fuente=typeof MAT_CATALOGO_SANDRA!=="undefined"?MAT_CATALOGO_SANDRA:MAT_CATALOGO_INICIAL;
  for(var capN in fuente){
    CRON.materiales[capN]=[];
    var lista=fuente[capN];
    for(var i=0;i<lista.length;i++){
      var m=lista[i];
      CRON.materiales[capN].push({
        id:idCounter++,
        nom:m.nom,
        uni:m.uni||"unidad",
        cant_m2:0,
        origen:"compra",
        lead:0,
        critico:false,
        notas:"",
        precio:m.precio||0,
        proveedor:m.proveedor||"",
        pedidos_historicos:m.pedidos||0
      });
    }
  }
  // Agregar capitulos del catalogo inicial que no esten en Sandra
  for(var capN2 in MAT_CATALOGO_INICIAL){
    if(!CRON.materiales[capN2]){
      CRON.materiales[capN2]=[];
      var lista2=MAT_CATALOGO_INICIAL[capN2];
      for(var j=0;j<lista2.length;j++){
        var m2=lista2[j];
        CRON.materiales[capN2].push({
          id:idCounter++,nom:m2.nom,uni:m2.uni||"unidad",cant_m2:0,
          origen:"compra",lead:0,critico:false,notas:"",
          precio:0,proveedor:"",pedidos_historicos:0
        });
      }
    }
  }
  guardarCronogramaRemoto();
}

// Helper: verificar si el usuario actual puede ver precios
function puedeVerPrecios(){
  if(!S.user)return false;
  // CEO + Coordinacion (Sandra) + Operaciones (Luis) ven precios
  var rol=S.user.rol;
  return rol==="ceo"||rol==="coordinacion"||rol==="operaciones";
}

// Formatear precio en COP
function fpc(v){
  if(!v||v===0)return "";
  return "$"+Math.round(v).toLocaleString("es-CO");
}

// Agregar material nuevo al catalogo
function addMaterialCatalogo(capN){
  if(!puedeCerrarObra()){alert("Solo CEO/Operaciones/Coordinacion pueden editar el catalogo.");return;}
  initCatalogoMateriales();
  if(!CRON.materiales[capN])CRON.materiales[capN]=[];
  // Generar id unico
  var maxId=0;
  for(var k in CRON.materiales){
    for(var i=0;i<CRON.materiales[k].length;i++){
      if(CRON.materiales[k][i].id>maxId)maxId=CRON.materiales[k][i].id;
    }
  }
  CRON.materiales[capN].push({
    id:maxId+1,
    nom:"Nuevo material",
    uni:"unidad",
    cant_m2:0,
    origen:"compra",
    lead:0,
    critico:false,
    notas:""
  });
  guardarCronogramaRemoto();
  render();
}

// Editar campo de un material
function updMaterialCat(capN,matId,campo,valor){
  if(!puedeCerrarObra())return;
  // Para precio y proveedor: solo permitir si tiene permiso de ver precios
  if((campo==="precio"||campo==="proveedor")&&!puedeVerPrecios())return;
  initCatalogoMateriales();
  var lista=CRON.materiales[capN]||[];
  for(var i=0;i<lista.length;i++){
    if(lista[i].id===matId){
      if(campo==="cant_m2"||campo==="lead"||campo==="precio")valor=parseFloat(valor)||0;
      if(campo==="critico")valor=!!valor;
      lista[i][campo]=valor;
      break;
    }
  }
  guardarCronogramaRemoto();
}

// Eliminar material del catalogo
function elimMaterialCat(capN,matId){
  if(!puedeCerrarObra()){alert("Sin permisos");return;}
  if(!confirm("Eliminar este material del catalogo? Tambien se eliminara de todas las obras."))return;
  initCatalogoMateriales();
  if(CRON.materiales[capN]){
    CRON.materiales[capN]=CRON.materiales[capN].filter(function(m){return m.id!==matId;});
  }
  // Tambien eliminar de pedidos de obras
  for(var obraId in CRON.pedidos){
    if(CRON.pedidos[obraId][capN]){
      CRON.pedidos[obraId][capN]=CRON.pedidos[obraId][capN].filter(function(p){return p.matId!==matId;});
    }
  }
  guardarCronogramaRemoto();
  render();
}

// Calcular cantidad sugerida de un material para una obra
function calcularCantidadMaterial(obraId,capN,matId){
  var o=null;
  for(var i=0;i<S.obras.length;i++)if(S.obras[i].id===obraId){o=S.obras[i];break;}
  if(!o)return 0;
  var m2=parseFloat(o.m2)||0;
  if(m2===0)return 0;
  initCatalogoMateriales();
  var lista=CRON.materiales[capN]||[];
  for(var j=0;j<lista.length;j++){
    if(lista[j].id===matId){
      var cant=parseFloat(lista[j].cant_m2)||0;
      return Math.round(cant*m2*100)/100;
    }
  }
  return 0;
}

// Obtener el estado de un material en una obra (con cantidad personalizada si existe)
function getPedidoMat(obraId,capN,matId){
  if(!CRON.pedidos[obraId])return null;
  if(!CRON.pedidos[obraId][capN])return null;
  var lista=CRON.pedidos[obraId][capN];
  for(var i=0;i<lista.length;i++){
    if(lista[i].matId===matId)return lista[i];
  }
  return null;
}

// Crear o actualizar estado de un pedido (material en obra)
function setPedidoEstado(obraId,capN,matId,estado){
  if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
  if(!CRON.pedidos[obraId][capN])CRON.pedidos[obraId][capN]=[];
  var lista=CRON.pedidos[obraId][capN];
  var found=false;
  var hoy=new Date().toISOString().slice(0,10);
  for(var i=0;i<lista.length;i++){
    if(lista[i].matId===matId){
      lista[i].estado=estado;
      lista[i].fechaUpd=hoy;
      lista[i].actor=S.user.nombre;
      // Registrar fecha según etapa
      if(estado==="en_camino"&&!lista[i].fechaCompra)lista[i].fechaCompra=hoy;
      if(estado==="en_obra"&&!lista[i].fechaEntregaObra)lista[i].fechaEntregaObra=hoy;
      found=true;break;
    }
  }
  if(!found){
    lista.push({
      matId:matId,
      cantidad:calcularCantidadMaterial(obraId,capN,matId),
      estado:estado,
      origenMat:"",
      fechaSolicitud:hoy,
      fechaCompra:estado==="en_camino"?hoy:"",
      fechaEntregaObra:estado==="en_obra"?hoy:"",
      fechaUpd:hoy,
      actor:S.user.nombre,
      notas:""
    });
  }
  guardarCronogramaRemoto();
  render();
}

// Estado de seleccion para generar planilla (los chequea Sandra antes de generar)
var SDP={obraId:null,seleccion:{},viajeSeleccionado:""}; // {capN_matId: true}

// Iniciar flujo de generar planilla para una obra
function abrirGenerarPlanilla(obraId){
  if(!puedeCerrarObra()){alert("Solo CEO/Operaciones/Coordinacion pueden generar planillas de despacho.");return;}
  SDP.obraId=obraId;
  SDP.seleccion={};
  // Pre-seleccionar materiales con cantidad > 0 en estado solicitado o en_bodega
  var ped=CRON.pedidos[obraId]||{};
  for(var capK in ped){
    var lst=ped[capK]||[];
    for(var pi=0;pi<lst.length;pi++){
      var p=lst[pi];
      if(p.cantidad>0&&(p.estado==="solicitado"||p.estado==="en_bodega")){
        SDP.seleccion[capK+"_"+p.matId]=true;
      }
    }
  }
  render();
}

function cerrarPlanilla(){
  SDP.obraId=null;SDP.seleccion={};
  render();
}

// Planilla de remisión imprimible por orden de pedido específica
function imprimirPlanillaOrden(obraId,ordId){
  var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===obraId){o=S.obras[i];break;}}
  var ord=getOrden(obraId,ordId);
  if(!o||!ord){alert("Datos no encontrados");return;}
  if(!ord.items||ord.items.length===0){alert("Esta orden no tiene materiales.");return;}

  var hoyP=new Date();
  var fechaStr=hoyP.toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"});
  var horaStr=hoyP.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  var nroPlanilla="DP-"+o.cod.replace(/\s/g,"")+"-ORD"+ord.nro+"-"+hoyP.getFullYear()+(hoyP.getMonth()+1+"").padStart(2,"0")+(hoyP.getDate()+"").padStart(2,"0");

  // Agrupar ítems por proveedor (conservando orden de aparición)
  var porProv={};
  var provOrden=[];
  for(var j=0;j<ord.items.length;j++){
    var it=ord.items[j];
    var pk=(it.proveedor||"Sin definir").toUpperCase().trim();
    if(!porProv[pk]){porProv[pk]=[];provOrden.push(pk);}
    porProv[pk].push(it);

// Cambiar estado sin disparar render (para batch)
function setPedidoEstadoSinRender(obraId,capN,matId,estado){
  if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
  if(!CRON.pedidos[obraId][capN])CRON.pedidos[obraId][capN]=[];
  var lista=CRON.pedidos[obraId][capN];
  var found=false;
  for(var i=0;i<lista.length;i++){
    if(lista[i].matId===matId){
      lista[i].estado=estado;
      lista[i].fechaUpd=new Date().toISOString().slice(0,10);
      lista[i].actor=S.user.nombre;
      found=true;break;
    }
  }
  if(!found){
    lista.push({
      matId:matId,cantidad:calcularCantidadMaterial(obraId,capN,matId),
      estado:estado,fechaSolicitud:new Date().toISOString().slice(0,10),
      fechaUpd:new Date().toISOString().slice(0,10),actor:S.user.nombre,notas:""
    });
  }
}

// Incluye: datos obra, valor MdO, cronograma 5 semanas, clausulas multas, calidad

function generarContratoMaestro(obraId){
  if(!puedeVerPrecios()){
    alert("Solo CEO, Coordinacion y Operaciones pueden generar contratos.");
    return;
  }
  var o=null;
  for(var i=0;i<S.obras.length;i++)if(S.obras[i].id===obraId){o=S.obras[i];break;}
  if(!o){alert("Obra no encontrada");return;}
  
  // Validar datos minimos
  if(!o.m2||o.m2<=0){alert("La obra no tiene m2 asignados. Configura los m2 antes de generar el contrato.");return;}
  if(!o.maestro||o.maestro.trim()===""){alert("La obra no tiene maestro asignado. Asigna un maestro antes de generar el contrato.");return;}
  
  initPresupuestoBase();
  var presup=calcularPresupuestoObra(obraId);
  if(!presup){alert("No se pudo calcular el presupuesto. Revisa precios base.");return;}
  
  // Mano de obra TOTAL del contrato del maestro (con markup aplicado)
  // Es lo que MOSS le paga al maestro
  var totalMdO=presup.totalMdoVenta;
  var totalMdOCosto=presup.totalMdoCosto;
  
  // Fecha de inicio - usar fl o fecha actual
  var fechaInicioObra=o.fl||new Date().toISOString().slice(0,10);
  var fechaInicio=new Date(fechaInicioObra);
  
  // Calcular cronograma de 5 semanas
  var cronoSemanas=[];
  var capitulosCronograma=[
    {sem:1,caps:[2],desc:"Cap. 2: Redes electricas e hidrosanitarias"},
    {sem:2,caps:[3],desc:"Cap. 3: Obra blanca, drywall y estuco"},
    {sem:3,caps:[4],desc:"Cap. 4: Pisos y enchapes"},
    {sem:4,caps:[5,7],desc:"Cap. 5 y 7: Carpinteria, grifería e instalaciones sanitarias"},
    {sem:5,caps:[6,8,9,10,11],desc:"Cap. 6, 8, 9: Remates, electrodomesticos, aseo, pre-entrega y entrega final"}
  ];
  var fechaSem=new Date(fechaInicio);
  for(var i=0;i<5;i++){
    var ini=new Date(fechaSem);
    fechaSem.setDate(fechaSem.getDate()+7);
    var fin=new Date(fechaSem);
    fin.setDate(fin.getDate()-1);
    cronoSemanas.push({
      n:i+1,
      desc:capitulosCronograma[i].desc,
      inicio:ini.toISOString().slice(0,10),
      fin:fin.toISOString().slice(0,10),
      valor:totalMdO*[0.20,0.22,0.20,0.22,0.16][i] // distribucion porcentual aprox
    });
  }
  var fechaEntrega=new Date(fechaInicio);
  fechaEntrega.setDate(fechaEntrega.getDate()+35); // 5 semanas
  var fechaEntregaStr=fechaEntrega.toISOString().slice(0,10);
  
  // Cronograma quincenal de pagos (cortes cada 15 dias)
  var fechaCorte1=new Date(fechaInicio); fechaCorte1.setDate(fechaCorte1.getDate()+15);
  var fechaCorte2=new Date(fechaInicio); fechaCorte2.setDate(fechaCorte2.getDate()+30);
  var fechaCorte3=new Date(fechaInicio); fechaCorte3.setDate(fechaCorte3.getDate()+35);
  
  // Multa por dia: 1% del valor del contrato MdO
  var multaPorDia=Math.round(totalMdO*0.01);
  var topeMulta=Math.round(totalMdO*0.20); // tope 20% para defensa legal
  
  // Numero de contrato
  var hoyContrato=new Date();
  var nroContrato="MOSS-CTM-"+o.cod.replace(/\s/g,"")+"-"+hoyContrato.getFullYear()+(hoyContrato.getMonth()+1+"").padStart(2,"0")+(hoyContrato.getDate()+"").padStart(2,"0");
  
  var w=window.open("","_blank","width=900,height=1000");
  if(!w){alert("El navegador bloqueo la ventana. Autoriza pop-ups para generar el contrato.");return;}
  
  var fmtCop=function(v){return "$"+Math.round(v).toLocaleString("es-CO");};
  
  // Generar filas del cronograma
  var rowsCrono="";
  for(var ci=0;ci<cronoSemanas.length;ci++){
    var sem=cronoSemanas[ci];
    rowsCrono+="<tr>"+
      "<td style=\"border:1px solid #555;padding:6px;text-align:center;font-weight:bold\">Semana "+sem.n+"</td>"+
      "<td style=\"border:1px solid #555;padding:6px\">"+sem.desc+"</td>"+
      "<td style=\"border:1px solid #555;padding:6px;text-align:center\">"+sem.inicio+"</td>"+
      "<td style=\"border:1px solid #555;padding:6px;text-align:center\">"+sem.fin+"</td>"+
      "<td style=\"border:1px solid #555;padding:6px;text-align:right\">"+fmtCop(sem.valor)+"</td>"+
    "</tr>";
  }
  
  // Generar lista de capitulos con sus actividades
  var actividadesHTML="";
  for(var ci=0;ci<CAPITULOS.length;ci++){
    var cap=CAPITULOS[ci];
    if(cap.n===1||cap.n>=10)continue; // omitir diseno y pre-entrega/entrega (no son del maestro)
    var precios=CRON.presupuesto.precios[cap.n];
    if(!precios||precios.mdo===0)continue;
    var valorCap=precios.mdo*o.m2*(1+(precios.markup||0)/100);
    var itemsList="";
    if(cap.items&&cap.items.length>0){
      itemsList="<ul style=\"margin:4px 0 4px 18px;padding:0;font-size:10pt\">";
      for(var it=0;it<cap.items.length;it++){
        itemsList+="<li>"+cap.items[it]+"</li>";
      }
      itemsList+="</ul>";
    }
    actividadesHTML+="<div style=\"margin-bottom:10px;padding:8px 10px;background:#F5F2EC;border-left:3px solid #1B2A4A\">"+
      "<div style=\"font-weight:bold;color:#1B2A4A;font-size:11pt\">CAPITULO "+cap.n+" - "+cap.nom.toUpperCase()+" <span style=\"font-weight:normal;color:#666;float:right\">"+fmtCop(valorCap)+"</span></div>"+
      itemsList+
    "</div>";
  }
  
  var docHtml="<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>Contrato Maestro "+nroContrato+"</title>"+

      ".empresa-sub{font-size:9pt;color:#666;margin-left:14px}"+
      ".titulo-main{text-align:center;font-size:18pt;font-weight:bold;color:#1B2A4A;margin:20px 0 5px;text-transform:uppercase;letter-spacing:1px}"+
      ".nro-contrato{text-align:center;font-size:10pt;color:#E8A020;font-weight:bold;margin-bottom:25px}"+
      ".clausula{margin-bottom:14px;text-align:justify}"+
      ".clausula h3{font-size:11.5pt;color:#1B2A4A;background:#E8A020;color:#fff;padding:5px 12px;margin:18px 0 8px;border-radius:3px;letter-spacing:0.5px}"+
      ".aviso-legal{background:#FFF3E0;border:2px solid #E8A020;padding:12px;margin-bottom:20px;font-size:10pt;color:#5B4A00}"+
      "table{width:100%;border-collapse:collapse;margin:10px 0;font-size:10pt}"+
      "th{background:#1B2A4A;color:#fff;padding:8px;text-align:left;border:1px solid #1B2A4A;font-weight:bold}"+
      ".datos-box{background:#F5F2EC;border-left:4px solid #1B2A4A;padding:12px;margin-bottom:18px}"+

function abrirAgregarMaterial(obraId,capN){

}

// Agregar material desde formulario inline (v34)
function agregarMatInline(inlineKey,obraId,capN){
  var nomEl=document.getElementById("inl-nom-"+inlineKey);
  var uniEl=document.getElementById("inl-uni-"+inlineKey);
  var cantEl=document.getElementById("inl-cant-"+inlineKey);
  if(!nomEl||!cantEl){alert("Error al leer el formulario. Intenta de nuevo.");return;}
  var nom=(nomEl.value||"").trim();
  var uni=(uniEl?uniEl.value.trim():"")||"unidad";
  var cant=parseFloat(cantEl.value)||0;
  if(!nom){alert("El nombre del material es obligatorio.");nomEl.focus();return;}
  if(cant<=0){alert("La cantidad debe ser mayor a 0.");cantEl.focus();return;}
  initCatalogoMateriales();
  if(!CRON.materiales[capN])CRON.materiales[capN]=[];
  // Verificar duplicado (case-insensitive) en todo el catálogo
  var dupId=null;
  var nomLower=nom.toLowerCase();
  for(var k in CRON.materiales){
    for(var i=0;i<CRON.materiales[k].length;i++){
      if(CRON.materiales[k][i].nom.toLowerCase()===nomLower){
        dupId={cap:parseInt(k),id:CRON.materiales[k][i].id,nom:CRON.materiales[k][i].nom};
        break;
      }
    }
    if(dupId)break;
  }
  if(dupId){
    if(!confirm("Ya existe \""+dupId.nom+"\" en Cap. "+dupId.cap+".\n¿Usar ese material en lugar de crear duplicado?")){return;}
    if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
    if(!CRON.pedidos[obraId][dupId.cap])CRON.pedidos[obraId][dupId.cap]=[];
    var lista=CRON.pedidos[obraId][dupId.cap];
    var found=false;
    for(var li=0;li<lista.length;li++){if(lista[li].matId===dupId.id){lista[li].cantidad=cant;found=true;break;}}
    if(!found)lista.push({matId:dupId.id,cantidad:cant,estado:"pendiente",fechaSolicitud:new Date().toISOString().slice(0,10),fechaUpd:new Date().toISOString().slice(0,10),actor:S.user?S.user.nombre:"",notas:""});
    guardarCronogramaRemoto();
    if(!S._matAddInline)S._matAddInline={};
    S._matAddInline[inlineKey]=false;
    // Asegurar capítulo expandido para ver el nuevo material
    if(!S._matCapsOpen)S._matCapsOpen={};
    if(!S._matCapsOpen[obraId])S._matCapsOpen[obraId]={};
    S._matCapsOpen[obraId][dupId.cap]=true;
    render();
    return;
  }
  // Crear nuevo material en catálogo
  var maxId=0;
  for(var k2 in CRON.materiales){for(var j=0;j<CRON.materiales[k2].length;j++){if(CRON.materiales[k2][j].id>maxId)maxId=CRON.materiales[k2][j].id;}}
  var newMat={id:maxId+1,nom:nom,uni:uni,cant_m2:0,origen:"compra",lead:0,critico:false,notas:"",precio:0,proveedor:"",pedidos_historicos:0};
  CRON.materiales[capN].push(newMat);
  if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
  if(!CRON.pedidos[obraId][capN])CRON.pedidos[obraId][capN]=[];
  CRON.pedidos[obraId][capN].push({matId:newMat.id,cantidad:cant,estado:"pendiente",fechaSolicitud:new Date().toISOString().slice(0,10),fechaUpd:new Date().toISOString().slice(0,10),actor:S.user?S.user.nombre:"",notas:""});
  guardarCronogramaRemoto();
  if(!S._matAddInline)S._matAddInline={};
  S._matAddInline[inlineKey]=false;
  if(!S._matCapsOpen)S._matCapsOpen={};
  if(!S._matCapsOpen[obraId])S._matCapsOpen[obraId]={};
  S._matCapsOpen[obraId][capN]=true;
  render();
}

function cargarDatosRealesMoss(){
  // Solo carga si la obra existe, tiene ordenes vacías y el nombre coincide
  if(!CRON.ordenes)CRON.ordenes={};
  var cargado=false;
  for(var i=0;i<S.obras.length;i++){
    var obra=S.obras[i];
    if(!obra||!obra.id||!obra.nom)continue;
    var nomUpper=(obra.nom||"").toUpperCase().replace(/\s+/g,"").replace(/[^A-Z0-9]/g,"");
    var keyMatch=null;
    for(var k in DATOS_REALES_MOSS){
      var kClean=k.toUpperCase().replace(/\s+/g,"").replace(/[^A-Z0-9]/g,"");
      if(nomUpper.indexOf(kClean)>=0||kClean.indexOf(nomUpper)>=0)keyMatch=k;
    }
    if(!keyMatch)continue;
    if(CRON.ordenes[obra.id]&&CRON.ordenes[obra.id].length>0)continue; // ya tiene órdenes
    var plantilla=DATOS_REALES_MOSS[keyMatch];
    CRON.ordenes[obra.id]=[];
    for(var pi=0;pi<plantilla.length;pi++){
      var pt=plantilla[pi];
      var ord={
        id:"ord_"+obra.id+"_s"+(pt.nro)+"_real",
        nro:pt.nro,
        fecha:pt.fecha,
        residente:pt.residente||"",
        items:pt.items.map(function(it){return {capN:0,matId:0,nomMat:it.nomMat,uni:it.uni,cantidad:it.cantidad,proveedor:it.proveedor||""};}),
        estado:pt.estado,
        urlRemision:"",
        fechaEntrega:pt.estado==="entregado"?pt.fecha:"",
        notas:pt.notas||("Importado desde hoja Sandra — "+pt.semana)
      };
      CRON.ordenes[obra.id].push(ord);
    }
    cargado=true;
  }
  if(cargado)guardarCronogramaRemoto();
}

function initOrdenes(obraId){
  if(!CRON.ordenes)CRON.ordenes={};
  if(!CRON.ordenes[obraId])CRON.ordenes[obraId]=[];
  // MIGRACIÓN AUTOMÁTICA (v36): si la obra tiene pedidos legacy pero cero órdenes,
  // crear una Orden #1 "Histórico" con todos esos materiales en estado entregado
  if(CRON.ordenes[obraId].length===0&&CRON.pedidos&&CRON.pedidos[obraId]){
    var pedLegacy=CRON.pedidos[obraId];
    var itemsMig=[];
    for(var capK in pedLegacy){
      var capN=parseInt(capK);
      var lstP=pedLegacy[capK]||[];
      for(var pi=0;pi<lstP.length;pi++){
        var p=lstP[pi];
        if(!p.matId||!(p.cantidad>0))continue;
        // Buscar nombre del material en el catálogo
        var nomMat="Material "+p.matId;
        var uniMat="unidad";
        var provMat="";
        if(CRON.materiales&&CRON.materiales[capK]){
          var lstM=CRON.materiales[capK];
          for(var mi=0;mi<lstM.length;mi++){
            if(lstM[mi].id===p.matId){
              nomMat=lstM[mi].nom;
              uniMat=lstM[mi].uni||"unidad";
              provMat=lstM[mi].proveedor||"";
              break;
            }
          }
        }
        itemsMig.push({
          capN:capN,
          matId:p.matId,
          nomMat:nomMat,
          uni:uniMat,
          cantidad:p.cantidad,
          proveedor:provMat
        });
      }
    }
    if(itemsMig.length>0){
      // Obtener fecha más reciente de los pedidos como referencia
      var fechaRef=new Date().toISOString().slice(0,10);
      for(var ck2 in pedLegacy){
        var lst2=pedLegacy[ck2]||[];
        for(var li2=0;li2<lst2.length;li2++){
          if(lst2[li2].fechaSolicitud&&lst2[li2].fechaSolicitud<fechaRef)fechaRef=lst2[li2].fechaSolicitud;
        }
      }
      var ordenHistorico={
        id:"ord_"+obraId+"_historico",
        nro:1,
        fecha:fechaRef,
        residente:"Histórico",
        items:itemsMig,
        estado:"entregado",
        urlRemision:"",
        fechaEntrega:fechaRef,
        notas:"Orden generada automáticamente con materiales registrados antes del sistema de órdenes (v36)."
      };
      CRON.ordenes[obraId].push(ordenHistorico);
      // Marcar todos los materiales legacy como en_obra para consistencia
      for(var ck3 in pedLegacy){
        var lst3=pedLegacy[ck3]||[];
        for(var li3=0;li3<lst3.length;li3++){
          if(lst3[li3].cantidad>0)lst3[li3].estado="en_obra";
        }
      }
      guardarCronogramaRemoto();
    }
  }
}

function sigNroOrden(obraId){
  initOrdenes(obraId);
  var lista=CRON.ordenes[obraId];
  if(!lista.length)return 1;
  var maxN=0;
  for(var i=0;i<lista.length;i++){if((lista[i].nro||0)>maxN)maxN=lista[i].nro;}
  return maxN+1;
}

function crearOrden(obraId){
  initCatalogoMateriales();
  initOrdenes(obraId);
  var nro=sigNroOrden(obraId);
  var residente=S.user?S.user.nombre:"";
  var nueva={
    id:"ord_"+obraId+"_"+Date.now(),
    nro:nro,
    fecha:new Date().toISOString().slice(0,10),
    residente:residente,
    items:[],
    estado:"borrador",
    urlRemision:"",
    fechaEntrega:"",
    notas:""
  };
  CRON.ordenes[obraId].push(nueva);
  guardarCronogramaRemoto();
  // Abrir la nueva orden automáticamente
  if(!S._ordenAbierta)S._ordenAbierta={};
  S._ordenAbierta[nueva.id]=true;
  if(!S._ordenEdit)S._ordenEdit={};
  S._ordenEdit[nueva.id]=true; // modo edición desde creación
  render();
}

function eliminarOrden(obraId,ordId){
  if(!confirm("¿Eliminar esta orden de pedido?"))return;
  initOrdenes(obraId);
  CRON.ordenes[obraId]=CRON.ordenes[obraId].filter(function(o){return o.id!==ordId;});
  guardarCronogramaRemoto();
  render();
}

function getOrden(obraId,ordId){
  initOrdenes(obraId);
  var lista=CRON.ordenes[obraId];
  for(var i=0;i<lista.length;i++)if(lista[i].id===ordId)return lista[i];
  return null;
}

function addItemOrden(obraId,ordId,capN,matId){
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  // Buscar nombre del material
  var mat=null;
  var lstM=(CRON.materiales&&CRON.materiales[capN])||[];
  for(var i=0;i<lstM.length;i++)if(lstM[i].id===matId){mat=lstM[i];break;}
  if(!mat){
    // Crear material nuevo si viene del form
    var nomEl=document.getElementById("ord-new-nom-"+ordId);
    var uniEl=document.getElementById("ord-new-uni-"+ordId);
    if(!nomEl)return;
    var nom=(nomEl.value||"").trim();
    if(!nom){alert("Escribe el nombre del material.");nomEl.focus();return;}
    var uni=(uniEl?uniEl.value.trim():"")||"unidad";
    // Agregar al catálogo
    if(!CRON.materiales[capN])CRON.materiales[capN]=[];
    var maxId=0;
    for(var k in CRON.materiales)for(var j=0;j<CRON.materiales[k].length;j++)if(CRON.materiales[k][j].id>maxId)maxId=CRON.materiales[k][j].id;
    mat={id:maxId+1,nom:nom,uni:uni,cant_m2:0,origen:"compra",lead:0,critico:false,notas:"",precio:0,proveedor:""};
    CRON.materiales[capN].push(mat);
    matId=mat.id;
    nomEl.value="";
  }
  // Verificar si ya está en la orden
  for(var ii=0;ii<ord.items.length;ii++){
    if(ord.items[ii].matId===matId&&ord.items[ii].capN===capN){
      alert("\""+mat.nom+"\" ya está en esta orden.");return;
    }
  }
  var cantEl=document.getElementById("ord-cant-"+ordId+"-"+capN+"-"+matId);
  var cant=cantEl?parseFloat(cantEl.value)||1:1;
  ord.items.push({capN:capN,matId:matId,nomMat:mat.nom,uni:mat.uni||"unidad",cantidad:cant,proveedor:mat.proveedor||""});
  guardarCronogramaRemoto();
  render();
}

function addItemOrdenNuevo(obraId,ordId){
  var provEl=document.getElementById("ord-new-prov-"+ordId);
  var nomEl=document.getElementById("ord-new-nom-"+ordId);
  var uniEl=document.getElementById("ord-new-uni-"+ordId);
  var cantEl=document.getElementById("ord-new-cant-"+ordId);
  if(!nomEl||!cantEl){return;}
  var prov=(provEl?provEl.value.trim():"")||"Sin definir";
  var nom=(nomEl.value||"").trim();
  var capN=1; // capN no relevante para vista por proveedor
  var uni=(uniEl?uniEl.value.trim():"")||"unidad";
  var cant=parseFloat(cantEl.value)||0;
  if(!nom){alert("El nombre del material es obligatorio.");nomEl.focus();return;}
  if(cant<=0){alert("La cantidad debe ser mayor a 0.");cantEl.focus();return;}
  initCatalogoMateriales();
  if(!CRON.materiales[capN])CRON.materiales[capN]=[];
  // Buscar si ya existe en catálogo (case-insensitive)
  var matExistente=null;
  var nomL=nom.toLowerCase();
  for(var k in CRON.materiales){
    for(var j=0;j<CRON.materiales[k].length;j++){
      if(CRON.materiales[k][j].nom.toLowerCase()===nomL){
        matExistente=CRON.materiales[k][j];
        capN=parseInt(k);
        break;
      }
    }
    if(matExistente)break;
  }
  if(!matExistente){
    var maxId=0;
    for(var k2 in CRON.materiales)for(var j2=0;j2<CRON.materiales[k2].length;j2++)if(CRON.materiales[k2][j2].id>maxId)maxId=CRON.materiales[k2][j2].id;
    matExistente={id:maxId+1,nom:nom,uni:uni,cant_m2:0,origen:"compra",lead:0,critico:false,notas:"",precio:0,proveedor:""};
    CRON.materiales[capN].push(matExistente);
  }
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  // Verificar duplicado en esta orden
  for(var ii=0;ii<ord.items.length;ii++){
    if(ord.items[ii].matId===matExistente.id){
      ord.items[ii].cantidad+=cant;
      guardarCronogramaRemoto();
      nomEl.value="";cantEl.value="";
      render();return;
    }
  }
  ord.items.push({capN:capN,matId:matExistente.id,nomMat:matExistente.nom,uni:matExistente.uni||uni,cantidad:cant,proveedor:prov||matExistente.proveedor||""});
  guardarCronogramaRemoto();
  nomEl.value="";cantEl.value="";
  render();
}

function quitarItemOrden(obraId,ordId,matId){
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  ord.items=ord.items.filter(function(it){return it.matId!==matId;});
  guardarCronogramaRemoto();
  render();
}

function actualizarCantItemOrden(obraId,ordId,matId,val){
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  var cant=parseFloat(val)||0;
  for(var i=0;i<ord.items.length;i++){
    if(ord.items[i].matId===matId){ord.items[i].cantidad=cant;break;}
  }
  guardarCronogramaRemoto();
}

function actualizarProvItemOrden(obraId,ordId,matId,nuevoProv){
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  for(var i=0;i<ord.items.length;i++){
    if(ord.items[i].matId===matId){ord.items[i].proveedor=nuevoProv;break;}
  }
  guardarCronogramaRemoto();
  render();
}

function cambiarEstadoOrden(obraId,ordId,nuevoEstado){
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  if(nuevoEstado==="entregado"){
    if(!ord.urlRemision||!ord.urlRemision.trim()){
      alert("Para marcar como ENTREGADO debes adjuntar el link de la remisión firmada.\n\nPega el link de Google Drive del PDF firmado y luego cambia el estado.");
      return;
    }
    ord.fechaEntrega=new Date().toISOString().slice(0,10);
    // Sincronizar estado "en_obra" a todos los materiales de la orden
    sincronizarEstadoOrdenAMateriales(obraId,ord,"en_obra");
  }
  if(nuevoEstado==="en_camino"){
    sincronizarEstadoOrdenAMateriales(obraId,ord,"en_camino");
  }
  if(nuevoEstado==="enviado"){
    ord.fechaSolicitud=new Date().toISOString().slice(0,10);
    sincronizarEstadoOrdenAMateriales(obraId,ord,"solicitado");
  }
  ord.estado=nuevoEstado;
  guardarCronogramaRemoto();
  render();
}

function sincronizarEstadoOrdenAMateriales(obraId,ord,estMat){
  // Actualiza los pedidos legacy (por capN) para compatibilidad con barra de progreso
  if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
  for(var i=0;i<ord.items.length;i++){
    var it=ord.items[i];
    var capN=it.capN;
    if(!CRON.pedidos[obraId][capN])CRON.pedidos[obraId][capN]=[];
    var lista=CRON.pedidos[obraId][capN];
    var found=false;
    for(var j=0;j<lista.length;j++){
      if(lista[j].matId===it.matId){lista[j].estado=estMat;lista[j].fechaUpd=new Date().toISOString().slice(0,10);found=true;break;}
    }
    if(!found){
      lista.push({matId:it.matId,cantidad:it.cantidad,estado:estMat,fechaSolicitud:new Date().toISOString().slice(0,10),fechaUpd:new Date().toISOString().slice(0,10),actor:S.user?S.user.nombre:"",notas:""});
    }
  }
}

function guardarUrlRemision(obraId,ordId){
  var el=document.getElementById("url-rem-"+ordId);
  if(!el)return;
  var ord=getOrden(obraId,ordId);
  if(!ord)return;
  ord.urlRemision=el.value.trim();

// Crear material en catalogo + asignarlo a la obra con cantidad
function crearMaterialNuevo(){
  if(!ADDM.obraId||!ADDM.capN)return;
  var nom=document.getElementById("addm-nom").value.trim();
  var uni=document.getElementById("addm-uni").value.trim()||"unidad";
  var cant=parseFloat(document.getElementById("addm-cant").value)||0;
  if(!nom){alert("El nombre es obligatorio");return;}
  if(cant<=0){alert("La cantidad debe ser mayor a 0");return;}
  initCatalogoMateriales();
  if(!CRON.materiales[ADDM.capN])CRON.materiales[ADDM.capN]=[];
  // Verificar duplicado (case-insensitive)
  var dupId=null;
  var nomLower=nom.toLowerCase();
  for(var k in CRON.materiales){
    for(var i=0;i<CRON.materiales[k].length;i++){
      if(CRON.materiales[k][i].nom.toLowerCase()===nomLower){
        dupId={cap:k,id:CRON.materiales[k][i].id,nom:CRON.materiales[k][i].nom};
        break;
      }
    }
    if(dupId)break;
  }

  var obraIdGuardar=ADDM.obraId,capGuardar,matIdGuardar;

  if(dupId){
    if(!confirm("Ya existe un material llamado \""+dupId.nom+"\" en el Cap. "+dupId.cap+".\n\nQuieres usarlo en lugar de crear duplicado?")){
      return;
    }
    // Usar el existente: agregar pedido a esta obra
    if(!CRON.pedidos[ADDM.obraId])CRON.pedidos[ADDM.obraId]={};
    if(!CRON.pedidos[ADDM.obraId][dupId.cap])CRON.pedidos[ADDM.obraId][dupId.cap]=[];
    var lista=CRON.pedidos[ADDM.obraId][dupId.cap];
    // Buscar si ya hay pedido
    var found=false;
    for(var li=0;li<lista.length;li++){
      if(lista[li].matId===dupId.id){lista[li].cantidad=cant;found=true;break;}
    }
    if(!found){
      lista.push({
        matId:dupId.id,cantidad:cant,estado:"pendiente",
        fechaSolicitud:new Date().toISOString().slice(0,10),
        fechaUpd:new Date().toISOString().slice(0,10),
        actor:S.user.nombre,notas:""
      });
    }
    capGuardar=dupId.cap;matIdGuardar=dupId.id;
  }else{
    // Crear nuevo: generar id unico
    var maxId=0;
    for(var k2 in CRON.materiales){
      for(var j=0;j<CRON.materiales[k2].length;j++){
        if(CRON.materiales[k2][j].id>maxId)maxId=CRON.materiales[k2][j].id;
      }
    }
    var newMat={id:maxId+1,nom:nom,uni:uni,cant_m2:0,origen:"compra",lead:0,critico:false,notas:""};
    CRON.materiales[ADDM.capN].push(newMat);
    // Crear pedido en la obra
    if(!CRON.pedidos[ADDM.obraId])CRON.pedidos[ADDM.obraId]={};
    if(!CRON.pedidos[ADDM.obraId][ADDM.capN])CRON.pedidos[ADDM.obraId][ADDM.capN]=[];
    CRON.pedidos[ADDM.obraId][ADDM.capN].push({
      matId:newMat.id,cantidad:cant,estado:"pendiente",
      fechaSolicitud:new Date().toISOString().slice(0,10),
      fechaUpd:new Date().toISOString().slice(0,10),
      actor:S.user.nombre,notas:""
    });
    capGuardar=ADDM.capN;matIdGuardar=newMat.id;
  }

  // v2026.07.21 FIX: antes se cerraba el formulario de inmediato sin saber
  // si el guardado en verdad llego al servidor (mismo problema que ya se
  // corrigio para "crear obra nueva" - ver crearNuevo()). Ahora se marca
  // como pendiente (protegido de un refresco concurrente) y solo se cierra
  // el formulario cuando el servidor confirma; si falla, se avisa claro y
  // el formulario queda abierto para reintentar.
  var pendKey=obraIdGuardar+"_"+capGuardar+"_"+matIdGuardar;
  S.pending[pendKey]=true;
  guardarCronogramaRemoto(function(saved,motivo){
    delete S.pending[pendKey];
    if(saved){
      cerrarAgregarMaterial();
      render();
    }else{
      var razon=motivo==="sin_sincronizar"
        ?"la app todavia esta sincronizando con el servidor"
        :"no hay conexion con el servidor en este momento";
      alert("⚠️ \""+nom+"\" se guardo SOLO en este dispositivo porque "+razon+". No cierres esta pestana. Espera a que arriba diga \"Sync OK\" y vuelve a intentar.");
      render();
    }
  });
}

// Agregar desde catalogo existente (selector)
function addDesdeCatalogo(capDeMatN,matId){
  if(!ADDM.obraId)return;
  var cantInput=document.getElementById("addmcat-"+capDeMatN+"-"+matId);
  var cant=parseFloat(cantInput?cantInput.value:0)||0;
  if(cant<=0){alert("Ingresa una cantidad mayor a 0");return;}
  if(!CRON.pedidos[ADDM.obraId])CRON.pedidos[ADDM.obraId]={};
  if(!CRON.pedidos[ADDM.obraId][capDeMatN])CRON.pedidos[ADDM.obraId][capDeMatN]=[];
  var lista=CRON.pedidos[ADDM.obraId][capDeMatN];
  var found=false;
  for(var li=0;li<lista.length;li++){
    if(lista[li].matId===matId){
      lista[li].cantidad+=cant; // sumar a lo que ya habia
      found=true;break;
    }
  }
  if(!found){
    lista.push({
      matId:matId,cantidad:cant,estado:"pendiente",
      fechaSolicitud:new Date().toISOString().slice(0,10),
      fechaUpd:new Date().toISOString().slice(0,10),
      actor:S.user.nombre,notas:""
    });
  }
  // v2026.07.21 FIX: proteger este pedido mientras se guarda, y solo decir
  // "Agregado!" cuando el servidor confirma de verdad (antes se mostraba
  // el mensaje de exito a los 1.5s sin importar si en realidad se guardo).
  var pendKey=ADDM.obraId+"_"+capDeMatN+"_"+matId;
  S.pending[pendKey]=true;
  var btn=document.getElementById("btnaddcat-"+capDeMatN+"-"+matId);
  if(btn)btn.textContent="Guardando...";
  guardarCronogramaRemoto(function(saved,motivo){
    delete S.pending[pendKey];
    if(saved){
      if(cantInput)cantInput.value="";
      if(btn){btn.textContent="Agregado!";setTimeout(function(){if(btn)btn.textContent="+ Agregar";},1500);}
    }else{
      var razon=motivo==="sin_sincronizar"
        ?"la app todavia esta sincronizando con el servidor"
        :"no hay conexion con el servidor en este momento";
      alert("⚠️ No se guardo en el servidor ("+razon+"). No cierres esta pestana y vuelve a intentar en unos segundos.");
      if(btn)btn.textContent="+ Agregar";
      render();
    }
  });
}

function editFechaMat(obraId,capN,matId,campo){
  var labels={"fechaCompra":"Fecha de Compra","fechaEntregaObra":"Fecha de Entrega en Obra","fechaSolicitud":"Fecha de Solicitud"};
  var lista=(CRON.pedidos[obraId]&&CRON.pedidos[obraId][capN])||[];
  var pedido=null;
  for(var i=0;i<lista.length;i++){if(lista[i].matId===matId){pedido=lista[i];break;}}
  var actual=pedido?pedido[campo]:"";
  var nueva=prompt((labels[campo]||campo)+" (AAAA-MM-DD):",actual||new Date().toISOString().slice(0,10));
  if(nueva===null)return;
  nueva=nueva.trim();
  if(nueva&&!/^\d{4}-\d{2}-\d{2}$/.test(nueva)){alert("Formato inválido. Use AAAA-MM-DD");return;}
  if(!CRON.pedidos[obraId])CRON.pedidos[obraId]={};
  if(!CRON.pedidos[obraId][capN])CRON.pedidos[obraId][capN]=[];
  var found=false;
  for(var j=0;j<CRON.pedidos[obraId][capN].length;j++){
    if(CRON.pedidos[obraId][capN][j].matId===matId){
      CRON.pedidos[obraId][capN][j][campo]=nueva;
      found=true;break;
    }
  }
  if(!found){
    var obj={matId:matId,cantidad:0,estado:"solicitado",fechaSolicitud:new Date().toISOString().slice(0,10),fechaCompra:"",fechaEntregaObra:"",fechaUpd:new Date().toISOString().slice(0,10),actor:S.user.nombre,notas:""};
    obj[campo]=nueva;
    CRON.pedidos[obraId][capN].push(obj);
  }
  guardarCronogramaRemoto();
  render();
}

// v2026.07.16: borrado explicito de un item de pedido en el servidor.
// Ya no basta con "guardar" para borrar: desde que cron.guardar fusiona
// pedidos por item (matId) para no perder materiales de otras personas,
// un guardado normal podria "revivir" un item borrado si otro navegador
// guarda con su copia vieja (que todavia lo tiene). Por eso el borrado
// real de un item usa esta accion explicita en vez del guardado generico.
function eliminarPedidoRemoto(obraId,capN,matId,cb){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"pedido.eliminar",
      _email:S.user?S.user.email:"",
      _nombre:S.user?S.user.nombre:"",
      payload:{obraId:obraId,capN:capN,matId:matId}
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    console.log("[MOSS] pedido.eliminar respuesta:",d);
    if(cb)cb(d&&d.ok!==false);
  })
  .catch(function(err){
    console.error("[MOSS] Error al eliminar pedido en servidor:",err);
    if(cb)cb(false);
  });
}

  render();
}

// Obtener proximos martes y jueves
function getProximosMartesJueves(){
  var hoy=new Date();
  var dias=[];
  for(var i=0;i<=7;i++){
    var d=new Date(hoy);
    d.setDate(hoy.getDate()+i);
    var dow=d.getDay();
    if(dow===2||dow===4){
      dias.push({
        dia:dow===2?"Martes":"Jueves",
        fecha:d.toISOString().slice(0,10),
        label:(dow===2?"Martes":"Jueves")+" "+d.toLocaleDateString("es-CO",{day:"numeric",month:"short"})
      });
    }
  }
  return dias;
}

var ESTADOS_OBRA=[
  {key:"proxima",lbl:"Proxima a entregar",ic:"&#x1F535;",col:"#C17B2A",bg:"#FDF0E0",ord:1},
  {key:"enobra",lbl:"En obra",ic:"&#x1F3D7;",col:"#3A6B45",bg:"#E8F0EB",ord:2},

// Obtener estado de una obra (manual desde JSONBin > automatico inferido)
function getEstadoObra(o){
  // Estado manual asignado tiene prioridad
  if(CRON.estados&&CRON.estados[o.id]){
    var est=CRON.estados[o.id];
    for(var i=0;i<ESTADOS_OBRA.length;i++)if(ESTADOS_OBRA[i].key===est)return ESTADOS_OBRA[i];
  }
  // Inferir automaticamente
  var et=String(o.etapa||"").toLowerCase().trim();
  var av=+o.av||0;
  var act=String(o.act||"").toLowerCase().trim();
  // Entregado
  if(et==="entregado"||av>=100||act==="entregado")return ESTADOS_OBRA[4];
  // Sin recibir apto
  if(av<=0&&(act===""||act==="sin iniciar"||act==="apto sin recibir"||act==="sin recibir"))return ESTADOS_OBRA[3];
  // Pre-obra
  if(act==="diseno"||act.indexOf("diseno")>=0||act.indexOf("diseño")>=0||act.indexOf("planos")>=0||act.indexOf("render")>=0||et==="diseno"||et==="pre-obra"||et==="preobra")return ESTADOS_OBRA[2];
  // Proxima a entregar (>= 75% o capitulos finales en actividad)
  if(av>=75||act.indexOf("aseo")>=0||act.indexOf("pre-entrega")>=0||act.indexOf("electrodom")>=0||act.indexOf("entrega")>=0)return ESTADOS_OBRA[0];
  // Por defecto: en obra
  return ESTADOS_OBRA[1];
}

// Ordena obras por estado de prioridad
function ordenarObrasPrioridad(obras){
  return obras.slice().sort(function(a,b){
    var ea=getEstadoObra(a),eb=getEstadoObra(b);
    if(ea.ord!==eb.ord)return ea.ord-eb.ord;
    // Dentro del mismo grupo, mas avance primero (excepto entregado por fecha desc)
    if(ea.key==="entregado")return String(b.fE||"").localeCompare(String(a.fE||""));
    if(ea.key==="sinrecibir")return String(a.fl||"9999").localeCompare(String(b.fl||"9999"));
    return (+b.av||0)-(+a.av||0);
  });
}

// Cambios pendientes
function marcar(id){
  S.pending[id]=true;
  // Sincronizar CRON.obras con S.obras inmediatamente (fuente de verdad para JSONBin)
  for(var i=0;i<S.obras.length;i++){
    if(S.obras[i].id===+id){
      if(!CRON.obras)CRON.obras={};
      CRON.obras[id]=S.obras[i];
      break;
    }
  }
  // Disparar guardado a JSONBin (debounce 100ms, junta multiples cambios)
  guardarCronogramaRemoto();
}

function guardar(){
  var ids=Object.keys(S.pending);
  if(ids.length===0)return;
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  S.saving=true;S.saveMsg="Guardando...";render();
  
  // MIGRACION: guardar en JSONBin (no en Apps Script)
  // Sincronizar S.obras -> CRON.obras (objeto indexado por id)
  if(!CRON.obras)CRON.obras={};
  for(var oi=0;oi<S.obras.length;oi++){
    var ob=S.obras[oi];
    CRON.obras[ob.id]=ob;
  }
  // Guardar a JSONBin (con todas las protecciones de race condition)
  guardarCronogramaRemoto();
  
  // Limpiar pending despues de un breve delay (que guarde primero)
  setTimeout(function(){
    S.pending={};
    S.saving=false;
    S.saveMsg="Guardado para todos";
    var sc=document.getElementById("save-count");
    if(sc)sc.textContent=S.saveMsg;
    else render();
    setTimeout(function(){S.saveMsg="";render();},2500);
  },200);
}

function bLogin(){
  var em=document.getElementById("lem");if(em)em.addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("lpin").focus();});
  var pin=document.getElementById("lpin");if(pin)pin.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
}
function doLogin(){
  var em=document.getElementById("lem").value.trim().toLowerCase();
  var pin=document.getElementById("lpin").value.trim();
  var err=document.getElementById("lerr");
  err.style.display="none";
  if(!em){err.textContent="Ingresa tu correo.";err.style.display="block";return;}
  if(em.indexOf("@mosscolombia.com.co")<0){err.textContent="Solo correos @mosscolombia.com.co";err.style.display="block";return;}
  if(!pin){err.textContent="Ingresa tu PIN.";err.style.display="block";return;}
  var u=null;for(var i=0;i<USERS.length;i++){if(USERS[i].email===em){u=USERS[i];break;}}
  if(!u){err.textContent="Correo no registrado.";err.style.display="block";return;}
  if(u.pin!==pin){err.textContent="PIN incorrecto.";err.style.display="block";document.getElementById("lpin").value="";return;}
  S.user=u;S.obras=[];S.driveOk=false;S.cargando=true;S.cargandoMsg="Cargando datos de obras...";
  cargarCache();render();
  syncDrive(function(){
    S.cargando=false;S.cargandoMsg="";
    render();
  });
  setInterval(syncDrive,POLL);
  // Verificación rápida de versión cada 10 segundos — detecta cambios de otros usuarios
  setInterval(checkVersionRemota,POLL_VER);
  // Auto-guardado cada 2 minutos como respaldo adicional
  setInterval(function(){
    if(_sesionSincronizada&&_localModTs&&(Date.now()-_localModTs)<130000){

function guardarEditObra(id){
  var cod=document.getElementById("eo-cod").value.trim();
  var nom=document.getElementById("eo-nom").value.trim();
  var cli=document.getElementById("eo-cli").value.trim();
  if(!cod||!nom||!cli){alert("Codigo, nombre y cliente son obligatorios.");return;}
  for(var i=0;i<S.obras.length;i++){
    if(S.obras[i].id===+id){
      S.obras[i].cod=cod;
      S.obras[i].nom=nom;
      S.obras[i].cli=cli;
      S.obras[i].plan=document.getElementById("eo-plan").value||"Medium";
      S.obras[i].res=document.getElementById("eo-res").value||"";
      S.obras[i].maestro=document.getElementById("eo-mae").value||"";
      var p=+document.getElementById("eo-pres").value||0;
      if(p>0)S.obras[i].pres=p;
      // Actualizar m2 totales
      var m2El=document.getElementById("eo-m2");
      if(m2El){
        var m2val=parseFloat(m2El.value)||0;
        if(m2val>=0)S.obras[i].m2=m2val;
      }
      // Cambio de etapa (solo si tiene permisos y el campo existe)
      var elEt=document.getElementById("eo-etapa");
      if(elEt&&puedeCerrarObra()){
        var nuevaEt=elEt.value;
        // Validar: no permitir entregado si hay garantias abiertas
        if(nuevaEt==="entregado"){
          var ga=garAbiertas(S.obras[i].nom);
          if(ga>0){
            alert("No se puede marcar como Entregado.\n\nEsta obra tiene "+ga+" garantia(s) en proceso. Cierra primero las garantias en la pestana de Garantias.");
            return;
          }
          // Cierre automatico: 100% + actividad Entregado
          S.obras[i].av=100;
          S.obras[i].act="Entregado";
        }
        S.obras[i].etapa=nuevaEt;
      }
      marcar(id);
      break;
    }
  }
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  document.getElementById("edit-obra-form").style.display="none";
  guardar();
  render();
}

  var hist=listarBackups();
  var bk=null;
  for(var i=0;i<hist.length;i++)if(hist[i].ts===ts){bk=hist[i];break;}
  if(!bk){ // v42: buscar también en los backups globales del servidor (CRON._backups)
    var sv=CRON._backups||[];
    for(var j=0;j<sv.length;j++)if(sv[j].ts===ts){bk=sv[j];break;}

// Helper: estructura inicial de cronograma para una obra
function initCronograma(obraId){
  if(!CRON.cronograma[obraId]){
    CRON.cronograma[obraId]={};
    for(var i=0;i<CAPITULOS.length;i++){
      var cap=CAPITULOS[i];
      var checks={};
      for(var j=0;j<cap.items.length;j++)checks[cap.items[j]]=false;
      CRON.cronograma[obraId][cap.n]={fIni:"",fFin:"",checks:checks};
    }
  }
  return CRON.cronograma[obraId];
}

// Calcula % de avance de un capitulo (= items marcados / total)
function avanceCapitulo(obraId,capN){
  var datos=CRON.cronograma[obraId];
  if(!datos||!datos[capN])return 0;
  var checks=datos[capN].checks||{};
  var total=0,marcados=0;
  for(var k in checks){total++;if(checks[k])marcados++;}
  if(total===0)return 0;
  return Math.round(marcados/total*100);
}

// Estado del capitulo: ok/riesgo/atrasado/nostart
function estadoCapitulo(obraId,capN){
  var datos=CRON.cronograma[obraId];
  if(!datos||!datos[capN])return "nostart";
  var d=datos[capN];
  if(!d.fIni||!d.fFin)return "nostart";
  var av=avanceCapitulo(obraId,capN);
  if(av===100)return "ok";
  var hoy=new Date();
  var ini=new Date(d.fIni);
  var fin=new Date(d.fFin);
  if(hoy<ini)return "nostart";
  if(hoy>fin)return "atrasado";
  // Esperado por dias
  var transcurrido=(hoy-ini)/(fin-ini);
  if(av/100 < transcurrido-0.2)return "riesgo";
  return "ok";
}

// Avance total de obra = promedio simple de los 11 capitulos
function avanceTotalObra(obraId){
  if(!CRON.cronograma[obraId])return 0;
  var sum=0;
  for(var i=0;i<CAPITULOS.length;i++){
    sum+=avanceCapitulo(obraId,CAPITULOS[i].n);
  }
  return Math.round(sum/CAPITULOS.length);
}

// Autocalcular fechas del capitulo 10 (Pre-entrega) basado en o.fE
function autocalcPreentrega(obraId,fE){
  if(!fE)return;
  initCronograma(obraId);
  var fin=new Date(fE);
  var ini=new Date(fE);
  ini.setDate(ini.getDate()-5);
  CRON.cronograma[obraId][10].fIni=ini.toISOString().slice(0,10);

// Numero de semana ISO de una fecha
function semanaISO(d){
  var fecha=new Date(d.getTime());
  fecha.setHours(0,0,0,0);
  fecha.setDate(fecha.getDate()+3-(fecha.getDay()+6)%7);
  var semana1=new Date(fecha.getFullYear(),0,4);
  return 1+Math.round(((fecha-semana1)/86400000-3+(semana1.getDay()+6)%7)/7);
}
function anioSemana(d){var n=new Date(d.getTime());n.setDate(n.getDate()+3-(n.getDay()+6)%7);return n.getFullYear();}
function keyVideoSemana(obraId,fecha){
  var f=fecha||new Date();
  return obraId+"_"+anioSemana(f)+"-W"+String(semanaISO(f)).padStart(2,"0");
}
function rangoSemana(anio,semana){
  // Lunes y domingo de esa semana ISO
  var simple=new Date(anio,0,1+(semana-1)*7);
  var dow=simple.getDay();
  var lunes=new Date(simple);
  if(dow<=4)lunes.setDate(simple.getDate()-simple.getDay()+1);
  else lunes.setDate(simple.getDate()+8-simple.getDay());
  var domingo=new Date(lunes);domingo.setDate(lunes.getDate()+6);
  return {ini:lunes,fin:domingo};
}
function fmtFecha(d){return d.toLocaleDateString("es-CO",{day:"numeric",month:"short"});}

// Guardar/actualizar reporte semanal
function guardarVideoSemana(obraId,key,campo,valor){
  if(!CRON.videos[obraId])CRON.videos[obraId]={};
  if(!CRON.videos[obraId][key])CRON.videos[obraId][key]={link:"",coment:"",estado:"pendiente",notaRev:"",revisor:"",ts:Date.now()};
  CRON.videos[obraId][key][campo]=valor;
  CRON.videos[obraId][key].ts=Date.now();
  // Si cambia link o coment y estaba rechazado/aprobado, vuelve a pendiente
  if((campo==="link"||campo==="coment")&&CRON.videos[obraId][key].estado!=="pendiente"){
    CRON.videos[obraId][key].estado="pendiente";
    CRON.videos[obraId][key].notaRev="";
  }
  guardarCronogramaRemoto();
}

// Sandra aprueba o rechaza
function revisarVideo(obraId,key,decision,nota){
  if(!CRON.videos[obraId]||!CRON.videos[obraId][key])return;

function eliminarObra(id){
  var o=null;
  for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+id){o=S.obras[i];break;}}
  if(!o){alert("Obra no encontrada");return;}
  var msg="ELIMINAR DEFINITIVAMENTE esta obra?\n\n"+
    (o.cod||"")+" - "+(o.nom||"Sin nombre")+"\n"+
    "Cliente: "+(o.cli||"-")+"\n"+
    "Avance: "+(o.av||0)+"%\n\n"+
    "Se guarda respaldo automatico. Si te equivocas, restaura desde Logistica > Backups locales.";
  if(!confirm(msg))return;
  S.obras=S.obras.filter(function(x){return x.id!==+id;});
  if(CRON.obras&&CRON.obras[id])delete CRON.obras[id];
  if(CRON.cronograma&&CRON.cronograma[id])delete CRON.cronograma[id];
  if(CRON.pedidos&&CRON.pedidos[id])delete CRON.pedidos[id];
  if(CRON.videos&&CRON.videos[id])delete CRON.videos[id];
  if(CRON.estados&&CRON.estados[id])delete CRON.estados[id];
  if(CRON.drives&&CRON.drives[id])delete CRON.drives[id];
  if(S.pending&&S.pending[id])delete S.pending[id];
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  _eliminarObraRemoto(id); // v42: borrado explícito y autoritativo en el servidor (con la fusión, un guardado normal ya no borra: conservaría la obra)
  S.osel=null;
  S.vista="ejec";
  S.saveMsg="Obra eliminada correctamente";
  setTimeout(function(){S.saveMsg="";render();},2500);
  render();
}

function crearNuevo(){
  var cod=document.getElementById("ncod").value.trim();
  var nom=document.getElementById("nnom").value.trim();
  var cli=document.getElementById("ncli").value.trim();
  var err=document.getElementById("nuevo-err");
  var ok=document.getElementById("nuevo-ok");
  if(err)err.style.display="none";
  if(ok)ok.style.display="none";
  if(!cod||!nom||!cli){
    if(err){err.textContent="Codigo, nombre y cliente son obligatorios.";err.style.display="block";}
    return;
  }
  // Validar duplicados de codigo
  for(var dup=0;dup<S.obras.length;dup++){
    if(S.obras[dup].cod.toLowerCase()===cod.toLowerCase()){
      if(err){err.textContent="Ya existe una obra con el codigo \""+cod+"\". Usa un codigo distinto.";err.style.display="block";}
      return;
    }
  }
  var fId=document.getElementById("nfi").value||"";
  var dias=+document.getElementById("ndias").value||45;
  var fIObra=fId?addDH(fId,8):"";
  var fE=fIObra?addDH(fIObra,dias):"";
  var pres=+document.getElementById("npres").value||0;
  if(ok){ok.textContent="Guardando proyecto...";ok.style.display="block";}
  
  // Construir obra completa
  var o={
    id:Date.now(),cod:cod,nom:nom,cli:cli,
    plan:document.getElementById("nplan").value||"Medium",
    res:document.getElementById("nres").value||"",
    maestro:document.getElementById("nmae").value||"",
    fI:fIObra,fE:fE,fl:fIObra||"",dias:dias,pres:pres,
    av:0,act:"Diseno",notas:"",
    gC:0,gM:0,gO:0,gA:0,cal:0,calFases:{},nps:0,
    etapa:"preobra",punch:[],emails:"",
    actFI:"",actFF:"",fIDiseno:fId,fEDiseno:fIObra,
    m2:0,
    caps:(function(){
      var sel=[];
      CAPITULOS.forEach(function(c){
        var el=document.getElementById("ncap"+c.n);
        if(el&&el.checked)sel.push(c.n);
      });
      return sel.length===CAPITULOS.length?null:sel; // null = todos activos
    })()
  };
  
  // 1. Agregar a S.obras
  S.obras.push(o);

  // 2. CRITICO: Sincronizar a CRON.obras (fuente de verdad para JSONBin)
  if(!CRON.obras)CRON.obras={};
  CRON.obras[o.id]=o;

  // v52 FIX: marcar como pendiente para que un GET de polling que llegue
  // mientras se sube al servidor NO sobreescriba esta obra recien creada
  // (antes una obra creada justo despues de iniciar sesion, o justo antes
  // de un ciclo de polling, podia desaparecer sin ningun aviso).
  S.pending[o.id]=true;

  // 3. Persistencia local de respaldo
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}

  // 4. Guardar en el servidor y ESPERAR confirmacion real antes de avisar
  // "creado correctamente" y redirigir. Antes se mostraba ese mensaje y se
  // navegaba de inmediato sin haber confirmado nada con el servidor, asi
  // que una obra creada sin sincronizacion o sin red parecia guardada pero
  // solo quedaba en ese dispositivo.
  if(ok){ok.textContent="Guardando en el servidor...";ok.style.display="block";}
  guardarCronogramaRemoto(function(saved,motivo){
    if(saved){
      delete S.pending[o.id];
      if(ok){ok.textContent="✓ Proyecto creado y guardado en el servidor. Redirigiendo...";ok.style.display="block";}
      if(fId)abrirCalendarioProyecto(o);
      setTimeout(function(){nav("ejec");},1200);
    } else {
      // Dejamos S.pending[o.id]=true para proteger la obra hasta que se
      // pueda reintentar el guardado (por ejemplo con "Reintentar conexion").
      if(ok)ok.style.display="none";
      if(err){
        var razon=motivo==="sin_sincronizar"
          ?"la app todavia esta sincronizando con el servidor"
          :"no hay conexion con el servidor en este momento";
        err.textContent="⚠️ La obra \""+nom+"\" se guardo SOLO en este dispositivo porque "+razon+". NO cierres esta pestana ni la abras en otro celular/computador todavia. Espera a que arriba diga \"Sync OK\" y vuelve a intentar, o toca \"Reintentar conexión\".";
        err.style.display="block";
      }
      render();
    }
  });
}

  var pendKey="maestrocorte_"+obraId+"_"+id;
  S.pending[pendKey]=true;
  guardarCronogramaRemoto(function(saved,motivo){
    delete S.pending[pendKey];
    if(saved){
      S._maestroTab="historial";
    }else{
      var razon=motivo==="sin_sincronizar"?"la app todavia esta sincronizando con el servidor":"no hay conexion con el servidor";
      alert("⚠️ El corte se guardo SOLO en este dispositivo ("+razon+"). No cierres esta pestana. Espera a que arriba diga \"Sync OK\" y vuelve a intentar.");
    }
    render();
  });
}

function maestroMarcarPagado(obraId,corteId){
  var d=_maestroData(obraId);
  var corte=null;
  for(var i=0;i<d.cortes.length;i++){
    if(d.cortes[i].id===corteId){corte=d.cortes[i];break;}
  }
  if(!corte)return;
  var estadoAnterior=corte.pagado;
  corte.pagado=!corte.pagado;
  if(corte.pagado){
    corte.auth=S.user?S.user.nombre:"";
    corte.authTs=Date.now();
  }else{
    corte.auth="";corte.authTs=0;
  }
  render();
  // v2026.07.22 FIX: si el guardado falla, revertir el cambio local en vez
  // de dejar la pantalla mostrando "pagado" cuando en realidad no se guardo.
  guardarCronogramaRemoto(function(saved,motivo){
    if(!saved){
      corte.pagado=estadoAnterior;
      if(!estadoAnterior){corte.auth="";corte.authTs=0;}
      var razon=motivo==="sin_sincronizar"?"la app todavia esta sincronizando con el servidor":"no hay conexion con el servidor";
      alert("⚠️ No se pudo guardar el cambio ("+razon+"). Vuelve a intentar en unos segundos.");
    }
    render();
  });
}

function maestroElimCorte(obraId,corteId){
  if(!confirm("¿Eliminar este corte de pago?"))return;
  var d=_maestroData(obraId);
  d.cortes=d.cortes.filter(function(c){return c.id!==corteId;});
  render();
  // v2026.07.22 FIX: usar la accion explicita de borrado en vez de solo
  // "guardar" — con la fusion por id, un guardado normal ya no garantiza
  // que el corte borrado no "reviva" si otro navegador guarda con su
  // copia vieja (mismo motivo que pedido.eliminar).
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"maestro.eliminar_corte",
      _email:S.user?S.user.email:"",
      _nombre:S.user?S.user.nombre:"",
      payload:{obraId:obraId,corteId:corteId}
    })
  })
  .then(function(r){return r.json();})
  .then(function(d2){
    if(!d2||d2.ok===false){
      alert("⚠️ No se pudo eliminar el corte en el servidor: "+(d2&&d2.error?d2.error:"error desconocido"));
    }
  })
  .catch(function(err){
    console.error("[MOSS] Error eliminando corte de maestro:",err);
    alert("⚠️ No hay conexion con el servidor. El corte se borro solo en este dispositivo, vuelve a intentar.");
  });
  guardarCronogramaRemoto();
}

// v2026.07.16 FIX: antes esta función guardaba el PDF/foto COMPLETO en
// base64 dentro de CRON.maestros (que viaja dentro del blob compartido de
// TODO el equipo). Un solo archivo de unos cientos de KB ya rompe la cuota
// de almacenamiento de Apps Script para el equipo entero, no solo para
// quien lo sube — eso era el "problema de capacidad de almacenamiento".
// Ahora el archivo se sube directo a Google Drive; en el blob solo se
// guarda un link (unos 100 bytes en vez de cientos de miles).
function maestroSubirPdf(obraId,corteId){
  var inp=document.createElement("input");
  inp.type="file";inp.accept="application/pdf,image/*";
  inp.onchange=function(){
    var file=inp.files&&inp.files[0];
    if(!file)return;
    var maxMB=10;
    if(file.size>maxMB*1024*1024){alert("El archivo supera "+maxMB+"MB. Comprime el PDF antes de subir.");return;}
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(",")[1];
      var btn=document.querySelector("[onclick=\"maestroSubirPdf("+obraId+","+corteId+")\"]");
      if(btn){btn.textContent="⏳ Subiendo...";btn.disabled=true;}
      fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
          action:"maestro.subir_pdf",
          _email:S.user?S.user.email:"",
          _nombre:S.user?S.user.nombre:"",
          payload:{obraId:obraId,corteId:corteId,b64:b64,nombre:file.name,tipo:file.type}
        })
      })
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d||d.ok===false){
          alert("No se pudo subir el archivo: "+(d&&d.error?d.error:"error desconocido")+"\n\nSi el mensaje menciona 'permiso' o 'rol', avisa a sistemas.");
          if(btn){btn.textContent="📎 PDF firmado";btn.disabled=false;}
          return;
        }
        var dta=_maestroData(obraId);
        for(var i=0;i<dta.cortes.length;i++){
          if(dta.cortes[i].id===corteId){
            dta.cortes[i].pdf=d.data.pdf; // solo {nombre,tipo,url,fileId,ts} — liviano
            break;
          }
        }
        guardarCronogramaRemoto();
        render();
      })
      .catch(function(err){
        console.error("[MOSS] Error subiendo PDF de corte:",err);
        alert("No se pudo subir el archivo (sin conexión con el servidor). Intenta de nuevo.");
        if(btn){btn.textContent="📎 PDF firmado";btn.disabled=false;}
      });
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
window.maestroSubirPdf=maestroSubirPdf;

// Actualizar fecha de inicio Y auto-calcular fecha de entrega (si no esta en modo manual)
function updFechaInicio(id,v){
  if(!v)return;
  for(var i=0;i<S.obras.length;i++){
    if(S.obras[i].id===+id){
      S.obras[i].fl=v;
      // Si no esta en modo manual, calcular fE automaticamente
      if(!S["fEmanual_"+id]){
        try{
          var ini=new Date(v+"T12:00:00");
          var fin=sumarDiasHabilesMOSS(ini,44); // 45 dias habiles - 1
          S.obras[i].fE=fin.toISOString().slice(0,10);
        }catch(e){console.log("Error auto-calc fE:",e);}
      }
      marcar(id);
      break;
    }
  }
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  render();
}

// Toggle entre fecha entrega auto y manual
function toggleEditEntrega(id){
  if(!puedeCerrarObra())return;
  S["fEmanual_"+id]=!S["fEmanual_"+id];
  // Si vuelve a auto y hay fl, recalcular
  if(!S["fEmanual_"+id]){
    for(var i=0;i<S.obras.length;i++){
      if(S.obras[i].id===+id&&S.obras[i].fl){
        try{
          var ini=new Date(S.obras[i].fl+"T12:00:00");
          var fin=sumarDiasHabilesMOSS(ini,44);
          S.obras[i].fE=fin.toISOString().slice(0,10);

        break;

}

function guardarNotas(id){
  var ta=document.getElementById("notasTA");
  var v=ta?ta.value:(S._notasDraft||""); // v44: leer del draft si el textarea ya fue reemplazado
  S._notasDraft=v; S._notasDraftId=+id; // mantener draft actualizado
  // Actualizar S.obras
  for(var i=0;i<S.obras.length;i++){
    if(S.obras[i].id===+id){
      S.obras[i].notas=v;
      break;

  }
  // Sincronizar a CRON.obras (fuente de verdad en JSONBin)
  if(!CRON.obras)CRON.obras={};
  CRON.obras[id]=S.obras.find(function(o){return o.id===+id;})||CRON.obras[id];
  // Persistencia local
  try{localStorage.setItem("moss_obras",JSON.stringify(S.obras));}catch(e){}
  // Guardar en JSONBin (NO Apps Script, que esta roto)
  var btn=document.querySelector("button.bp");

  guardarCronogramaRemoto();
  // Feedback visual al usuario
  setTimeout(function(){
    if(btn){
      btn.textContent="Guardado correctamente";
      setTimeout(function(){if(btn)btn.textContent="Guardar notas";},2000);
    }
  },300);
}

  // Leer los valores de los inputs (DOM actual)

// Eliminar garantia (con confirmacion)
function elimGar(id){
  if(!confirm("Eliminar esta garantia? No se puede deshacer."))return;
  S.gars=S.gars.filter(function(g){return g.id!==id;});
  guardarCronogramaRemoto();
  render();
}

// Agregar foto a una garantia (link de Drive)
function addFotoGar(id){
  var g=null;for(var i=0;i<S.gars.length;i++){if(S.gars[i].id===id){g=S.gars[i];break;}}
  if(!g)return;
  if(!g.fotos)g.fotos=[];
  if(g.fotos.length>=5){alert("Maximo 5 fotos por garantia. Elimina alguna primero.");return;}
  var url=prompt("Pega el link de la foto en Drive:\n\n(Sube primero la foto a la carpeta de Drive de la obra y copia el link de compartir)");
  if(!url||!url.trim())return;
  url=url.trim();
  if(url.indexOf("http")!==0){alert("El link debe empezar con http o https.");return;}
  var nom=prompt("Nombre o descripcion corta de la foto (opcional):","")||"";
  g.fotos.push({url:url,nom:nom.trim(),ts:Date.now()});
  guardarCronogramaRemoto();
  render();
}

// Eliminar foto de garantia por indice
function elimFotoGar(idGar,idxFoto){
  if(!confirm("Eliminar esta foto?"))return;
  var g=null;for(var i=0;i<S.gars.length;i++){if(S.gars[i].id===idGar){g=S.gars[i];break;}}

  g.fotos.splice(idxFoto,1);
  guardarCronogramaRemoto();

// EQUIPO
function rEquipo(){
  var res={};
  S.obras.forEach(function(o){
    var r=o.res||"Sin asignar";
    if(!res[r])res[r]={nombre:r,obras:[],calProm:0,tiempoOk:0,presOk:0,total:0,score:0};
    res[r].obras.push(o);res[r].total++;
  });
  Object.keys(res).forEach(function(r){
    var d=res[r];
    var cals=d.obras.map(function(o){return calProm(o.calFases);}).filter(function(c){return c>0;});
    d.calProm=cals.length?Math.round(cals.reduce(function(a,b){return a+b;},0)/cals.length*10)/10:0;
    d.tiempoOk=d.obras.filter(function(o){var s=sem(o);return s==="ok"||s==="done";}).length;
    d.presOk=d.obras.filter(function(o){return o.pres>0&&Math.round(gT(o)/o.pres*100)<=70;}).length;
    var sT=d.total?Math.round(d.tiempoOk/d.total*100):0;
    var sC=d.calProm?Math.round(d.calProm/5*100):0;
    var sP=d.total?Math.round(d.presOk/d.total*100):0;
    d.score=Math.round(sT*.3+sC*.4+sP*.3);d.sT=sT;d.sC=sC;d.sP=sP;
  });
  var calG=0,calN=0,tOk=0,pOk=0,tot=S.obras.length;
  S.obras.forEach(function(o){var c=calProm(o.calFases);if(c>0){calG+=c;calN++;}if(sem(o)==="ok"||sem(o)==="done")tOk++;if(o.pres>0&&Math.round(gT(o)/o.pres*100)<=70)pOk++;});

  var legend=h("div",{"style":"background:var(--vc);border:1px solid var(--bv);border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:11px;color:var(--ok)"},
    h("div",{"style":"font-weight:600;margin-bottom:5px"},"Resultado optimo MOSS")+
    h("div",{},h("div",{"style":"margin-bottom:2px"},"Tiempo (30%): entrega dentro del plazo contratado")+h("div",{"style":"margin-bottom:2px"},"Calidad (40%): promedio actividades mayor o igual a 4/5")+h("div",{},"Presupuesto (30%): gasto maximo 70% del contrato")));
  var cards=Object.values(res).map(function(d){
    var col=d.score>=80?"#3A6B45":d.score>=60?"#C17B2A":"#B5362A";
    var bg=d.score>=80?"#E8F0EB":d.score>=60?"#FDF0E0":"#FAEBE9";
    return div("card","<div style='overflow:hidden'>"+
      h("div",{"style":"padding:12px 14px;background:var(--v);display:flex;justify-content:space-between;align-items:center"},
        h("div",{},h("div",{"style":"font-size:13px;font-weight:700;color:#fff"},d.nombre)+h("div",{"style":"font-size:10px;color:rgba(255,255,255,.7)"},d.total+" obra"+(d.total>1?"s":"")))+
        h("div",{"style":"background:"+bg+";color:"+col+";border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700"},d.score+"%"))+
      h("div",{"style":"padding:12px"},
        h("div",{"style":"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px"},
          h("div",{"style":"text-align:center;background:var(--cr);border-radius:8px;padding:9px 5px"},h("div",{"style":"font-size:18px;font-weight:700;color:"+(d.sT>=80?"#3A6B45":d.sT>=60?"#C17B2A":"#B5362A")},d.sT+"%")+h("div",{"style":"font-size:9px;color:var(--g);margin-top:2px"},"Tiempo"))+
          h("div",{"style":"text-align:center;background:var(--cr);border-radius:8px;padding:9px 5px"},h("div",{"style":"font-size:18px;font-weight:700;color:"+(d.calProm>=4?"#3A6B45":d.calProm>=3?"#C17B2A":"#B5362A")},d.calProm||"-")+h("div",{"style":"font-size:9px;color:var(--g);margin-top:2px"},"Calidad"))+
          h("div",{"style":"text-align:center;background:var(--cr);border-radius:8px;padding:9px 5px"},h("div",{"style":"font-size:18px;font-weight:700;color:"+(d.sP>=80?"#3A6B45":d.sP>=60?"#C17B2A":"#B5362A")},d.sP+"%")+h("div",{"style":"font-size:9px;color:var(--g);margin-top:2px"},"Presup.")))+
        d.obras.map(function(o){
          var st=sem(o),e=ECFG[st]||ECFG.pend,cp=calProm(o.calFases),gasto=o.pres>0?Math.round(gT(o)/o.pres*100):0;
          return h("div",{"style":"display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:var(--ba);margin-bottom:4px;cursor:pointer","onclick":"abrirObra("+o.id+")"},
            h("span",{"class":"cod"},o.cod)+h("div",{"style":"flex:1"},h("div",{"style":"font-size:11px;font-weight:600"},o.nom)+h("div",{"style":"font-size:9px;color:var(--g)"},o.act||"-"))+
            h("span",{"class":"bdg "+e.cls,"style":"font-size:9px"},e.lbl)+
            (cp>0?h("span",{"style":"font-size:10px;color:var(--d)"},cp.toFixed(1)+"/5"):"<span></span>")+
            (o.pres>0?h("span",{"style":"font-size:10px;color:"+(gasto>70?"#B5362A":"#3A6B45")},gasto+"%"):"<span></span>"));
        }).join(""))+

  }).join("");
  return h("div",{"class":"sh"},"Evaluacion del equipo MOSS")+kpis+legend+cards;

// Google Calendar
function calendarActividad(obraId){
  var o=null;for(var i=0;i<S.obras.length;i++){if(S.obras[i].id===+obraId){o=S.obras[i];break;}}
  if(!o)return;
  var fi=document.getElementById("actFI");
  var ff2=document.getElementById("actFF");
  var fI=fi?fi.value:"",fF=ff2?ff2.value:"";
  if(!fI){alert("Ingresa la fecha de inicio de la actividad primero.");return;}
  var fiStr=fI.replace(/-/g,"");
  var d=new Date(fF||fI);d.setDate(d.getDate()+1);
  var ffStr=d.toISOString().slice(0,10).replace(/-/g,"");
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  if(o.res&&o.res.indexOf("@")>-1&&guests.indexOf(o.res)<0)guests+=","+o.res;
  var titulo="[MOSS] "+o.cod+" "+o.nom+" - "+o.act;
  var detalle="Obra: "+o.nom+" | Cliente: "+o.cli+" | Actividad: "+o.act+" | Residente: "+o.res;
  var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(titulo)+"&dates="+fiStr+"/"+ffStr+"&details="+encodeURIComponent(detalle)+"&add="+encodeURIComponent(guests);
  window.open(url,"_blank","noopener,noreferrer");
}
function abrirCalendarioProyecto(o){
  if(!o.fIDiseno&&!o.fI)return;
  var guests="juanmanuel@mosscolombia.com.co,coordinacionproyectos@mosscolombia.com.co,diseno@mosscolombia.com.co";
  var evs=[];
  if(o.fIDiseno)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio Diseno",fi:o.fIDiseno,ff:o.fEDiseno||o.fI});
  if(o.fI)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Inicio de Obra",fi:o.fI,ff:o.fI});
  if(o.fE)evs.push({t:"[MOSS] "+o.cod+" "+o.nom+" - Entrega",fi:o.fE,ff:o.fE});
  evs.forEach(function(ev){
    if(!ev.fi)return;
    var fi=ev.fi.replace(/-/g,"");
    var d=new Date(ev.ff||ev.fi);d.setDate(d.getDate()+1);
    var ff3=d.toISOString().slice(0,10).replace(/-/g,"");
    var det="Proyecto: "+o.nom+" | Cliente: "+o.cli+" | Codigo: "+o.cod;
    var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.t)+"&dates="+fi+"/"+ff3+"&details="+encodeURIComponent(det)+"&add="+encodeURIComponent(guests);
    window.open(url,"_blank","noopener,noreferrer");
  });
}
